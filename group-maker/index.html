<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スポーツグループ分けアプリ | 小学生向けの安全な教育アプリ</title>
    <meta name="description" content="スポーツグループ分けアプリは、小学生向けのシンプルで安全な教育・学習アプリです。学校の授業やご家庭で安心して使えるよう設計されており、アイフィルター等でも安全に利用できます。">
    <link rel="stylesheet" href="tailwind.css?v=2">
    <style>

        body {
            font-family: 'Hiragino Maru Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #f0f9ff;
            background-image: radial-gradient(#60a5fa 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .sports-icon {
            animation: bounce 2s infinite alternate;
        }

        @keyframes bounce {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(-10px);
            }
        }

        .btn-sports {
            transition: all 0.3s;
        }

        .btn-sports:hover {
            transform: scale(1.05);
        }

        .group-card {
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .group-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
        }

        .member-item {
            cursor: grab;
            transition: all 0.2s;
        }

        .member-item:hover {
            background-color: #f3f4f6;
        }

        .member-item.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }

        .member-drop-area {
            min-height: 50px;
            border: 2px dashed transparent;
            transition: all 0.3s;
        }

        .member-drop-area.highlight {
            border-color: #60a5fa;
            background-color: rgba(96, 165, 250, 0.1);
        }

        .step-indicator {
            position: relative;
            display: flex;
            justify-content: space-between;
            margin-bottom: 2rem;
        }

        .step {
            position: relative;
            z-index: 1;
        }

        .step-line {
            position: absolute;
            top: 1.25rem;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: #e5e7eb;
            z-index: 0;
        }

        .step-line-progress {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background-color: #3b82f6;
            transition: width 0.3s;
        }

        /* === 印刷用スタイル === */
        @media print {
            @page {
                size: A4 portrait;
                margin: 10mm;
            }

            body {
                background: none;
                background-image: none;
                font-size: 11pt;
                /* A4に収めるため少し文字を小さく */
            }

            /* 印刷不要な要素を非表示 */
            header,
            footer,
            #setup-container,
            #back-to-input,
            #print-groups,
            #toggle-skill-btn,
            .mb-2 {
                display: none !important;
            }

            #results {
                display: block !important;
                width: 100% !important;
            }

            /* 余白を詰める */
            .mt-8 {
                margin-top: 0 !important;
            }

            .mb-4 {
                margin-bottom: 10px !important;
            }

            h2 {
                font-size: 16pt !important;
                margin-bottom: 10px !important;
            }

            /* グリッドレイアウトを強制し、高さを揃える */
            #groups-container {
                display: grid !important;
                grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)) !important;
                gap: 15px !important;
                align-items: stretch !important;
                /* 行の要素の高さを統一 */
            }

            /* カードのスタイル調整 */
            .group-card {
                break-inside: avoid;
                page-break-inside: avoid;
                margin-bottom: 0 !important;
                border: 2px solid #3b82f6 !important;
                border-top-width: 2px !important;
                /* Tailwindのborder-t-4を上書き */
                box-shadow: none !important;
                display: flex !important;
                flex-direction: column !important;
                height: 100% !important;
                /* 高さを揃えるためのキー */
                padding: 10px !important;
            }

            /* メンバーリスト部分を伸ばす */
            .member-drop-area {
                flex-grow: 1 !important;
                display: flex;
                flex-direction: column;
            }

            /* メンバーアイテムのスタイル */
            .member-item {
                border: 1px solid #e5e7eb !important;
                padding: 4px 8px !important;
                margin-bottom: 4px !important;
                background-color: white !important;
            }

            /* 印刷時はドラッグ用アイコンを非表示にする */
            .drag-icon {
                display: none !important;
            }

            /* スキルバッジの枠線をはっきりさせる */
            .skill-label {
                border: 1px solid currentColor !important;
            }

            /* 印刷時のグループ名入力フィールド */
            .group-name-input {
                border: none !important;
                background: transparent !important;
                box-shadow: none !important;
                padding: 0 !important;
            }
        }
    </style>
    <meta name="theme-color" content="#22C55E">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icon.svg">
</head>

<body>
    <div class="min-h-screen">
        <!-- ヘッダー -->
        <header class="bg-blue-500 text-white p-4 shadow-lg">
            <div class="container mx-auto flex justify-between items-center">
                <h1 class="text-2xl md:text-3xl font-bold flex items-center">
                    <span class="sports-icon mr-2">⚽</span>
                    スポーツグループ分けアプリ
                    <span class="sports-icon ml-2">🏀</span>
                </h1>
            </div>
        </header>

        <!-- メインコンテンツ -->
        <main class="container mx-auto p-4 md:p-8">
            <!-- セットアップコンテナ -->
            <div id="setup-container" class="mb-8">
                <!-- ステップインジケーター -->
                <div class="step-indicator mb-8">
                    <div class="step-line">
                        <div id="step-progress" class="step-line-progress" style="width: 0%"></div>
                    </div>
                    <div class="step">
                        <div id="step1-indicator"
                            class="w-10 h-10 rounded-full bg-blue-500 text-white flex items-center justify-center mx-auto mb-2">
                            1</div>
                        <div class="text-center text-sm">名前入力</div>
                    </div>
                    <div class="step">
                        <div id="step2-indicator"
                            class="w-10 h-10 rounded-full bg-gray-300 text-gray-600 flex items-center justify-center mx-auto mb-2">
                            2</div>
                        <div class="text-center text-sm">スキル設定</div>
                    </div>
                    <div class="step">
                        <div id="step3-indicator"
                            class="w-10 h-10 rounded-full bg-gray-300 text-gray-600 flex items-center justify-center mx-auto mb-2">
                            3</div>
                        <div class="text-center text-sm">グループ分け</div>
                    </div>
                </div>

                <!-- ステップ1: 名前入力 -->
                <div id="step1" class="bg-white rounded-xl p-6 shadow-lg mb-8">
                    <h2 class="text-xl font-bold mb-4 text-blue-700 border-b-2 border-blue-300 pb-2">ステップ1: 名前入力</h2>

                    <div class="mb-4">
                        <div class="flex items-center justify-between mb-1">
                            <label for="bulk-data" class="block text-sm font-medium text-gray-700">メンバーの名前</label>
                            <span id="name-count" class="text-sm font-bold text-blue-600">0人</span>
                        </div>
                        <textarea id="bulk-data" rows="8"
                            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                            placeholder="1行に1人ずつ名前を入力してください&#10;例:&#10;山田太郎&#10;佐藤花子&#10;鈴木一郎"></textarea>
                        <div class="mt-2 flex flex-wrap items-center gap-2">
                            <span class="text-xs text-gray-500">かんたん準備:</span>
                            <button type="button" class="quick-fill text-xs bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1 rounded-full" data-count="30">番号だけ30人</button>
                            <button type="button" class="quick-fill text-xs bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1 rounded-full" data-count="35">35人</button>
                            <button type="button" class="quick-fill text-xs bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-1 rounded-full" data-count="40">40人</button>
                            <button type="button" id="clear-names" class="text-xs bg-red-50 hover:bg-red-100 text-red-600 px-3 py-1 rounded-full">クリア</button>
                        </div>
                    </div>

                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-4">
                        <p class="text-sm text-gray-500 mb-2 md:mb-0">
                            Excel等からコピーしたデータをそのまま貼り付けることもできます。<br>
                            形式: 1行に1人の名前<br>
                            <span class="text-xs text-blue-500">※何も入力せずに「次へ」を押すと、番号のみのメンバーが30人分自動で用意されます。</span>
                        </p>
                    </div>

                    <div class="mt-6 text-right">
                        <button id="next-to-step2"
                            class="btn-sports bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-md shadow-md flex items-center ml-auto">
                            次へ
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 ml-1" viewBox="0 0 20 20"
                                fill="currentColor">
                                <path fill-rule="evenodd"
                                    d="M10.293 5.293a1 1 0 011.414 0l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414-1.414L12.586 11H5a1 1 0 110-2h7.586l-2.293-2.293a1 1 0 010-1.414z"
                                    clip-rule="evenodd" />
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- ステップ2: スキル設定 -->
                <div id="step2" class="bg-white rounded-xl p-6 shadow-lg mb-8 hidden">
                    <h2 class="text-xl font-bold mb-4 text-blue-700 border-b-2 border-blue-300 pb-2">ステップ2: スキル設定</h2>

                    <div class="mb-4">
                        <div class="flex flex-wrap gap-2 mb-4">
                            <div class="flex items-center px-3 py-1 rounded-full bg-blue-100 text-blue-800 text-sm">
                                <span class="w-3 h-3 inline-block bg-blue-500 rounded-full mr-1"></span>
                                得意
                            </div>
                            <div class="flex items-center px-3 py-1 rounded-full bg-green-100 text-green-800 text-sm">
                                <span class="w-3 h-3 inline-block bg-green-500 rounded-full mr-1"></span>
                                少し得意
                            </div>
                            <div class="flex items-center px-3 py-1 rounded-full bg-gray-100 text-gray-800 text-sm">
                                <span class="w-3 h-3 inline-block bg-gray-400 rounded-full mr-1"></span>
                                普通
                            </div>
                            <div class="flex items-center px-3 py-1 rounded-full bg-yellow-100 text-yellow-800 text-sm">
                                <span class="w-3 h-3 inline-block bg-yellow-500 rounded-full mr-1"></span>
                                少し苦手
                            </div>
                            <div class="flex items-center px-3 py-1 rounded-full bg-red-100 text-red-800 text-sm">
                                <span class="w-3 h-3 inline-block bg-red-500 rounded-full mr-1"></span>
                                苦手
                            </div>
                        </div>

                        <div class="bg-gray-50 p-4 rounded-lg max-h-80 overflow-y-auto">
                            <ul id="member-list" class="divide-y divide-gray-200">
                                <!-- メンバーリストがここに表示されます -->
                                <li class="py-2 text-gray-500 italic">まだメンバーが登録されていません</li>
                            </ul>
                        </div>
                    </div>

                    <div class="mt-6 flex justify-between">
                        <button id="back-to-step1"
                            class="btn-sports bg-gray-500 hover:bg-gray-600 text-white px-6 py-2 rounded-md shadow-md flex items-center">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" viewBox="0 0 20 20"
                                fill="currentColor">
                                <path fill-rule="evenodd"
                                    d="M9.707 14.707a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 1.414L7.414 9H15a1 1 0 110 2H7.414l2.293 2.293a1 1 0 010 1.414z"
                                    clip-rule="evenodd" />
                            </svg>
                            戻る
                        </button>
                        <button id="next-to-step3"
                            class="btn-sports bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-md shadow-md flex items-center">
                            次へ
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 ml-1" viewBox="0 0 20 20"
                                fill="currentColor">
                                <path fill-rule="evenodd"
                                    d="M10.293 5.293a1 1 0 011.414 0l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414-1.414L12.586 11H5a1 1 0 110-2h7.586l-2.293-2.293a1 1 0 010-1.414z"
                                    clip-rule="evenodd" />
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- ステップ3: グループ分け設定 -->
                <div id="step3" class="bg-white rounded-xl p-6 shadow-lg mb-8 hidden">
                    <h2 class="text-xl font-bold mb-4 text-blue-700 border-b-2 border-blue-300 pb-2">ステップ3: グループ分け設定
                    </h2>

                    <div class="flex flex-col md:flex-row items-end space-y-4 md:space-y-0 md:space-x-4">
                        <div class="w-full md:w-1/3">
                            <label for="group-count" class="block text-sm font-medium text-gray-700 mb-1">グループ数</label>
                            <input type="number" id="group-count" min="2" value="2"
                                class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                        </div>

                        <button id="create-groups"
                            class="btn-sports bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-md shadow-md flex items-center">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" viewBox="0 0 20 20"
                                fill="currentColor">
                                <path
                                    d="M13 6a3 3 0 11-6 0 3 3 0 016 0zM18 8a2 2 0 11-4 0 2 2 0 014 0zM14 15a4 4 0 00-8 0v3h8v-3zM6 8a2 2 0 11-4 0 2 2 0 014 0zM16 18v-3a5.972 5.972 0 00-.75-2.906A3.005 3.005 0 0119 15v3h-3zM4.75 12.094A5.973 5.973 0 004 15v3H1v-3a3 3 0 013.75-2.906z" />
                            </svg>
                            グループ作成
                        </button>
                    </div>

                    <div class="mt-6 flex justify-between">
                        <button id="back-to-step2"
                            class="btn-sports bg-gray-500 hover:bg-gray-600 text-white px-6 py-2 rounded-md shadow-md flex items-center">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" viewBox="0 0 20 20"
                                fill="currentColor">
                                <path fill-rule="evenodd"
                                    d="M9.707 14.707a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 1.414L7.414 9H15a1 1 0 110 2H7.414l2.293 2.293a1 1 0 010 1.414z"
                                    clip-rule="evenodd" />
                            </svg>
                            戻る
                        </button>
                    </div>
                </div>
            </div>

            <!-- 結果表示エリア -->
            <div id="results" class="hidden">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-blue-700 flex items-center">
                        <span class="sports-icon mr-2">🏆</span>
                        グループ分け結果
                        <span class="sports-icon ml-2">🏆</span>
                    </h2>
                    <div>
                        <p class="text-sm text-gray-600 mb-2">メンバーをドラッグ＆ドロップで入れ替えられます</p>
                    </div>
                </div>

                <div id="groups-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- グループがここに表示されます -->
                </div>

                <div class="mt-8 text-center flex flex-wrap justify-center gap-4">
                    <button id="reshuffle-groups"
                        class="btn-sports bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-md shadow-md inline-flex items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" viewBox="0 0 20 20"
                            fill="currentColor">
                            <path fill-rule="evenodd"
                                d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z"
                                clip-rule="evenodd" />
                        </svg>
                        もう一度組み直す
                    </button>

                    <button id="back-to-input"
                        class="btn-sports bg-yellow-500 hover:bg-yellow-600 text-white px-6 py-2 rounded-md shadow-md inline-flex items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" viewBox="0 0 20 20"
                            fill="currentColor">
                            <path fill-rule="evenodd"
                                d="M9.707 14.707a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414l4-4a1 1 0 011.414 1.414L7.414 9H15a1 1 0 110 2H7.414l2.293 2.293a1 1 0 010 1.414z"
                                clip-rule="evenodd" />
                        </svg>
                        設定に戻る
                    </button>

                    <button id="toggle-skill-btn"
                        class="btn-sports bg-purple-500 hover:bg-purple-600 text-white px-6 py-2 rounded-md shadow-md inline-flex items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" viewBox="0 0 20 20"
                            fill="currentColor">
                            <path d="M10 12a2 2 0 100-4 2 2 0 000 4z" />
                            <path fill-rule="evenodd"
                                d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z"
                                clip-rule="evenodd" />
                        </svg>
                        <span id="toggle-skill-text">スキルを隠す</span>
                    </button>

                    <button id="print-groups"
                        class="btn-sports bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded-md shadow-md inline-flex items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" viewBox="0 0 20 20"
                            fill="currentColor">
                            <path fill-rule="evenodd"
                                d="M5 4v3H4a2 2 0 00-2 2v3a2 2 0 002 2h1v2a2 2 0 002 2h6a2 2 0 002-2v-2h1a2 2 0 002-2V9a2 2 0 00-2-2h-1V4a2 2 0 00-2-2H7a2 2 0 00-2 2zm8 0H7v3h6V4zm0 8H7v4h6v-4z"
                                clip-rule="evenodd" />
                        </svg>
                        印刷する
                    </button>
                </div>
            </div>
        </main>

        <!-- フッター -->
        <footer class="bg-blue-500 text-white p-4 mt-8">
            <div class="container mx-auto text-center">
                <p>© 2026 スポーツグループ分けアプリ</p>
            </div>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // 要素の取得
            const memberList = document.getElementById('member-list');
            const groupCountInput = document.getElementById('group-count');
            const createGroupsBtn = document.getElementById('create-groups');
            const results = document.getElementById('results');
            const groupsContainer = document.getElementById('groups-container');
            const backToInputBtn = document.getElementById('back-to-input');
            const reshuffleBtn = document.getElementById('reshuffle-groups');
            const bulkDataTextarea = document.getElementById('bulk-data');
            const printGroupsBtn = document.getElementById('print-groups');
            const toggleSkillBtn = document.getElementById('toggle-skill-btn');
            const toggleSkillText = document.getElementById('toggle-skill-text');

            // ステップ関連の要素
            const step1 = document.getElementById('step1');
            const step2 = document.getElementById('step2');
            const step3 = document.getElementById('step3');
            const setupContainer = document.getElementById('setup-container');
            const stepProgress = document.getElementById('step-progress');
            const step1Indicator = document.getElementById('step1-indicator');
            const step2Indicator = document.getElementById('step2-indicator');
            const step3Indicator = document.getElementById('step3-indicator');

            // ステップ間の移動ボタン
            const nextToStep2Btn = document.getElementById('next-to-step2');
            const nextToStep3Btn = document.getElementById('next-to-step3');
            const backToStep1Btn = document.getElementById('back-to-step1');
            const backToStep2Btn = document.getElementById('back-to-step2');

            // メンバーリスト
            let members = [];
            // 出席番号の最大値
            let maxStudentNumber = 0;
            // グループ分け結果
            let groupsResult = [];
            // 現在のステップ
            let currentStep = 1;
            // スキルの表示状態
            let isSkillVisible = true;

            // 初期化時に空のメンバーデータ(30人分)を裏で生成しておく
            generateDefaultNumbers();

            // ステップの表示を更新
            function updateStepDisplay(step) {
                currentStep = step;

                // すべてのステップを非表示
                step1.classList.add('hidden');
                step2.classList.add('hidden');
                step3.classList.add('hidden');

                // 現在のステップを表示
                document.getElementById('step' + step).classList.remove('hidden');

                // プログレスバーを更新 (3ステップなので 0%, 50%, 100%)
                stepProgress.style.width = ((step - 1) * 50) + '%';

                // インジケーターを更新
                step1Indicator.className = step >= 1 ? 'w-10 h-10 rounded-full bg-blue-500 text-white flex items-center justify-center mx-auto mb-2' : 'w-10 h-10 rounded-full bg-gray-300 text-gray-600 flex items-center justify-center mx-auto mb-2';
                step2Indicator.className = step >= 2 ? 'w-10 h-10 rounded-full bg-blue-500 text-white flex items-center justify-center mx-auto mb-2' : 'w-10 h-10 rounded-full bg-gray-300 text-gray-600 flex items-center justify-center mx-auto mb-2';
                step3Indicator.className = step >= 3 ? 'w-10 h-10 rounded-full bg-blue-500 text-white flex items-center justify-center mx-auto mb-2' : 'w-10 h-10 rounded-full bg-gray-300 text-gray-600 flex items-center justify-center mx-auto mb-2';
            }

            // ステップ間の移動
            nextToStep2Btn.addEventListener('click', function () {
                const bulkData = bulkDataTextarea.value.trim();

                if (bulkData) {
                    // 入力がある場合、テキストから名前を読み取ってメンバーを生成
                    members = [];
                    const rows = bulkData.split('\n');
                    let number = 1;

                    for (const row of rows) {
                        const name = row.trim();
                        if (!name) continue; // 空行はスキップ

                        members.push({
                            number: number++,
                            name: name,
                            skill: 'neutral',
                            gender: 'unset'
                        });
                    }
                    maxStudentNumber = members.length;

                    if (members.length === 0) {
                        alert('有効な名前が入力されていません。');
                        return; // エラー時は進まない
                    }
                } else {
                    // 入力がない場合、30人の空メンバーを生成
                    generateDefaultNumbers();
                }

                updateStepDisplay(2);
                updateMemberList();
            });

            nextToStep3Btn.addEventListener('click', function () {
                updateStepDisplay(3);
            });

            backToStep1Btn.addEventListener('click', function () {
                updateStepDisplay(1);
            });

            backToStep2Btn.addEventListener('click', function () {
                updateStepDisplay(2);
            });

            // 出席番号自動生成（初期化用・30人）
            function generateDefaultNumbers() {
                generateNumberedMembers(30);
            }

            // 番号だけのメンバーを n 人ぶん用意する（名前は空）
            function generateNumberedMembers(n) {
                maxStudentNumber = n;
                members = [];
                for (let i = 1; i <= n; i++) {
                    members.push({ number: i, name: '', skill: 'neutral', gender: 'unset' });
                }
            }

            // --- 名前入力の「かんたん化」: 人数カウンター / 番号プリセット / クリア ---
            const nameCountEl = document.getElementById('name-count');
            function updateNameCount() {
                const n = bulkDataTextarea.value.split('\n').filter(l => l.trim()).length;
                nameCountEl.textContent = n + '人';
            }
            bulkDataTextarea.addEventListener('input', updateNameCount);

            document.getElementById('clear-names').addEventListener('click', function () {
                bulkDataTextarea.value = '';
                updateNameCount();
                bulkDataTextarea.focus();
            });

            // 「番号だけ○人」→ その人数の番号メンバーを用意してステップ2へ直行
            document.querySelectorAll('.quick-fill').forEach(btn => {
                btn.addEventListener('click', function () {
                    const n = parseInt(this.getAttribute('data-count'));
                    generateNumberedMembers(n);
                    updateStepDisplay(2);
                    updateMemberList();
                });
            });

            // メンバーリストの更新
            function updateMemberList() {
                if (members.length === 0) {
                    memberList.innerHTML = '<li class="py-2 text-gray-500 italic">まだメンバーが登録されていません</li>';
                    return;
                }

                // 出席番号順にソート
                members.sort((a, b) => a.number - b.number);

                memberList.innerHTML = '';
                members.forEach((member, index) => {
                    const li = document.createElement('li');
                    li.className = 'py-2 flex justify-between items-center';

                    const displayName = member.name ? `${member.number}. ${member.name}` : `${member.number}`;

                    const g = member.gender || 'unset';
                    const genderStyle = g === 'male'
                        ? 'bg-blue-100 text-blue-800 border-blue-300'
                        : (g === 'female' ? 'bg-pink-100 text-pink-800 border-pink-300'
                            : 'bg-gray-100 text-gray-500 border-gray-300');
                    const genderText = g === 'male' ? '男子' : (g === 'female' ? '女子' : '未設定');

                    li.innerHTML = `
                        <div>
                            <span class="font-medium">${displayName}</span>
                        </div>
                        <div class="flex items-center">
                            <button type="button" class="gender-toggle mr-2 px-3 py-1 border rounded text-sm font-medium min-w-[3.5rem] ${genderStyle}" data-index="${index}" title="タップで 男子→女子→未設定 と切り替え">${genderText}</button>
                            <div>
                                <select class="skill-select px-2 py-1 border border-gray-300 rounded text-sm" data-index="${index}">
                                    <option value="very-good" ${member.skill === 'very-good' ? 'selected' : ''}>得意</option>
                                    <option value="good" ${member.skill === 'good' ? 'selected' : ''}>少し得意</option>
                                    <option value="neutral" ${member.skill === 'neutral' ? 'selected' : ''}>普通</option>
                                    <option value="bad" ${member.skill === 'bad' ? 'selected' : ''}>少し苦手</option>
                                    <option value="very-bad" ${member.skill === 'very-bad' ? 'selected' : ''}>苦手</option>
                                </select>
                            </div>
                        </div>
                    `;
                    memberList.appendChild(li);
                });

                // スキル選択のイベントリスナーを設定
                document.querySelectorAll('.skill-select').forEach(select => {
                    select.addEventListener('change', function () {
                        const index = parseInt(this.getAttribute('data-index'));
                        members[index].skill = this.value;
                    });
                });

                // 男女トグル（タップで 男子→女子→未設定 と循環。スクロール位置を保つためその場で更新）
                const genderCycle = { unset: 'male', male: 'female', female: 'unset' };
                const genderStyles = {
                    male:   { cls: 'bg-blue-100 text-blue-800 border-blue-300', txt: '男子' },
                    female: { cls: 'bg-pink-100 text-pink-800 border-pink-300', txt: '女子' },
                    unset:  { cls: 'bg-gray-100 text-gray-500 border-gray-300', txt: '未設定' },
                };
                document.querySelectorAll('.gender-toggle').forEach(btn => {
                    btn.addEventListener('click', function () {
                        const index = parseInt(this.getAttribute('data-index'));
                        const next = genderCycle[members[index].gender || 'unset'];
                        members[index].gender = next;
                        this.className = `gender-toggle mr-2 px-3 py-1 border rounded text-sm font-medium min-w-[3.5rem] ${genderStyles[next].cls}`;
                        this.textContent = genderStyles[next].txt;
                    });
                });
            }

            // グループ作成処理
            createGroupsBtn.addEventListener('click', function () {
                if (members.length === 0) {
                    alert('メンバーを追加してください');
                    return;
                }

                const groupCount = parseInt(groupCountInput.value);
                if (isNaN(groupCount) || groupCount < 2) {
                    alert('グループ数は2以上の数値を入力してください');
                    return;
                }

                if (members.length < groupCount) {
                    alert('メンバー数がグループ数より少ないです');
                    return;
                }

                // グループ分け実行
                groupsResult = createBalancedGroups(members, groupCount);

                // 結果表示
                showResults(groupsResult);
            });

            // スキルの点数（得意5・少し得意4・普通3・少し苦手2・苦手1）
            const SKILL_SCORE = { 'very-good': 5, 'good': 4, 'neutral': 3, 'bad': 2, 'very-bad': 1 };
            function skillScore(m) { return SKILL_SCORE[m.skill] != null ? SKILL_SCORE[m.skill] : 3; }

            // グループの現在の集計（合計点・男女の人数）
            function groupStats(group) {
                let sum = 0, male = 0, female = 0;
                for (const m of group) {
                    sum += skillScore(m);
                    if (m.gender === 'male') male++;
                    else if (m.gender === 'female') female++;
                }
                return { sum, male, female, avg: group.length ? sum / group.length : 0 };
            }

            // バランスの取れたグループ分け
            //   ①人数をできるだけ均等（差は最大1人） ②各チームの平均点を均等
            //   ③男子どうし・女子どうしの人数を均等 になるように貪欲法で割り当てる。
            //   毎回ランダム性を混ぜるので「もう一度組み直す」で違う組み合わせになる。
            function createBalancedGroups(membersList, count) {
                const GENDER_W = 2.5; // 男女比の重み（点数バランスと同程度に効かせる）
                const groups = Array.from({ length: count }, () => []);
                const targetMax = Math.ceil(membersList.length / count); // 1グループの上限人数

                // スキルの高い順に並べる（同点はシャッフルして毎回変化させる）
                const ordered = shuffleArray(membersList.slice())
                    .sort((a, b) => skillScore(b) - skillScore(a));

                for (const m of ordered) {
                    // まだ上限に達していないグループのうち、最も人数が少ないものだけを候補に（人数を均等に保つ）
                    const minSize = Math.min(...groups.map(g => g.length));
                    let best = null, bestCost = Infinity;
                    const order = shuffleArray([...groups.keys()]); // 同コスト時のためランダム順で見る
                    for (const gi of order) {
                        const g = groups[gi];
                        if (g.length !== minSize || g.length >= targetMax) continue;
                        const st = groupStats(g);
                        // コスト＝現在の合計点（低い所へ高スキルを入れて均等化）＋同性の人数×重み
                        let cost = st.sum;
                        if (m.gender === 'male') cost += GENDER_W * st.male;
                        else if (m.gender === 'female') cost += GENDER_W * st.female;
                        if (cost < bestCost) { bestCost = cost; best = gi; }
                    }
                    if (best === null) best = groups.indexOf(groups.reduce((a, b) => a.length <= b.length ? a : b));
                    groups[best].push(m);
                }
                return groups;
            }

            // 配列をシャッフル（同じ配列を返す）
            function shuffleArray(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            }

            // スキル表示のトグル切り替え
            toggleSkillBtn.addEventListener('click', function () {
                isSkillVisible = !isSkillVisible;

                const skillLabels = document.querySelectorAll('.skill-label');
                skillLabels.forEach(label => {
                    label.style.display = isSkillVisible ? 'inline-block' : 'none';
                });

                toggleSkillText.textContent = isSkillVisible ? 'スキルを隠す' : 'スキルを表示';

                // サマリーの平均点表示も連動して出し入れ
                if (typeof updateGroupSummaries === 'function') updateGroupSummaries();
            });

            // 結果表示
            function showResults(groups) {
                // セットアップコンテナを非表示
                setupContainer.classList.add('hidden');

                // 結果を表示
                results.classList.remove('hidden');

                // グループコンテナをクリア
                groupsContainer.innerHTML = '';

                // スポーツアイコン
                const sportsIcons = ['⚽', '🏀', '🏐', '🎾', '🏈', '⚾', '🏉', '🏓', '🏸', '🏊♂️', '🏄♀️', '🚴♂️'];

                // 各グループを表示
                groups.forEach((group, index) => {
                    const iconIndex = index % sportsIcons.length;
                    const groupDiv = document.createElement('div');
                    groupDiv.className = 'group-card bg-white rounded-xl p-4 shadow-lg border-t-4 border-blue-500 flex flex-col h-full';
                    groupDiv.dataset.groupIndex = index;

                    const groupHeader = document.createElement('div');
                    groupHeader.className = 'flex items-center justify-between mb-3 pb-2 border-b border-gray-200 flex-shrink-0';

                    groupHeader.innerHTML = `
                        <input type="text" value="グループ ${index + 1}" class="group-name-input text-lg font-bold text-blue-700 bg-transparent border-b-2 border-transparent hover:border-gray-300 focus:border-blue-500 focus:outline-none px-1 py-1 w-full mr-2 transition-colors" placeholder="グループ名を入力">
                        <span class="text-2xl flex-shrink-0">${sportsIcons[iconIndex]}</span>
                    `;

                    // グループのバランス表示（人数・男女比・平均点）
                    const summary = document.createElement('div');
                    summary.className = 'group-summary text-xs text-gray-500 mb-2 flex-shrink-0';
                    summary.dataset.groupIndex = index;

                    const membersList = document.createElement('ul');
                    membersList.className = 'member-drop-area space-y-2 flex-grow';
                    membersList.dataset.groupIndex = index;

                    // 出席番号順にソート
                    group.sort((a, b) => a.number - b.number);

                    group.forEach(member => {
                        const li = createMemberItem(member, index);
                        membersList.appendChild(li);
                    });

                    groupDiv.appendChild(groupHeader);
                    groupDiv.appendChild(summary);
                    groupDiv.appendChild(membersList);
                    groupsContainer.appendChild(groupDiv);
                });

                // ドラッグ＆ドロップの設定
                setupDragAndDrop();

                // 各グループのバランス表示を更新
                updateGroupSummaries();

                // ページの上部にスクロール
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            // 各グループの人数・男女比・平均点を見出しの下に表示（ドラッグ移動後も呼ぶ）
            function updateGroupSummaries() {
                document.querySelectorAll('.group-summary').forEach(el => {
                    const gi = parseInt(el.dataset.groupIndex);
                    const group = groupsResult[gi] || [];
                    const st = groupStats(group);
                    const genderParts = [];
                    if (st.male) genderParts.push(`<span class="text-blue-700 font-semibold">男${st.male}</span>`);
                    if (st.female) genderParts.push(`<span class="text-pink-700 font-semibold">女${st.female}</span>`);
                    const genderStr = genderParts.length ? '・' + genderParts.join(' ') : '';
                    // 平均点はスキル表示中のみ
                    const avgStr = isSkillVisible ? `・平均 <span class="font-semibold text-gray-700">${st.avg.toFixed(1)}</span>点` : '';
                    el.innerHTML = `${group.length}人${genderStr}${avgStr}`;
                });
            }

            // メンバーアイテムの作成
            function createMemberItem(member, groupIndex) {
                const li = document.createElement('li');
                li.className = 'member-item p-2 rounded-md border border-gray-200 bg-white';
                li.draggable = true;
                li.dataset.memberNumber = member.number;
                li.dataset.groupIndex = groupIndex;

                const displayName = member.name ?
                    `${member.number}. ${member.name}` :
                    `${member.number}`;

                let skillText = '';
                let skillBgColor = '';
                let skillTextColor = '';

                switch (member.skill) {
                    case 'very-good':
                        skillText = '得意';
                        skillBgColor = 'bg-blue-100';
                        skillTextColor = 'text-blue-800';
                        break;
                    case 'good':
                        skillText = '少し得意';
                        skillBgColor = 'bg-green-100';
                        skillTextColor = 'text-green-800';
                        break;
                    case 'neutral':
                        skillText = '普通';
                        skillBgColor = 'bg-gray-100';
                        skillTextColor = 'text-gray-800';
                        break;
                    case 'bad':
                        skillText = '少し苦手';
                        skillBgColor = 'bg-yellow-100';
                        skillTextColor = 'text-yellow-800';
                        break;
                    case 'very-bad':
                        skillText = '苦手';
                        skillBgColor = 'bg-red-100';
                        skillTextColor = 'text-red-800';
                        break;
                }

                const displayStyle = isSkillVisible ? 'inline-block' : 'none';

                // 男女バッジ（未設定のときは出さない）
                let genderBadge = '';
                if (member.gender === 'male') {
                    genderBadge = `<span class="text-xs font-semibold px-2 py-0.5 rounded-full bg-blue-100 text-blue-800 flex-shrink-0 mr-1">男子</span>`;
                } else if (member.gender === 'female') {
                    genderBadge = `<span class="text-xs font-semibold px-2 py-0.5 rounded-full bg-pink-100 text-pink-800 flex-shrink-0 mr-1">女子</span>`;
                }

                li.innerHTML = `
                    <div class="flex items-center w-full">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2 text-blue-500 flex-shrink-0" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
                        </svg>
                        <span class="flex-grow truncate mr-2">${displayName}</span>
                        ${genderBadge}
                        <span class="skill-label text-xs font-semibold px-2 py-0.5 rounded-full ${skillBgColor} ${skillTextColor} flex-shrink-0" style="display: ${displayStyle};">${skillText}</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="drag-icon h-4 w-4 ml-2 text-gray-400 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </div>
                `;

                return li;
            }

            // ドラッグ＆ドロップの設定
            function setupDragAndDrop() {
                const memberItems = document.querySelectorAll('.member-item');
                const dropAreas = document.querySelectorAll('.member-drop-area');

                let draggedItem = null;

                memberItems.forEach(item => {
                    // ドラッグ開始
                    item.addEventListener('dragstart', function (e) {
                        draggedItem = this;
                        setTimeout(() => {
                            this.classList.add('dragging');
                        }, 0);
                    });

                    // ドラッグ終了
                    item.addEventListener('dragend', function () {
                        this.classList.remove('dragging');
                    });
                });

                dropAreas.forEach(area => {
                    // ドラッグオーバー
                    area.addEventListener('dragover', function (e) {
                        e.preventDefault();
                        this.classList.add('highlight');
                    });

                    // ドラッグリーブ
                    area.addEventListener('dragleave', function () {
                        this.classList.remove('highlight');
                    });

                    // ドロップ
                    area.addEventListener('drop', function (e) {
                        e.preventDefault();
                        this.classList.remove('highlight');

                        if (draggedItem) {
                            // 元のグループと新しいグループのインデックス
                            const fromGroupIndex = parseInt(draggedItem.dataset.groupIndex);
                            const toGroupIndex = parseInt(this.dataset.groupIndex);

                            // メンバー番号
                            const memberNumber = parseInt(draggedItem.dataset.memberNumber);

                            // グループ間でメンバーを移動
                            if (fromGroupIndex !== toGroupIndex) {
                                // メンバーオブジェクトを見つける
                                const memberIndex = groupsResult[fromGroupIndex].findIndex(m => m.number === memberNumber);
                                if (memberIndex !== -1) {
                                    // メンバーを移動
                                    const member = groupsResult[fromGroupIndex].splice(memberIndex, 1)[0];
                                    groupsResult[toGroupIndex].push(member);

                                    // UIを更新
                                    this.appendChild(draggedItem);
                                    draggedItem.dataset.groupIndex = toGroupIndex;

                                    // バランス表示を更新
                                    updateGroupSummaries();
                                }
                            }
                        }
                    });
                });
            }

            // 印刷機能
            printGroupsBtn.addEventListener('click', function () {
                window.print();
            });

            // 入力フォームに戻る
            backToInputBtn.addEventListener('click', function () {
                results.classList.add('hidden');
                setupContainer.classList.remove('hidden');
                updateStepDisplay(1);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            // もう一度組み直す（同じメンバー・同じグループ数で別の組み合わせを作る）
            reshuffleBtn.addEventListener('click', function () {
                const count = groupsResult.length;
                if (!count) return;
                groupsResult = createBalancedGroups(members, count);
                showResults(groupsResult);
            });
        });
    </script>
