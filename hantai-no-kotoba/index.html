<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>はんたいの言葉</title>
  <style>
    :root {
      --ink: #2f2f2f;
      --paper: #fffdf7;
      --line: #f0dfc7;
      --green: #4caf8f;
      --yellow: #ffd75d;
      --red: #ef6f6c;
      --blue: #5aa9e6;
      --purple: #9b7ede;
      --shadow: 0 14px 30px rgba(76, 52, 25, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Hiragino Maru Gothic ProN", "BIZ UDPGothic", "Yu Gothic", sans-serif;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.7) 1px, transparent 1px),
        linear-gradient(rgba(255, 255, 255, 0.7) 1px, transparent 1px),
        #fff4d8;
      background-size: 34px 34px;
    }

    button {
      font: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 18px clamp(12px, 4vw, 28px) 28px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.55rem, 4vw, 2.35rem);
      line-height: 1.15;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 6px 0 0;
      color: #755b3d;
      font-size: clamp(0.86rem, 2.4vw, 1rem);
      font-weight: 700;
    }

    .score-board {
      min-width: 126px;
      padding: 10px 14px;
      border: 3px solid #fff;
      border-radius: 8px;
      background: #ffffffcc;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .score-label {
      display: block;
      color: #765b36;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .score-value {
      display: block;
      margin-top: 2px;
      color: #db6a2f;
      font-size: 1.5rem;
      font-weight: 900;
      line-height: 1;
    }

    .mode-panel {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
      padding: 12px;
      border: 3px solid #fff;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: var(--shadow);
    }

    .mode-info {
      color: #6b4b25;
      font-size: 0.95rem;
      font-weight: 900;
      line-height: 1.45;
    }

    .mode-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .mode-button {
      min-height: 42px;
      padding: 8px 12px;
      border: 3px solid #f0dfc7;
      border-radius: 8px;
      background: #fff;
      color: #5b4328;
      font-size: 0.95rem;
      font-weight: 900;
      cursor: pointer;
    }

    .mode-button.active {
      border-color: #4caf8f;
      background: #e5f7eb;
      color: #216b4f;
    }

    .game-shell {
      display: grid;
      grid-template-columns: minmax(0, 1.04fr) minmax(320px, 0.96fr);
      gap: 18px;
      align-items: stretch;
    }

    .question-panel,
    .answer-panel {
      border: 3px solid #fff;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .question-panel {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 570px;
    }

    .panel-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 2px solid #f5e6cf;
      background: #fffaf0;
    }

    .progress {
      color: #7a6040;
      font-size: 0.96rem;
      font-weight: 900;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 6px 12px;
      border-radius: 999px;
      background: #e9f7ef;
      color: #24694e;
      font-size: 0.88rem;
      font-weight: 900;
    }

    .photo-card {
      display: grid;
      place-items: center;
      position: relative;
      min-height: 330px;
      margin: 16px;
      border: 8px solid #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(66, 44, 22, 0.08), 0 10px 22px rgba(41, 29, 15, 0.14);
      background: #ccecff;
    }

    .photo-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 16% 15%, rgba(255, 255, 255, 0.78) 0 8%, transparent 9%),
        linear-gradient(180deg, rgba(255, 255, 255, 0.42), transparent 42%);
      pointer-events: none;
    }

    .photo-img {
      position: absolute;
      inset: 0;
      z-index: 2;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      background: #fff;
    }

    .photo-card.has-photo::before,
    .photo-card.has-photo .scene {
      display: none;
    }

    .photo-card.has-photo .photo-img {
      display: block;
    }

    .photo-card[data-scene="bad"] {
      background:
        radial-gradient(circle at 50% 82%, #d8b57a 0 11%, transparent 12%),
        radial-gradient(circle at 28% 28%, #ffe5cf 0 13%, transparent 14%),
        linear-gradient(180deg, #bde8ff 0 54%, #f5d78f 55% 100%);
    }

    .photo-card[data-scene="hot"] {
      background:
        radial-gradient(circle at 78% 18%, #fff182 0 10%, #ffb94d 11% 16%, transparent 17%),
        linear-gradient(180deg, #ffd191 0 48%, #f2b16d 49% 100%);
    }

    .photo-card[data-scene="big"] {
      background:
        radial-gradient(circle at 54% 62%, #85c96b 0 28%, transparent 29%),
        linear-gradient(180deg, #bfeaff 0 55%, #bde79b 56% 100%);
    }

    .photo-card[data-scene="fast"] {
      background:
        linear-gradient(100deg, transparent 0 20%, rgba(255,255,255,0.72) 21% 24%, transparent 25% 44%, rgba(255,255,255,0.58) 45% 48%, transparent 49% 100%),
        linear-gradient(180deg, #c8ebff 0 58%, #a9d67a 59% 100%);
    }

    .scene {
      position: relative;
      width: min(320px, 78vw);
      height: 240px;
      z-index: 1;
    }

    .person {
      position: absolute;
      left: 74px;
      bottom: 22px;
      width: 128px;
      height: 170px;
    }

    .head {
      position: absolute;
      left: 30px;
      top: 0;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #ffd8bd;
      border: 3px solid rgba(60, 36, 15, 0.18);
    }

    .hair {
      position: absolute;
      left: 28px;
      top: -5px;
      width: 78px;
      height: 37px;
      border-radius: 44px 44px 18px 18px;
      background: #473326;
    }

    .eye {
      position: absolute;
      top: 29px;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #422b1e;
    }

    .eye.left { left: 22px; }
    .eye.right { right: 22px; }

    .mouth {
      position: absolute;
      left: 27px;
      top: 48px;
      width: 22px;
      height: 12px;
      border-bottom: 4px solid #7d3b36;
      border-radius: 0 0 26px 26px;
    }

    .person.bad .mouth {
      top: 53px;
      border-top: 4px solid #7d3b36;
      border-bottom: 0;
      border-radius: 26px 26px 0 0;
    }

    .body {
      position: absolute;
      left: 18px;
      top: 73px;
      width: 92px;
      height: 92px;
      border-radius: 34px 34px 18px 18px;
      background: var(--blue);
      border: 3px solid rgba(45, 39, 23, 0.12);
    }

    .arm {
      position: absolute;
      top: 82px;
      width: 22px;
      height: 82px;
      border-radius: 999px;
      background: #ffd8bd;
    }

    .arm.left {
      left: 3px;
      transform: rotate(24deg);
    }

    .arm.right {
      right: 1px;
      transform: rotate(-34deg);
    }

    .person.hot .body { background: #ef6f6c; }
    .person.fast {
      left: 118px;
      transform: rotate(-10deg);
    }
    .person.fast .arm.left { transform: rotate(72deg); }
    .person.fast .arm.right { transform: rotate(-76deg); }
    .person.fast .body { background: var(--purple); }

    .plate {
      position: absolute;
      right: 38px;
      bottom: 26px;
      width: 112px;
      height: 42px;
      border-radius: 50%;
      background: #fff;
      border: 5px solid #cce4ef;
      box-shadow: 0 8px 0 rgba(42, 29, 12, 0.1);
    }

    .plate::after {
      content: "";
      position: absolute;
      left: 31px;
      top: 5px;
      width: 42px;
      height: 20px;
      border-radius: 50%;
      background: #6b7445;
      box-shadow: 14px 6px 0 #9d593c;
    }

    .steam {
      position: absolute;
      left: 210px;
      bottom: 75px;
      width: 16px;
      height: 64px;
      border-left: 5px solid rgba(255, 255, 255, 0.84);
      border-radius: 50%;
      transform: rotate(12deg);
    }

    .sun-person {
      left: 94px;
    }

    .sweat {
      position: absolute;
      left: 91px;
      top: 34px;
      width: 14px;
      height: 22px;
      border-radius: 10px 10px 10px 2px;
      background: #60c5ef;
      transform: rotate(18deg);
    }

    .tree {
      position: absolute;
      left: 82px;
      bottom: 24px;
      width: 118px;
      height: 178px;
      border-radius: 50% 50% 42% 42%;
      background: #5da85a;
      box-shadow: -38px 30px 0 #6fbd68, 42px 36px 0 #78c36b;
    }

    .trunk {
      position: absolute;
      left: 139px;
      bottom: 24px;
      width: 42px;
      height: 92px;
      border-radius: 12px 12px 0 0;
      background: #9d6739;
    }

    .small-tree {
      position: absolute;
      right: 28px;
      bottom: 26px;
      width: 68px;
      height: 94px;
      border-radius: 50% 50% 42% 42%;
      background: #83c86f;
    }

    .small-tree::after {
      content: "";
      position: absolute;
      left: 25px;
      bottom: -38px;
      width: 22px;
      height: 46px;
      background: #a66e3e;
    }

    .speed-line {
      position: absolute;
      left: 22px;
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.88);
    }

    .speed-line.one { top: 62px; width: 112px; }
    .speed-line.two { top: 112px; width: 156px; }
    .speed-line.three { top: 164px; width: 96px; }

    .word-area {
      padding: 0 18px 18px;
      text-align: center;
    }

    .question-text {
      margin: 0;
      color: #6b4b25;
      font-size: clamp(1rem, 2.6vw, 1.15rem);
      font-weight: 900;
    }

    .question-word {
      display: inline-block;
      margin-top: 8px;
      padding: 10px 24px 13px;
      border: 4px solid var(--yellow);
      border-radius: 8px;
      background: #fff;
      color: #e4584b;
      font-size: clamp(2.6rem, 9vw, 4.5rem);
      font-weight: 900;
      line-height: 1;
    }

    .answer-panel {
      display: flex;
      flex-direction: column;
      padding: 18px;
    }

    .answer-title {
      margin: 0 0 12px;
      color: #533c22;
      font-size: clamp(1.2rem, 3vw, 1.55rem);
      font-weight: 900;
      line-height: 1.25;
    }

    .choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      flex: 1;
    }

    .choice {
      min-height: 112px;
      border: 4px solid #f0dfc7;
      border-radius: 8px;
      background: #fff;
      color: #3c332a;
      font-size: clamp(1.32rem, 4vw, 2rem);
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 5px 0 #d9c6ad;
      transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease, background 0.12s ease;
    }

    .choice:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 #d9c6ad;
    }

    .choice.correct {
      border-color: #2ca873;
      background: #dff7e8;
      color: #16724a;
      box-shadow: 0 5px 0 #87caa9;
    }

    .choice.wrong {
      border-color: #ef746b;
      background: #ffe2df;
      color: #b13d34;
      box-shadow: 0 5px 0 #e6aaa4;
    }

    .feedback {
      min-height: 78px;
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      background: #fff7e8;
      color: #624525;
      font-size: clamp(1rem, 2.6vw, 1.18rem);
      font-weight: 900;
      line-height: 1.45;
    }

    .judge-mark {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 6;
      place-items: center;
      pointer-events: none;
      background: rgba(255, 255, 255, 0.08);
    }

    .judge-mark.show {
      display: grid;
    }

    .judge-symbol {
      display: grid;
      place-items: center;
      width: min(58vw, 300px);
      height: min(58vw, 300px);
      border: 14px solid currentColor;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.92);
      font-size: clamp(8rem, 32vw, 16rem);
      font-weight: 900;
      line-height: 1;
      text-align: center;
      box-shadow: 0 20px 55px rgba(40, 24, 8, 0.24);
      animation: judgePop 0.72s ease both;
    }

    .judge-mark.correct .judge-symbol {
      color: #18a65f;
    }

    .judge-mark.wrong .judge-symbol {
      color: #e54f45;
      border-radius: 8px;
    }

    @keyframes judgePop {
      0% {
        opacity: 0;
        transform: scale(0.36) rotate(-8deg);
      }
      42% {
        opacity: 1;
        transform: scale(1.12) rotate(3deg);
      }
      70% {
        transform: scale(0.96) rotate(0deg);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .next,
    .reset {
      min-height: 52px;
      border: 0;
      border-radius: 8px;
      color: #fff;
      font-size: 1.05rem;
      font-weight: 900;
      cursor: pointer;
    }

    .next {
      flex: 1;
      background: var(--green);
      box-shadow: 0 5px 0 #2f8068;
    }

    .reset {
      width: 96px;
      background: #8a7b6b;
      box-shadow: 0 5px 0 #5d5044;
    }

    .next:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .result {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 5;
      place-items: center;
      padding: 20px;
      background: rgba(72, 45, 14, 0.32);
    }

    .result.show {
      display: grid;
    }

    .result-card {
      width: min(460px, 100%);
      padding: 26px 20px;
      border: 5px solid #fff;
      border-radius: 8px;
      background: #fffaf0;
      box-shadow: 0 18px 48px rgba(38, 28, 12, 0.26);
      text-align: center;
    }

    .result-card h2 {
      margin: 0 0 10px;
      font-size: clamp(1.8rem, 7vw, 2.8rem);
    }

    .result-card p {
      margin: 0 0 20px;
      color: #694a24;
      font-size: 1.2rem;
      font-weight: 900;
    }

    .result-card button {
      min-height: 56px;
      padding: 0 22px;
      border: 0;
      border-radius: 8px;
      background: #db6a2f;
      color: white;
      font-size: 1.15rem;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 5px 0 #9d4720;
    }

    @media (max-width: 820px) {
      header {
        align-items: flex-start;
      }

      .game-shell {
        grid-template-columns: 1fr;
      }

      .question-panel {
        min-height: auto;
      }

      .photo-card {
        min-height: 270px;
      }

      .answer-panel {
        min-height: 430px;
      }
    }

    @media (max-width: 520px) {
      .app {
        padding-top: 12px;
      }

      header {
        flex-direction: column;
      }

      .score-board {
        width: 100%;
      }

      .mode-panel {
        align-items: stretch;
        flex-direction: column;
      }

      .mode-buttons {
        justify-content: stretch;
      }

      .mode-button {
        flex: 1;
      }

      .panel-top {
        align-items: flex-start;
        flex-direction: column;
      }

      .choices {
        grid-template-columns: 1fr;
      }

      .choice {
        min-height: 74px;
      }

      .answer-panel {
        min-height: auto;
      }

      .scene {
        transform: scale(0.88);
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>はんたいの言葉</h1>
        <p class="subtitle">写真と言葉を見て、はんたいの意味をえらぼう</p>
      </div>
      <div class="score-board" aria-live="polite">
        <span class="score-label">せいかい</span>
        <span class="score-value"><span id="score">0</span>/<span id="total">10</span></span>
      </div>
    </header>

    <section class="mode-panel" aria-label="出題数を選ぶ">
      <div class="mode-info">
        <span id="bankCount">150</span>問からランダムに出題。
      </div>
      <div class="mode-buttons">
        <button class="mode-button active" type="button" data-count="10">10問</button>
        <button class="mode-button" type="button" data-count="20">20問</button>
        <button class="mode-button" type="button" data-count="all">ぜんぶ</button>
      </div>
    </section>

    <section class="game-shell" aria-label="はんたいの言葉ゲーム">
      <div class="question-panel">
        <div class="panel-top">
          <div class="progress" id="progress">1もんめ</div>
          <div class="pill">はんたいの言葉はどれ？</div>
        </div>

        <div class="photo-card" id="photoCard" data-scene="bad" aria-label="問題の写真風イラスト">
          <img class="photo-img" id="photoImg" alt="">
          <div class="scene" id="scene"></div>
        </div>

        <div class="word-area">
          <p class="question-text">この言葉のはんたいは？</p>
          <div class="question-word" id="questionWord">まずい</div>
        </div>
      </div>

      <div class="answer-panel">
        <h2 class="answer-title">4つの中から1つえらんでね</h2>
        <div class="choices" id="choices"></div>
        <div class="feedback" id="feedback">写真と言葉をよく見て、答えをタップしよう。</div>
        <div class="controls">
          <button class="reset" id="resetButton" type="button">はじめ</button>
          <button class="next" id="nextButton" type="button" disabled>つぎへ</button>
        </div>
      </div>
    </section>
  </main>

  <div class="judge-mark" id="judgeMark" aria-hidden="true">
    <div class="judge-symbol" id="judgeSymbol">○</div>
  </div>

  <div class="result" id="result">
    <div class="result-card">
      <h2 id="resultTitle">よくできました</h2>
      <p id="resultText">4もん中 4もん せいかい！</p>
      <button type="button" id="againButton">もういちど</button>
    </div>
  </div>

  <script src="questions.js"></script>
  <script>
    const scenes = {
      bad: `
        <div class="person bad">
          <div class="hair"></div><div class="head"><span class="eye left"></span><span class="eye right"></span><span class="mouth"></span></div>
          <div class="body"></div><div class="arm left"></div><div class="arm right"></div>
        </div>
        <div class="plate"></div><div class="steam"></div>
      `,
      hot: `
        <div class="person hot sun-person">
          <div class="hair"></div><div class="head"><span class="eye left"></span><span class="eye right"></span><span class="mouth"></span><span class="sweat"></span></div>
          <div class="body"></div><div class="arm left"></div><div class="arm right"></div>
        </div>
      `,
      big: `
        <div class="trunk"></div><div class="tree"></div><div class="small-tree"></div>
      `,
      fast: `
        <div class="speed-line one"></div><div class="speed-line two"></div><div class="speed-line three"></div>
        <div class="person fast">
          <div class="hair"></div><div class="head"><span class="eye left"></span><span class="eye right"></span><span class="mouth"></span></div>
          <div class="body"></div><div class="arm left"></div><div class="arm right"></div>
        </div>
      `
    };

    const scoreEl = document.getElementById("score");
    const totalEl = document.getElementById("total");
    const bankCountEl = document.getElementById("bankCount");
    const progressEl = document.getElementById("progress");
    const photoCard = document.getElementById("photoCard");
    const photoImg = document.getElementById("photoImg");
    const sceneEl = document.getElementById("scene");
    const questionWordEl = document.getElementById("questionWord");
    const choicesEl = document.getElementById("choices");
    const feedbackEl = document.getElementById("feedback");
    const nextButton = document.getElementById("nextButton");
    const resetButton = document.getElementById("resetButton");
    const result = document.getElementById("result");
    const resultTitle = document.getElementById("resultTitle");
    const resultText = document.getElementById("resultText");
    const againButton = document.getElementById("againButton");
    const modeButtons = document.querySelectorAll(".mode-button");
    const judgeMark = document.getElementById("judgeMark");
    const judgeSymbol = document.getElementById("judgeSymbol");

    const questionBank = window.HANTAI_WORDS || [];
    const allChoiceWords = [...new Set(questionBank.flatMap((item) => [item.word, item.answer]))];
    let current = 0;
    let score = 0;
    let answered = false;
    let questionCount = 10;
    let questions = [];

    bankCountEl.textContent = questionBank.length;

    function shuffle(items) {
      const copied = [...items];
      for (let i = copied.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copied[i], copied[j]] = [copied[j], copied[i]];
      }
      return copied;
    }

    function makeChoices(item) {
      const distractors = allChoiceWords.filter((word) => word !== item.word && word !== item.answer);
      return shuffle([item.answer, ...shuffle(distractors).slice(0, 3)]);
    }

    function makeMessage(item) {
      return item.message || `「${item.word}」のはんたいは「${item.answer}」。反対の意味になる言葉だね。`;
    }

    function buildQuestionSet() {
      const limit = questionCount === "all" ? questionBank.length : questionCount;
      questions = shuffle(questionBank).slice(0, limit).map((item) => ({
        ...item,
        choices: item.choices || makeChoices(item),
        message: makeMessage(item)
      }));
      totalEl.textContent = questions.length;
    }

    function setPhoto(item) {
      photoCard.classList.remove("has-photo");
      photoImg.removeAttribute("src");
      photoImg.alt = `${item.word}の写真`;

      if (!item.image) return;

      photoImg.onerror = () => {
        photoCard.classList.remove("has-photo");
        photoImg.removeAttribute("src");
      };
      photoImg.onload = () => {
        photoCard.classList.add("has-photo");
      };
      photoImg.src = item.image;
    }

    function renderQuestion() {
      const item = questions[current];
      answered = false;
      judgeMark.classList.remove("show", "correct", "wrong");
      progressEl.textContent = `${current + 1}もんめ / ${questions.length}もん`;
      photoCard.dataset.scene = item.scene;
      sceneEl.innerHTML = scenes[item.scene] || scenes.big;
      setPhoto(item);
      questionWordEl.textContent = item.word;
      feedbackEl.textContent = "写真と言葉をよく見て、答えをタップしよう。";
      nextButton.disabled = true;
      nextButton.textContent = current === questions.length - 1 ? "けっかを見る" : "つぎへ";
      choicesEl.innerHTML = "";

      item.choices.forEach((choice) => {
        const button = document.createElement("button");
        button.className = "choice";
        button.type = "button";
        button.textContent = choice;
        button.addEventListener("click", () => checkAnswer(button, choice));
        choicesEl.appendChild(button);
      });
    }

    function showJudge(isCorrect) {
      judgeMark.classList.remove("show", "correct", "wrong");
      judgeSymbol.textContent = isCorrect ? "○" : "×";
      judgeMark.classList.add(isCorrect ? "correct" : "wrong");

      window.requestAnimationFrame(() => {
        judgeMark.classList.add("show");
      });

      window.setTimeout(() => {
        judgeMark.classList.remove("show");
      }, 900);
    }

    function checkAnswer(button, choice) {
      if (answered) return;

      const item = questions[current];
      answered = true;
      const isCorrect = choice === item.answer;
      showJudge(isCorrect);

      if (isCorrect) {
        score += 1;
        scoreEl.textContent = score;
        feedbackEl.textContent = `せいかい！ ${item.message}`;
        button.classList.add("correct");
      } else {
        feedbackEl.textContent = `おしい！ 正解は「${item.answer}」。${item.message}`;
        button.classList.add("wrong");
      }

      [...choicesEl.children].forEach((choiceButton) => {
        choiceButton.disabled = true;
        if (choiceButton.textContent === item.answer) {
          choiceButton.classList.add("correct");
        }
      });

      nextButton.disabled = false;
    }

    function nextQuestion() {
      if (!answered) return;

      if (current < questions.length - 1) {
        current += 1;
        renderQuestion();
      } else {
        showResult();
      }
    }

    function showResult() {
      resultTitle.textContent = score === questions.length ? "ぜんぶせいかい！" : "よくできました";
      resultText.textContent = `${questions.length}もん中 ${score}もん せいかい！`;
      result.classList.add("show");
    }

    function resetGame() {
      current = 0;
      score = 0;
      scoreEl.textContent = score;
      result.classList.remove("show");
      buildQuestionSet();
      renderQuestion();
    }

    nextButton.addEventListener("click", nextQuestion);
    resetButton.addEventListener("click", resetGame);
    againButton.addEventListener("click", resetGame);
    modeButtons.forEach((button) => {
      button.addEventListener("click", () => {
        modeButtons.forEach((modeButton) => modeButton.classList.remove("active"));
        button.classList.add("active");
        questionCount = button.dataset.count === "all" ? "all" : Number(button.dataset.count);
        resetGame();
      });
    });

    resetGame();
  </script>
</body>
</html>
