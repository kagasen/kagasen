<svg xmlns="http://www.w3.org/2000/svg" width="400" height="260" viewBox="0 0 400 260" font-family="'Baloo 2','Zen Maru Gothic','Hiragino Maru Gothic ProN','Rounded Mplus 1c',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFF9EE"/><stop offset="1" stop-color="#FBEFD9"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FF8FA3"/><stop offset="0.2" stop-color="#FF9F68"/><stop offset="0.4" stop-color="#FFC94D"/><stop offset="0.6" stop-color="#6BCB77"/><stop offset="0.8" stop-color="#5BC9F5"/><stop offset="1" stop-color="#B28DFF"/>
    </linearGradient>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse"><circle cx="4" cy="4" r="2.2" fill="#EFE2C9"/></pattern>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="260" fill="url(#bg)"/>
  <rect width="400" height="260" fill="url(#dots)" opacity="0.5"/>
  <rect width="400" height="8" fill="url(#bar)"/>

  <!-- タイトル -->
  <text x="24" y="58" font-size="30" font-weight="800" fill="#9165F0">自分レベルアップ</text>
  <text x="24" y="92" font-size="30" font-weight="800" fill="#9165F0">アドベンチャー</text>
  <text x="26" y="119" font-size="14" font-weight="700" fill="#8C7A5E">毎日の習慣で レベルアップ！</text>

  <!-- HUDバッジ：レベル -->
  <g transform="translate(24,150)">
    <rect width="96" height="34" rx="17" fill="#fff" stroke="#EFE3CE" stroke-width="2"/>
    <circle cx="20" cy="17" r="13" fill="#9165F0"/>
    <text x="20" y="22" font-size="12" font-weight="800" fill="#fff" text-anchor="middle">Lv</text>
    <text x="44" y="23" font-size="17" font-weight="800" fill="#5A4A36">8</text>
  </g>
  <!-- HUDバッジ：コイン -->
  <g transform="translate(130,150)">
    <rect width="104" height="34" rx="17" fill="#fff" stroke="#EFE3CE" stroke-width="2"/>
    <circle cx="19" cy="17" r="12" fill="#FFC94D" stroke="#E0A400" stroke-width="1.5"/>
    <text x="19" y="22" font-size="11" font-weight="900" fill="#fff" text-anchor="middle">●</text>
    <text x="44" y="23" font-size="17" font-weight="800" fill="#5A4A36">340</text>
  </g>
  <!-- ストリーク炎 -->
  <g transform="translate(24,196)">
    <rect width="96" height="34" rx="17" fill="#FFF1DC" stroke="#F4D9A8" stroke-width="2"/>
    <text x="16" y="24" font-size="18">🔥</text>
    <text x="40" y="23" font-size="16" font-weight="800" fill="#C9871B">7日</text>
  </g>
  <!-- ⚔️たいせん リボン（対戦演出を示唆） -->
  <g transform="translate(130,196)">
    <rect width="104" height="34" rx="17" fill="#FFE3E8" stroke="#FFC2CD" stroke-width="2"/>
    <text x="14" y="24" font-size="16">⚔️</text>
    <text x="36" y="23" font-size="14" font-weight="800" fill="#E0566B">たいせん</text>
  </g>

  <!-- キャラ台座 -->
  <ellipse cx="306" cy="226" rx="76" ry="15" fill="#EAD9BE" opacity="0.7"/>

  <!-- フラットなアバター（アプリの男の子イメージ） -->
  <g transform="translate(306,150)">
    <!-- 足 -->
    <rect x="-20" y="58" width="14" height="20" rx="6" fill="#3FB07A"/>
    <rect x="6" y="58" width="14" height="20" rx="6" fill="#3FB07A"/>
    <ellipse cx="-13" cy="80" rx="10" ry="6" fill="#fff" stroke="#E5D9C4" stroke-width="1.5"/>
    <ellipse cx="13" cy="80" rx="10" ry="6" fill="#fff" stroke="#E5D9C4" stroke-width="1.5"/>
    <!-- 体（青Tシャツ） -->
    <path d="M-24 16 Q-24 6 -14 4 L14 4 Q24 6 24 16 L24 56 Q24 62 18 62 L-18 62 Q-24 62 -24 56 Z" fill="#5BC9F5"/>
    <!-- 腕 -->
    <rect x="-32" y="18" width="12" height="30" rx="6" fill="#5BC9F5"/>
    <rect x="20" y="18" width="12" height="30" rx="6" fill="#5BC9F5"/>
    <circle cx="-26" cy="50" r="7" fill="#FBD9B8"/>
    <circle cx="26" cy="50" r="7" fill="#FBD9B8"/>
    <!-- 顔 -->
    <circle cx="0" cy="-18" r="28" fill="#FBD9B8"/>
    <!-- 髪 -->
    <path d="M-28 -22 Q-30 -50 0 -50 Q30 -50 28 -22 Q20 -38 0 -38 Q-20 -38 -28 -22 Z" fill="#6B4A2E"/>
    <path d="M-2 -49 Q4 -56 8 -47" fill="none" stroke="#6B4A2E" stroke-width="5" stroke-linecap="round"/>
    <!-- 目（にこにこ） -->
    <path d="M-14 -20 Q-9 -14 -4 -20" fill="none" stroke="#3A2A1A" stroke-width="3" stroke-linecap="round"/>
    <path d="M4 -20 Q9 -14 14 -20" fill="none" stroke="#3A2A1A" stroke-width="3" stroke-linecap="round"/>
    <!-- ほっぺ -->
    <circle cx="-16" cy="-10" r="4.5" fill="#FF9DB0" opacity="0.7"/>
    <circle cx="16" cy="-10" r="4.5" fill="#FF9DB0" opacity="0.7"/>
    <!-- 口 -->
    <path d="M-7 -8 Q0 -1 7 -8" fill="none" stroke="#C9603F" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- 相棒ペット（くまブロブ） -->
  <g transform="translate(360,168)">
    <circle cx="-9" cy="-9" r="6" fill="#C8915E"/>
    <circle cx="9" cy="-9" r="6" fill="#C8915E"/>
    <circle cx="0" cy="2" r="16" fill="#D89E68"/>
    <circle cx="-6" cy="-1" r="2.4" fill="#3A2A1A"/>
    <circle cx="6" cy="-1" r="2.4" fill="#3A2A1A"/>
    <ellipse cx="0" cy="6" rx="6" ry="4.5" fill="#F2DCC2"/>
    <circle cx="0" cy="4" r="1.8" fill="#3A2A1A"/>
  </g>

  <!-- 称号 -->
  <text x="306" y="244" font-size="12" font-weight="700" fill="#9165F0" text-anchor="middle">『三日坊主そつぎょう』</text>
</svg>
