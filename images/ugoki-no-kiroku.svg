<svg xmlns="http://www.w3.org/2000/svg" width="400" height="260" viewBox="0 0 400 260" font-family="'Baloo 2','Zen Maru Gothic','Hiragino Maru Gothic ProN','Rounded Mplus 1c',sans-serif">
  <defs>
    <linearGradient id="ug-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0C3B77"/>
      <stop offset="0.55" stop-color="#1D6FC4"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="ug-track" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F97316"/>
      <stop offset="1" stop-color="#C2410C"/>
    </linearGradient>
    <linearGradient id="ug-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FDE68A"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <radialGradient id="ug-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="260" fill="url(#ug-bg)"/>
  <!-- 放射光 -->
  <g opacity="0.10" fill="#FFFFFF">
    <polygon points="170,140 -40,10 -40,70"/>
    <polygon points="170,140 60,-40 130,-40"/>
    <polygon points="170,140 300,-40 360,-40"/>
    <polygon points="170,140 440,40 440,100"/>
    <polygon points="170,140 440,180 440,230"/>
    <polygon points="170,140 -40,150 -40,210"/>
  </g>
  <circle cx="170" cy="130" r="120" fill="url(#ug-glow)"/>

  <!-- キラキラ -->
  <g fill="#FDE68A">
    <path d="M94,32 l3.5,8 8,3.5 -8,3.5 -3.5,8 -3.5,-8 -8,-3.5 8,-3.5 Z"/>
    <path d="M330,196 l3,7 7,3 -7,3 -3,7 -3,-7 -7,-3 7,-3 Z"/>
    <circle cx="318" cy="34" r="3"/>
    <circle cx="40" cy="120" r="2.5"/>
    <circle cx="256" cy="120" r="2.5"/>
  </g>

  <!-- トラック(下部) -->
  <path d="M-10,214 Q200,190 410,214 L410,260 L-10,260 Z" fill="url(#ug-track)"/>
  <path d="M-10,228 Q200,205 410,228" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-dasharray="18 12" opacity="0.85"/>
  <path d="M-10,244 Q200,222 410,244" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-dasharray="18 12" opacity="0.6"/>

  <!-- スピードライン -->
  <g stroke="#BFE7FF" stroke-width="5" stroke-linecap="round" opacity="0.8">
    <line x1="52" y1="128" x2="100" y2="128"/>
    <line x1="40" y1="148" x2="96" y2="148"/>
    <line x1="58" y1="168" x2="102" y2="168"/>
  </g>

  <!-- なわとびするひよこ(主役) -->
  <g transform="translate(158,138) rotate(-4)">
    <!-- なわ -->
    <path d="M-46,6 C-62,66 62,66 46,6" fill="none" stroke="#FB923C" stroke-width="6" stroke-linecap="round"/>
    <path d="M-46,6 C-62,-58 62,-58 46,6" fill="none" stroke="#FB923C" stroke-width="4.5" stroke-linecap="round" stroke-dasharray="7 8" opacity="0.6"/>
    <!-- もちて -->
    <line x1="-46" y1="-2" x2="-46" y2="10" stroke="#7C2D12" stroke-width="7" stroke-linecap="round"/>
    <line x1="46" y1="-2" x2="46" y2="10" stroke="#7C2D12" stroke-width="7" stroke-linecap="round"/>
    <!-- からだ -->
    <circle cx="0" cy="14" r="30" fill="#FFE066" stroke="#F3C947" stroke-width="4"/>
    <!-- つばさ -->
    <path d="M-28,10 q-14,-4 -18,-14" stroke="#F3C947" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M28,10 q14,-4 18,-14" stroke="#F3C947" stroke-width="7" fill="none" stroke-linecap="round"/>
    <!-- あたま -->
    <circle cx="0" cy="-12" r="21" fill="#FFE879" stroke="#F3C947" stroke-width="4"/>
    <circle cx="-7.5" cy="-14" r="3.6" fill="#2B2B2B"/>
    <circle cx="7.5" cy="-14" r="3.6" fill="#2B2B2B"/>
    <circle cx="-13" cy="-7" r="4" fill="#FDA4AF" opacity="0.7"/>
    <circle cx="13" cy="-7" r="4" fill="#FDA4AF" opacity="0.7"/>
    <polygon points="-4,-7 4,-7 0,-1" fill="#FB923C"/>
    <!-- あし(ジャンプ中) -->
    <path d="M-10,42 l-4,8 M10,42 l4,8" stroke="#FB923C" stroke-width="5" stroke-linecap="round"/>
  </g>

  <!-- スポーツアイコン(右側にうかぶ) -->
  <g>
    <!-- サッカー -->
    <g transform="translate(294,110)">
      <circle r="19" fill="#FFFFFF" stroke="#0C3B77" stroke-width="3"/>
      <polygon points="0,-8 7.6,-2.5 4.7,6.5 -4.7,6.5 -7.6,-2.5" fill="#0C3B77"/>
      <path d="M0,-8 L0,-19 M7.6,-2.5 L18,-6 M4.7,6.5 L11,15 M-4.7,6.5 L-11,15 M-7.6,-2.5 L-18,-6" stroke="#0C3B77" stroke-width="2.5" fill="none"/>
    </g>
    <!-- バスケ -->
    <g transform="translate(352,90)">
      <circle r="16" fill="#F59E0B" stroke="#7C2D12" stroke-width="3"/>
      <path d="M-16,0 H16 M0,-16 V16 M-11,-11 q11,11 22,0 M-11,11 q11,-11 22,0" stroke="#7C2D12" stroke-width="2.2" fill="none"/>
    </g>
    <!-- すいえいのなみ -->
    <g transform="translate(352,148)">
      <circle r="17" fill="#E0F4FF" stroke="#0C3B77" stroke-width="3"/>
      <path d="M-10,-3 q5,-6 10,0 t10,0 M-10,6 q5,-6 10,0 t10,0" stroke="#0891B2" stroke-width="2.6" fill="none" stroke-linecap="round"/>
    </g>
    <!-- とびばこ -->
    <g transform="translate(302,166)">
      <circle r="18" fill="#FFFFFF" stroke="#0C3B77" stroke-width="3"/>
      <g stroke="#B45309" stroke-width="1.8">
        <path d="M-6,-9 h12 l2,5 h-16 Z" fill="#C2410C"/>
        <polygon points="-9,-4 9,-4 11,2 -11,2" fill="#FDE68A"/>
        <polygon points="-11,2 11,2 13,9 -13,9" fill="#FBBF24"/>
      </g>
    </g>
    <!-- きんメダル -->
    <g transform="translate(52,72)">
      <path d="M-6,-18 L0,-6 L6,-18 Z" fill="#EF4444"/>
      <circle r="13" fill="url(#ug-gold)" stroke="#B45309" stroke-width="2.5"/>
      <path d="M0,-7 l2.2,4.6 5,0.7 -3.6,3.5 0.9,5 -4.5,-2.4 -4.5,2.4 0.9,-5 -3.6,-3.5 5,-0.7 Z" fill="#B45309"/>
    </g>
  </g>

  <!-- タイトル -->
  <g transform="rotate(-2 200 40)">
    <text x="200" y="52" text-anchor="middle" font-size="44" font-weight="800" fill="#FFFFFF" stroke="#0C3B77" stroke-width="9" paint-order="stroke" stroke-linejoin="round">うごきのきろく</text>
    <text x="330" y="24" font-size="15" font-weight="800" fill="#FDE68A" transform="rotate(8 330 24)">✦</text>
  </g>

  <!-- リボン -->
  <g transform="translate(200,205)">
    <rect x="-128" y="-15" width="256" height="30" rx="15" fill="#0C3B77" opacity="0.88"/>
    <text x="0" y="6" text-anchor="middle" font-size="16" font-weight="800" fill="#FFFFFF">12しゅもく × バッジ<tspan fill="#FDE68A">132</tspan>こ あつめよう!</text>
  </g>

  <!-- あそびかたコピー -->
  <text x="200" y="82" text-anchor="middle" font-size="13.5" font-weight="700" fill="#DBEFFF">きろくするほど あいぼうが でんせつのとりに!</text>
</svg>
