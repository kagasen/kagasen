<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>かがせんのHAPPYアプリ集 | 小学生向けの安全な無料教育アプリ</title>
    <meta name="description" content="かがせんのHAPPYアプリ集は、小学生・先生向けのシンプルで安全な教育・学習アプリ集です。学校の授業やご家庭で安心して使えるよう、広告なし・フィルタリング（i-フィルター等）対応済みの安全なサイトです。">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'pop': ['"Mochiy Pop One"', 'sans-serif'],
                        'maru': ['"Zen Maru Gothic"', 'sans-serif'],
                    },
                    colors: {
                        'natural-brown': '#5D4037',
                    },
                }
            }
        }
    </script>

    <style>
        :root {
            --c-red: #FF8FA3;
            --c-blue: #5BC9F5;
            --c-green: #6BCB77;
            --c-yellow: #FFC94D;
            --c-orange: #FF9F68;
            --c-purple: #B28DFF;
            --ink: #4A3B32;
        }

        body {
            background-color: #FFF9EE;
            background-image:
                radial-gradient(#FFE3C2 1.5px, transparent 1.5px),
                radial-gradient(#FFE9F0 1.5px, transparent 1.5px);
            background-size: 36px 36px;
            background-position: 0 0, 18px 18px;
            color: var(--ink);
            overflow-x: hidden;
        }

        /* ===== にじいろライン ===== */
        .rainbow-bar {
            height: 6px;
            background: linear-gradient(90deg,
                var(--c-red), var(--c-orange), var(--c-yellow),
                var(--c-green), var(--c-blue), var(--c-purple), var(--c-red));
            background-size: 200% 100%;
            animation: rainbowSlide 8s linear infinite;
        }

        @keyframes rainbowSlide {
            to { background-position: 200% 0; }
        }

        /* ===== タイトル文字あそび ===== */
        .title-char {
            display: inline-block;
            transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        h1:hover .title-char {
            animation: charJump 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .title-char:nth-child(6n+1) { color: #FF6B81; }
        .title-char:nth-child(6n+2) { color: #FF9F45; }
        .title-char:nth-child(6n+3) { color: #F5B800; }
        .title-char:nth-child(6n+4) { color: #4CAF6E; }
        .title-char:nth-child(6n+5) { color: #38B6E3; }
        .title-char:nth-child(6n+6) { color: #9C7BEB; }

        @keyframes charJump {
            0% { transform: translateY(0); }
            40% { transform: translateY(-10px) rotate(-6deg); }
            70% { transform: translateY(2px) rotate(3deg); }
            100% { transform: translateY(0); }
        }

        h1:hover .title-char:nth-child(2n) { animation-delay: 0.05s; }
        h1:hover .title-char:nth-child(3n) { animation-delay: 0.1s; }
        h1:hover .title-char:nth-child(5n) { animation-delay: 0.15s; }

        /* ===== ふわふわ飾り ===== */
        .floaty {
            position: fixed;
            pointer-events: none;
            user-select: none;
            opacity: 0.5;
            z-index: 0;
            animation: floaty 7s ease-in-out infinite;
        }

        @keyframes floaty {
            0%, 100% { transform: translateY(0) rotate(-6deg); }
            50% { transform: translateY(-18px) rotate(6deg); }
        }

        /* ===== 検索バー ===== */
        .search-box {
            border: 3px solid #FFE0B2;
            transition: border-color 0.25s, box-shadow 0.25s, transform 0.25s;
        }

        .search-box:focus-within {
            border-color: var(--c-yellow);
            box-shadow: 0 0 0 5px rgba(255, 201, 77, 0.25);
            transform: scale(1.02);
        }

        /* ===== カテゴリボタン ===== */
        .filter-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            padding: 9px 18px;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 0.08em;
            background: #fff;
            color: #9c8b80;
            border: 2.5px solid #F3E5D8;
            box-shadow: 0 3px 0 #F3E5D8;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .filter-btn:hover {
            transform: translateY(-3px) rotate(-1.5deg) scale(1.05);
            box-shadow: 0 6px 0 #F3E5D8;
        }

        .filter-btn:active {
            transform: translateY(1px);
            box-shadow: 0 1px 0 #F3E5D8;
        }

        .filter-btn.active {
            color: #fff;
            border-color: transparent;
            transform: scale(1.06);
        }

        .filter-btn.active[data-category="all"]       { background: linear-gradient(135deg, #FF9F68, #FF6B81); box-shadow: 0 4px 0 #E0566B; }
        .filter-btn.active[data-category="japanese"]  { background: linear-gradient(135deg, #FF8FA3, #FF6B81); box-shadow: 0 4px 0 #E0566B; }
        .filter-btn.active[data-category="math"]      { background: linear-gradient(135deg, #5BC9F5, #38A8E0); box-shadow: 0 4px 0 #2D8BBE; }
        .filter-btn.active[data-category="science"]   { background: linear-gradient(135deg, #6BCB77, #43A85B); box-shadow: 0 4px 0 #378A4B; }
        .filter-btn.active[data-category="social"]    { background: linear-gradient(135deg, #FFC94D, #F5A623); box-shadow: 0 4px 0 #D18C14; }
        .filter-btn.active[data-category="others"]    { background: linear-gradient(135deg, #B28DFF, #9165F0); box-shadow: 0 4px 0 #7A4FD6; }
        .filter-btn.active[data-category="favorites"] { background: linear-gradient(135deg, #FFD54F, #FFB300); box-shadow: 0 4px 0 #DB9A00; }
        .filter-btn.active[data-category="management"]{ background: linear-gradient(135deg, #4DD0C4, #26A99D); box-shadow: 0 4px 0 #1F8B81; }
        .filter-btn.active[data-category="teacher"]   { background: linear-gradient(135deg, #90A4AE, #607D8B); box-shadow: 0 4px 0 #4D6570; }

        /* ===== 並び替えボタン ===== */
        .sort-btn {
            padding: 6px 16px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 700;
            color: #b0a094;
            transition: all 0.2s;
            cursor: pointer;
        }

        .sort-btn.active {
            background: linear-gradient(135deg, #FF9F68, #FF6B81);
            color: #fff;
            box-shadow: 0 2px 6px rgba(255, 107, 129, 0.4);
        }

        /* ===== アプリカード ===== */
        .app-card {
            --card-main: #FF8FA3;
            --card-soft: #FFE3E8;
            background: #fff;
            border: 3px solid var(--card-soft);
            border-radius: 24px;
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            height: 100%;
            box-shadow: 0 6px 0 var(--card-soft);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s;
            animation: cardIn 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
        }

        .app-card:hover {
            transform: translateY(-8px) rotate(-0.6deg);
            border-color: var(--card-main);
            box-shadow: 0 12px 0 var(--card-soft), 0 18px 30px -12px rgba(93, 64, 55, 0.25);
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(24px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card-thumbnail {
            width: 100%;
            height: 160px;
            overflow: hidden;
            position: relative;
            background: var(--card-soft);
        }

        .card-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            transition: transform 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: block;
        }

        .app-card:hover .card-thumbnail img {
            transform: scale(1.08) rotate(0.5deg);
        }

        /* キラッと光るエフェクト */
        .card-thumbnail::after {
            content: '';
            position: absolute;
            top: 0;
            left: -80%;
            width: 50%;
            height: 100%;
            background: linear-gradient(105deg, transparent, rgba(255, 255, 255, 0.55), transparent);
            transform: skewX(-20deg);
            transition: left 0.6s ease;
        }

        .app-card:hover .card-thumbnail::after {
            left: 130%;
        }

        /* 教科タグ：ステッカー風 */
        .subject-sticker {
            display: inline-block;
            background: var(--card-main);
            color: #fff;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 0.15em;
            padding: 3px 14px;
            border-radius: 9999px;
            transform: rotate(-2deg);
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.12);
        }

        .card-title {
            border-bottom: 3px dotted var(--card-soft);
        }

        /* OPENボタン */
        .open-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, var(--card-main), var(--card-main));
            filter: saturate(1.05);
            color: #fff;
            font-weight: 700;
            letter-spacing: 0.2em;
            padding: 8px 28px;
            border-radius: 9999px;
            font-size: 14px;
            box-shadow: 0 4px 0 rgba(0, 0, 0, 0.15);
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s;
        }

        .app-card:hover .open-btn {
            transform: scale(1.08);
        }

        .open-btn .arrow {
            display: inline-block;
            transition: transform 0.25s;
        }

        .app-card:hover .open-btn .arrow {
            transform: translateX(4px);
        }

        /* NEWバッジ */
        .new-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 10;
            background: linear-gradient(135deg, #FF6B81, #FF9F45);
            color: #fff;
            font-weight: 700;
            font-size: 10px;
            letter-spacing: 0.2em;
            padding: 4px 12px;
            border-radius: 9999px;
            box-shadow: 0 3px 8px rgba(255, 107, 129, 0.5);
            animation: badgeBounce 2.2s ease-in-out infinite;
        }

        @keyframes badgeBounce {
            0%, 100% { transform: rotate(6deg) scale(1); }
            10% { transform: rotate(6deg) scale(1.15); }
            20% { transform: rotate(6deg) scale(1); }
        }

        /* お気に入り★ボタン */
        .fav-btn {
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .fav-btn:hover {
            transform: scale(1.25) rotate(15deg);
        }

        .fav-btn:active {
            transform: scale(0.9);
        }

        /* スクロールバー */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: #FFF3E0; }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(var(--c-orange), var(--c-red));
            border-radius: 5px;
        }

        /* 動きを減らす設定の人向け */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

<body class="font-maru min-h-screen flex flex-col">

    <footer class="relative z-10 mt-12">
        <div class="rainbow-bar"></div>
        <div class="bg-white/80 py-8">
            <div class="container mx-auto px-4 text-center">
                <p class="font-pop text-sm text-natural-brown mb-1">🌈 あしたも あそびに きてね！ 🌈</p>
                <p class="text-amber-400 text-xs font-bold">&copy; 2026 かがせんのHAPPYアプリ集</p>
            </div>
        </div>
    </footer>

    <!-- Firebase CDN (compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

    <script src="apps.js"></script>

    <script>
        // タイトルを1文字ずつ虹色に
        (function () {
            const el = document.getElementById('siteTitle');
            el.innerHTML = [...el.textContent].map(c => `<span class="title-char">${c}</span>`).join('');
        })();

        // Firebase 初期化
        const firebaseConfig = {
            apiKey: "AIzaSyAhM5WJn8ub-OOuJKoSFaa8Pceki-SzlQ4",
            authDomain: "kagasenapplication.firebaseapp.com",
            projectId: "kagasenapplication",
            storageBucket: "kagasenapplication.firebasestorage.app",
            messagingSenderId: "1082992889425",
            appId: "1:1082992889425:web:c18a56904f358d750fb270"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // クリックカウント管理
        let appCounts = {};

        function getTodayStr() {
            return new Date().toISOString().split('T')[0]; // YYYY-MM-DD
        }

        function hasCountedToday(appId) {
            return !!localStorage.getItem(`kagasen_click_${appId}_${getTodayStr()}`);
        }

        function markCountedToday(appId) {
            localStorage.setItem(`kagasen_click_${appId}_${getTodayStr()}`, '1');
        }

        async function incrementCount(appId) {
            if (hasCountedToday(appId)) return;
            if (!auth.currentUser) {
                await auth.signInAnonymously();
            }
            const ref = db.collection('appClicks').doc(appId);
            await ref.set({ count: firebase.firestore.FieldValue.increment(1) }, { merge: true });
            markCountedToday(appId); // Firestore書き込み成功後にマーク
            appCounts[appId] = (appCounts[appId] || 0) + 1;
        }

        async function loadCounts() {
            try {
                const snapshot = await db.collection('appClicks').get();
                snapshot.forEach(doc => {
                    appCounts[doc.id] = doc.data().count || 0;
                });
                updateCountDisplay();
            } catch (e) {
                console.error('カウント読み込みエラー:', e);
            }
        }

        function updateCountDisplay() {
            if (typeof appsData === 'undefined') return;
            appsData.forEach(app => {
                const el = document.getElementById(`count-${app.id}`);
                if (el) {
                    const count = appCounts[app.id] || 0;
                    el.textContent = `👁 ${count}回`;
                }
            });
        }

        // 匿名認証してカウントを読み込む
        auth.signInAnonymously()
            .then(() => loadCounts())
            .catch(e => console.error('認証エラー:', e));

        // 状態管理
        let currentCategory = 'all';
        let currentSort = 'new';
        let searchQuery = '';

        const appGrid = document.getElementById('appGrid');
        const countDisplay = document.getElementById('countDisplay');
        const noData = document.getElementById('noData');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const searchInput = document.getElementById('searchInput');
        const sortNewBtn = document.getElementById('sortNew');
        const sortPopularBtn = document.getElementById('sortPopular');

        // 教科カラー（colorClass → カードの色）
        const CARD_COLORS = {
            'subject-red':    { main: '#FF8FA3', soft: '#FFE3E8' },
            'subject-blue':   { main: '#5BC9F5', soft: '#DCF2FD' },
            'subject-green':  { main: '#6BCB77', soft: '#DFF5E2' },
            'subject-yellow': { main: '#FFC94D', soft: '#FFF3D6' },
            'subject-orange': { main: '#FF9F68', soft: '#FFE8D9' },
            'subject-purple': { main: '#B28DFF', soft: '#EDE4FF' },
            'subject-gray':   { main: '#90A4AE', soft: '#ECEFF1' },
        };

        // apps.js が読み込まれた後に実行
        renderApps();

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.category;
                renderApps();
            });
        });

        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value.toLowerCase();
            renderApps();
        });

        sortNewBtn.addEventListener('click', () => {
            sortNewBtn.classList.add('active');
            sortPopularBtn.classList.remove('active');
            currentSort = 'new';
            renderApps();
        });

        sortPopularBtn.addEventListener('click', () => {
            sortPopularBtn.classList.add('active');
            sortNewBtn.classList.remove('active');
            currentSort = 'name';
            renderApps();
        });

        // お気に入りデータ管理
        function getFavorites() {
            try { return JSON.parse(localStorage.getItem('kagasen_favorites')) || []; } catch (e) { return []; }
        }
        function toggleFavorite(title) {
            let favs = getFavorites();
            if (favs.includes(title)) favs = favs.filter(t => t !== title);
            else favs.push(title);
            localStorage.setItem('kagasen_favorites', JSON.stringify(favs));
        }

        function renderApps() {
            // appsData が存在しない場合のエラー回避
            if (typeof appsData === 'undefined') return;

            const favs = getFavorites();

            // 体育（pe）はその他（others）に含める
            const PE_CATEGORIES = ['pe'];
            const othersCategories = ['others', ...PE_CATEGORIES];

            let filtered = appsData.filter(app => {
                const matchCategory = currentCategory === 'all' ||
                    (currentCategory === 'favorites' && favs.includes(app.title)) ||
                    (currentCategory === 'others' && othersCategories.includes(app.category)) ||
                    app.category === currentCategory;
                const matchSearch = app.title.toLowerCase().includes(searchQuery) ||
                    app.description.toLowerCase().includes(searchQuery);
                return matchCategory && matchSearch;
            });

            filtered.sort((a, b) => {
                const isFavA = favs.includes(a.title);
                const isFavB = favs.includes(b.title);
                if (isFavA && !isFavB) return -1;
                if (!isFavA && isFavB) return 1;

                if (currentSort === 'new') {
                    return new Date(b.date) - new Date(a.date);
                } else {
                    return a.title.localeCompare(b.title, 'ja');
                }
            });

            countDisplay.textContent = filtered.length;
            appGrid.innerHTML = '';

            if (filtered.length === 0) {
                appGrid.classList.add('hidden');
                noData.classList.remove('hidden');
            } else {
                appGrid.classList.remove('hidden');
                noData.classList.add('hidden');

                filtered.forEach((app, index) => {
                    const card = document.createElement('a');
                    card.href = app.link;
                    card.className = 'app-card group';

                    const colors = CARD_COLORS[app.colorClass] || CARD_COLORS['subject-gray'];
                    card.style.setProperty('--card-main', colors.main);
                    card.style.setProperty('--card-soft', colors.soft);
                    // 登場アニメーションを順番にずらす（最初の12枚まで）
                    card.style.animationDelay = `${Math.min(index, 11) * 0.05}s`;

                    const isNew = new Date(app.date) > new Date('2026-02-01');
                    const newBadge = isNew ? `<span class="new-badge">NEW</span>` : '';

                    const isFav = favs.includes(app.title);
                    const starColor = isFav ? "text-yellow-400 fill-current" : "text-gray-300";

                    card.innerHTML = `
                        ${newBadge}
                        <button class="absolute top-2.5 left-2.5 z-10 p-1.5 bg-white/90 rounded-full shadow-md fav-btn" data-title="${app.title}" aria-label="お気に入り">
                            <i data-lucide="star" class="w-5 h-5 ${starColor}"></i>
                        </button>
                        <div class="card-thumbnail">
                            <img src="${app.image}" alt="${app.title}のサムネイル" loading="lazy">
                        </div>
                        <div class="p-5 flex-grow flex flex-col items-center text-center">
                            <span class="subject-sticker mb-3">${app.tagName}</span>
                            <h3 class="card-title text-lg text-natural-brown mb-2 pb-1.5 px-4 font-pop">${app.title}</h3>
                            <p class="text-gray-500 mb-4 flex-grow text-xs leading-relaxed">${app.description}</p>
                            <div class="w-full flex justify-between items-center text-[11px] text-amber-500 font-bold mt-2 mb-4 px-2">
                                <span id="count-${app.id}">👁 ---</span>
                                <span>📅 ${app.date}</span>
                            </div>
                            <span class="open-btn">あそぶ <span class="arrow">▶</span></span>
                        </div>
                    `;
                    appGrid.appendChild(card);

                    // カードクリック時にカウント+1して遷移
                    card.addEventListener('click', async (e) => {
                        if (e.target.closest('.fav-btn')) return;
                        e.preventDefault();
                        try {
                            await Promise.race([
                                incrementCount(app.id),
                                new Promise(resolve => setTimeout(resolve, 1500))
                            ]);
                        } catch (err) {
                            console.error(err);
                        }
                        window.location.href = app.link;
                    });
                });

                // ★ボタンのクリックイベント
                document.querySelectorAll('.fav-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.preventDefault(); // リンク遷移を防ぐ
                        toggleFavorite(btn.dataset.title);
                        renderApps();
                    });
                });

                // lucide アイコンの再描画
                lucide.createIcons();

                // カウント表示を更新（キャッシュ済みデータで即時反映）
                updateCountDisplay();
            }
        }

        // ヘッダーの検索アイコンを描画
        lucide.createIcons();
    </script>
</body>

</html>
