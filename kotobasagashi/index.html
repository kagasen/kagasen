<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>言葉さがしゲーム</title>
  <style>
    :root {
      --primary: #FF6B9D;
      --secondary: #4ECDC4;
      --accent: #FFE66D;
      --purple: #8B5CF6;
      --bg: #FFF5FB;
      /* グリッド10列＋ギャップ9本(3px)+パディング8px を画面幅に収める */
      --cell: min(calc((100vw - 30px) / 10), 50px);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    html {
      overscroll-behavior: none;   /* pull-to-refresh 無効 */
      touch-action: pan-x pan-y;
    }

    body {
      font-family: 'Hiragino Maru Gothic ProN', 'BIZ UDPGothic', 'Yu Gothic', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      overflow: hidden;
      overscroll-behavior: none;   /* pull-to-refresh 無効 */
      touch-action: pan-x pan-y;
    }

    .screen { display: none; width: 100vw; height: 100vh; }
    .screen.active { display: flex; }

    /* ===== スタート画面 ===== */
    #startScreen {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      overflow-y: auto;
    }

    .title-emoji { font-size: clamp(3rem, 10vw, 5rem); }

    .start-title {
      font-size: clamp(2rem, 7vw, 3.5rem);
      color: white;
      text-shadow: 3px 3px 0 rgba(0,0,0,0.2);
      margin: 8px 0 4px;
    }

    .start-sub {
      font-size: clamp(0.9rem, 3vw, 1.2rem);
      color: rgba(255,255,255,0.85);
      margin-bottom: 24px;
    }

    .rules-card {
      background: white;
      border-radius: 20px;
      padding: 18px 22px;
      max-width: 480px;
      width: 92%;
      margin-bottom: 28px;
      text-align: left;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .rules-card h3 {
      color: var(--purple);
      font-size: 1.1rem;
      margin-bottom: 10px;
    }

    .rules-card li {
      list-style: none;
      padding: 4px 0;
      font-size: 0.9rem;
      color: #444;
    }

    .rules-card li::before { content: '✦ '; color: var(--primary); }

    .start-btn {
      font-size: 1.4rem;
      padding: 14px 48px;
      background: linear-gradient(135deg, #FF6B9D, #FF8E53);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(255,107,157,0.45);
      font-family: inherit;
      transition: transform 0.15s;
    }

    .start-btn:active { transform: scale(0.94); }

    /* ===== ゲーム画面 ===== */
    #gameScreen {
      flex-direction: column;
      background: var(--bg);
      touch-action: none;   /* スワイプバック・pull-to-refresh を CSS レベルで無効化 */
    }

    .game-header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      padding: 8px 14px 6px;
      flex-shrink: 0;
    }

    .hdr-row1 {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 8px;
    }

    .hdr-timer  { text-align: center; }
    .hdr-count  { text-align: left; }
    .hdr-score  { text-align: right; }

    .hdr-label {
      font-size: clamp(0.6rem, 2vw, 0.72rem);
      color: rgba(255,255,255,0.7);
      display: block;
    }

    .hdr-timer-num {
      font-size: clamp(1.6rem, 6.5vw, 2.4rem);
      color: white;
      font-weight: bold;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .hdr-timer-num.warn { color: #FF6B6B; animation: blink 0.5s infinite alternate; }

    @keyframes blink { to { opacity: 0.35; } }

    .hdr-count-num, .hdr-score-num {
      font-size: clamp(1.2rem, 5vw, 1.9rem);
      color: var(--accent);
      font-weight: bold;
      line-height: 1;
    }

    /* ヒント行 */
    .hdr-hint {
      margin-top: 4px;
      min-height: 22px;
      text-align: center;
    }

    #hintText {
      font-size: clamp(0.78rem, 2.5vw, 0.95rem);
      color: var(--accent);
      font-weight: bold;
      animation: hintFade 0.3s ease;
    }

    @keyframes hintFade { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:none; } }

    /* ゲームボディ（グリッドのみ・縦レイアウト） */
    .game-body {
      display: flex;
      flex: 1;
      overflow: hidden;
      min-height: 0;
      flex-direction: column;
    }

    .grid-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6px 4px;
      overflow: hidden;
      min-height: 0;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(10, var(--cell));
      grid-template-rows: repeat(10, var(--cell));
      gap: 3px;
      background: #c8bfe0;
      border: 3px solid var(--purple);
      border-radius: 12px;
      padding: 4px;
      touch-action: none;
      flex-shrink: 0;
    }

    .cell {
      width: var(--cell);
      height: var(--cell);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: calc(var(--cell) * 0.56);
      background: white;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.08s;
      font-weight: 500;
      color: #333;
    }

    .cell.selecting { background: var(--accent); color: #333; }
    .cell.found     { background: var(--secondary); color: white; font-weight: bold; }
    .cell.wrong     { background: #FF9B9B; color: white; }

    /* ===== セルレベル色 ===== */
    /* レベル1: 薄い黄緑（20pt/文字） */
    .cell.level1 {
      background: #c8f5a0;
      color: #2a6300;
      font-weight: 600;
    }
    /* レベル2: 薄い赤（30pt/文字） */
    .cell.level2 {
      background: #ffb3b3;
      color: #8b0000;
      font-weight: 600;
    }
    /* 選択中はレベル色の上からハイライト */
    .cell.level1.selecting { background: #a0e060; color: #1a4200; }
    .cell.level2.selecting { background: #ff7070; color: #ffffff; }

    /* リフィルアニメーションのレベル別 */
    @keyframes refillLevel1 {
      0%   { opacity:0; transform: scale(0.5) rotate(-10deg); }
      60%  { opacity:1; transform: scale(1.15) rotate(3deg); }
      100% { opacity:1; transform: scale(1) rotate(0deg); }
    }
    @keyframes refillLevel2 {
      0%   { opacity:0; transform: scale(0.5) rotate(10deg); }
      60%  { opacity:1; transform: scale(1.2) rotate(-4deg); }
      100% { opacity:1; transform: scale(1) rotate(0deg); }
    }
    .cell.refill-level1 { animation: refillLevel1 0.45s ease forwards; }
    .cell.refill-level2 { animation: refillLevel2 0.45s ease forwards; }

    @keyframes bounce {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.35); }
      100% { transform: scale(1); }
    }
    .cell.found-anim { animation: bounce 0.35s ease; }

    @keyframes refill {
      from { opacity:0; transform: scale(0.6); }
      to   { opacity:1; transform: scale(1); }
    }
    .cell.refill-anim { animation: refill 0.4s ease; }

    /* ===== 見つけた言葉バー（下部横スクロール） ===== */
    .found-bar {
      flex-shrink: 0;
      background: white;
      border-top: 2px solid #e5e0f0;
      padding: 5px 10px;
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 44px;
      overflow: hidden;
    }

    .found-bar-label {
      font-size: 0.72rem;
      color: var(--purple);
      font-weight: bold;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .found-list {
      list-style: none;
      display: flex;
      flex-direction: row;
      gap: 6px;
      overflow-x: auto;
      flex: 1;
      padding-bottom: 2px;
      /* スクロールバー非表示 */
      scrollbar-width: none;
    }
    .found-list::-webkit-scrollbar { display: none; }

    .found-list li {
      font-size: 0.8rem;
      color: #18a898;
      background: #e8fafa;
      padding: 3px 9px;
      border-radius: 12px;
      font-weight: bold;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ===== 爆発エフェクト ===== */

    /* 画面フラッシュ */
    .flash-overlay {
      position: fixed;
      inset: 0;
      background: white;
      z-index: 480;
      pointer-events: none;
      animation: flashOut 0.38s ease-out forwards;
    }
    @keyframes flashOut { from { opacity:0.72; } to { opacity:0; } }

    /* 衝撃波リング */
    .explosion-ring {
      position: fixed;
      border-radius: 50%;
      z-index: 490;
      pointer-events: none;
      transform: translate(-50%,-50%) scale(0);
      animation: ringExpand 0.55s ease-out forwards;
    }
    @keyframes ringExpand {
      from { transform: translate(-50%,-50%) scale(0);   opacity:0.85; }
      to   { transform: translate(-50%,-50%) scale(4.5); opacity:0; }
    }

    /* パーティクル共通 */
    .particle {
      position: fixed;
      z-index: 500;
      pointer-events: none;
      transform-origin: center center;
    }
    .p-circle { border-radius: 50%;  animation: pFly 0.9s ease-out forwards; }
    .p-square { border-radius: 3px;  animation: pFly 0.9s ease-out 0.04s forwards; }
    .p-star   {
      clip-path: polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);
      animation: pFly 0.95s ease-out 0.02s forwards;
    }
    .p-diamond {
      border-radius: 2px;
      animation: pFly 0.88s ease-out 0.06s forwards;
      transform-origin: center;
    }

    @keyframes pFly {
      0%   { transform: translate(0,0) scale(1.1) rotate(0deg);   opacity:1; }
      70%  { opacity: 0.85; }
      100% { transform: translate(var(--tx),var(--ty)) scale(0) rotate(var(--rot)); opacity:0; }
    }

    .word-blast {
      position: fixed;
      top: 44%;
      left: 50%;
      font-size: clamp(2.6rem, 11vw, 5rem);
      font-weight: bold;
      color: var(--primary);
      text-shadow: 4px 4px 0 #FF8E53, 7px 7px 0 rgba(0,0,0,0.14);
      z-index: 400;
      pointer-events: none;
      white-space: nowrap;
      animation: wordBlast 1.1s cubic-bezier(0.17,0.67,0.52,1.0) forwards;
    }

    @keyframes wordBlast {
      0%   { transform: translate(-50%,-50%) scale(0)    rotate(-18deg); opacity:0; }
      22%  { transform: translate(-50%,-50%) scale(1.65) rotate(7deg);   opacity:1; }
      55%  { transform: translate(-50%,-50%) scale(1.2)  rotate(-3deg);  opacity:1; }
      100% { transform: translate(-50%,-90%) scale(0.9)  rotate(1deg);   opacity:0; }
    }

    .pts-blast {
      position: fixed;
      top: 62%;
      left: 50%;
      font-size: clamp(1.8rem, 8vw, 3.2rem);
      font-weight: bold;
      color: var(--accent);
      text-shadow: 3px 3px 0 #FF8E53, 5px 5px 0 rgba(0,0,0,0.2);
      z-index: 400;
      pointer-events: none;
      animation: ptsBlast 1s ease-out forwards;
    }

    @keyframes ptsBlast {
      0%   { transform: translate(-50%,-50%) scale(0)    rotate(14deg);  opacity:0; }
      35%  { transform: translate(-50%,-50%) scale(1.4)  rotate(-5deg);  opacity:1; }
      100% { transform: translate(-50%,-110%) scale(0.85) rotate(0deg);  opacity:0; }
    }

    /* ===== ゲームオーバー ===== */
    #gameOverScreen {
      flex-direction: column;
      align-items: center;
      background: var(--bg);
      overflow-y: auto;
      padding: 24px 16px 40px;
    }

    .over-title {
      font-size: clamp(1.8rem, 7vw, 2.8rem);
      color: var(--purple);
      margin-bottom: 4px;
    }

    .over-score {
      font-size: clamp(2.2rem, 9vw, 3.5rem);
      color: var(--primary);
      font-weight: bold;
      margin-bottom: 6px;
    }

    .over-rank-label {
      font-size: 0.95rem;
      color: #666;
      margin-bottom: 14px;
    }

    /* ===== 階段ランキング ===== */
    .rank-stairs {
      width: 100%;
      max-width: 460px;
      margin-bottom: 28px;
    }

    /* バー部分（下揃えで階段状に） */
    .stair-chart {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      height: 150px;
      padding: 0 2px;
    }

    .stair-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      height: 100%;
      gap: 2px;
    }

    .stair-emoji {
      font-size: clamp(0.9rem, 2.5vw, 1.2rem);
      line-height: 1;
    }

    .stair-bar {
      width: 100%;
      background: #e0d8f0;
      border-radius: 5px 5px 0 0;
      transition: height 0.6s ease;
    }

    .stair-col.achieved .stair-bar  { background: #90ddd4; }
    .stair-col.current  .stair-bar  {
      background: linear-gradient(to top, #FF6B9D, #FF8E53);
      box-shadow: 0 -4px 12px rgba(255,107,157,0.55);
      animation: stairGlow 0.9s infinite alternate;
    }
    @keyframes stairGlow { to { box-shadow: 0 -6px 18px rgba(255,107,157,0.8); } }

    /* ラベル部分 */
    .stair-labels {
      display: flex;
      gap: 3px;
      padding: 4px 2px 0;
    }

    .stair-label {
      flex: 1;
      text-align: center;
      font-size: clamp(0.42rem, 1.1vw, 0.58rem);
      color: #aaa;
      line-height: 1.3;
      word-break: keep-all;
    }

    .stair-label .sl-name { display: block; font-weight: 600; }
    .stair-label .sl-pts  { display: block; opacity: 0.8; }

    .stair-label.achieved .sl-name { color: #18a898; }
    .stair-label.current  .sl-name { color: var(--primary); font-weight: bold; }
    .stair-label.current  .sl-pts  { color: var(--accent); }

    .result-section {
      width: 100%;
      max-width: 580px;
      margin-bottom: 22px;
    }

    .result-heading {
      font-size: 1.1rem;
      font-weight: bold;
      color: var(--purple);
      border-bottom: 2px solid var(--purple);
      padding-bottom: 5px;
      margin-bottom: 10px;
    }

    .word-card {
      background: white;
      border-radius: 12px;
      padding: 10px 14px;
      margin-bottom: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border-left: 4px solid var(--secondary);
    }

    .word-card.new { border-left-color: var(--primary); }

    .wc-top {
      font-size: 1rem;
      font-weight: bold;
      color: #333;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .wc-reading { font-size: 0.82rem; color: var(--secondary); font-weight: normal; }
    .wc-meaning { font-size: 0.88rem; color: #555; margin-top: 3px; }

    .retry-btn {
      font-size: 1.2rem;
      padding: 13px 44px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(102,126,234,0.4);
      font-family: inherit;
      margin-top: 10px;
    }

    .no-words { font-size: 0.95rem; color: #888; text-align: center; padding: 10px; }

    /* モバイル */
    @media (max-width: 480px) {
      :root { --cell: min(calc((100vw - 24px) / 10), 44px); }
      .found-bar { min-height: 38px; padding: 4px 8px; }
    }
  </style>
</head>
<body>

<!-- ===== スタート画面 ===== -->
<div id="startScreen" class="screen active">
  <div class="title-emoji">🔍</div>
  <h1 class="start-title">言葉さがし</h1>
  <p class="start-sub">かくれた言葉をみつけよう！</p>
  <div class="rules-card">
    <h3>📖 あそびかた</h3>
    <ul>
      <li>もじをドラッグして言葉をえらぼう</li>
      <li>たて・よこ・ななめ、どの方向もOK！</li>
      <li>逆さ読みの言葉も正解だよ！</li>
      <li>見つけた文字はあたらしい文字に変わるよ</li>
      <li>10秒たつとヒントが出るよ</li>
      <li>制限時間は <strong>1分</strong>！1文字 = <strong>10pt</strong>（4文字以上は <strong>2倍の20pt</strong>！）</li>
    </ul>
  </div>
  <button class="start-btn" onclick="startGame()">🎮 スタート！</button>
</div>

<!-- ===== ゲーム画面 ===== -->
<div id="gameScreen" class="screen">
  <div class="game-header">
    <div class="hdr-row1">
      <div class="hdr-count">
        <span class="hdr-label">みつけた</span>
        <div id="countDisp" class="hdr-count-num">0語</div>
      </div>
      <div class="hdr-timer">
        <span class="hdr-label">のこり</span>
        <div id="timerDisp" class="hdr-timer-num">60</div>
      </div>
      <div class="hdr-score">
        <span class="hdr-label">スコア</span>
        <div id="scoreDisp" class="hdr-score-num">0</div>
      </div>
    </div>
    <div class="hdr-hint">
      <span id="hintText"></span>
    </div>
  </div>
  <div class="game-body">
    <div class="grid-wrap">
      <div id="grid"></div>
    </div>
  </div>
  <div class="found-bar">
    <span class="found-bar-label">✅ みつけた</span>
    <ul id="foundList" class="found-list"></ul>
  </div>
</div>

<!-- ===== ゲームオーバー画面 ===== -->
<div id="gameOverScreen" class="screen">
  <h2 class="over-title">⏰ ゲームオーバー！</h2>
  <div id="overScore" class="over-score">0 ポイント</div>
  <div class="over-rank-label">あなたのランクは…</div>
  <div id="pyramid" class="rank-table"></div>
  <div class="result-section">
    <div class="result-heading">🌟 見つけた言葉</div>
    <div id="foundDetail"></div>
  </div>
  <div class="result-section">
    <div class="result-heading">📚 新たに知ってほしい言葉</div>
    <div id="newWords"></div>
  </div>
  <button class="retry-btn" onclick="backToStart()">🔄 もういちど！</button>
</div>

<!-- 辞書データ（しりとり用辞書を流用） -->
<script src="../shiritori/dictionary_output.js"></script>

<script>

// （しりとり辞書には「ん」終わりが含まれないため個別追加）
// ==============================

const GRID_SIZE = 10;

// ひらがな文字プール（73文字 + っ）
const CHAR_POOL = 'あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわんがぎぐげござじずぜぞだぢづでどばびぶべぼぱぴぷぺぽゃゅょっ'.split('');
const VALID_CHARS = new Set(CHAR_POOL);

// 8方向
const DIRS = [
  {dr:0,  dc:1 },{dr:0,  dc:-1},{dr:1,  dc:0 },{dr:-1, dc:0 },
  {dr:1,  dc:1 },{dr:1,  dc:-1},{dr:-1, dc:1 },{dr:-1, dc:-1},
];

// ランキング（0〜1000pt の10段階）
const RANKS = [
  { min:0,   max:99,       name:'見習い',   emoji:'🌱' },

// ==============================
// 辞書の結合・インデックス構築
// ==============================
let WORD_SET = new Set();
let WORD_MAP = {};
let PLACEABLE = [];

function buildDictionary() {
  // DICTIONARY は dictionary_output.js で定義済み
  const base = (typeof DICTIONARY !== 'undefined') ? DICTIONARY : [];

  // ん-ending のみ確実なものを使用
  const nWords = N_ENDING.filter(w => {
    return w.w && w.m && w.r && w.r.endsWith('ん');
  });

  // 動詞・形容詞・副詞など（フィルタなしで全追加）
  const extra  = EXTRA_WORDS.filter(w => w.r && w.w && w.m);
  const extra2 = EXTRA_WORDS2.filter(w => w.r && w.w && w.m);
  const extra3 = EXTRA_WORDS3.filter(w => w.r && w.w && w.m);

  const all = [...extra3, ...base, ...nWords, ...extra, ...extra2];

  WORD_SET = new Set();
  WORD_MAP = {};

  for (const w of all) {
    if (!w.r || !w.w || !w.m) continue;
    if (!WORD_SET.has(w.r)) {
      WORD_SET.add(w.r);
      WORD_MAP[w.r] = w;
    }
  }

  // 配置可能な単語をフィルタ
  // 条件: 2〜8文字, 文字がすべてCHAR_POOL内
  PLACEABLE = all.filter(w => {
    if (!w.r || !w.w || !w.m) return false;
    if (w.r.length < 2 || w.r.length > 8) return false;
    return [...w.r].every(c => VALID_CHARS.has(c));
  });

  // 重複除去
  const seen = new Set();
  PLACEABLE = PLACEABLE.filter(w => {
    if (seen.has(w.r)) return false;
    seen.add(w.r);
    return true;
  });
}

// ==============================
// グリッド生成
// ==============================
function generateGrid() {
  grid      = Array.from({length: GRID_SIZE}, () => Array(GRID_SIZE).fill(''));
  gridState = Array.from({length: GRID_SIZE}, () => Array(GRID_SIZE).fill(0));

  // 短い言葉から優先して配置（2〜3文字が入りやすく、発見数が増える）
  // 同じ長さの中はシャッフルしてランダム性を保つ
  const sorted = [...PLACEABLE].sort((a, b) => {
    if (a.r.length !== b.r.length) return a.r.length - b.r.length;
    return Math.random() - 0.5;
  });

  let placed = 0;
  for (const wordObj of sorted) {
    if (placed >= 40) break;
    if (tryPlace(wordObj.r)) placed++;
  }

  // 残りをランダム文字で埋める
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      if (!grid[r][c]) {
        grid[r][c] = CHAR_POOL[Math.floor(Math.random() * CHAR_POOL.length)];
      }
    }
  }
}

function tryPlace(word) {
  const dirs = [...DIRS].sort(() => Math.random() - 0.5);
  for (const d of dirs) {
    let rMin = 0, rMax = GRID_SIZE - 1;
    let cMin = 0, cMax = GRID_SIZE - 1;
    if (d.dr ===  1) rMax = GRID_SIZE - word.length;
    if (d.dr === -1) rMin = word.length - 1;
    if (d.dc ===  1) cMax = GRID_SIZE - word.length;
    if (d.dc === -1) cMin = word.length - 1;
    if (rMax < rMin || cMax < cMin) continue;

    // 全開始位置をリストアップしてシャッフル（ランダム20回より網羅的）
    const positions = [];
    for (let r = rMin; r <= rMax; r++) {
      for (let c = cMin; c <= cMax; c++) positions.push({r, c});
    }
    positions.sort(() => Math.random() - 0.5);

    for (const {r: sr, c: sc} of positions) {
      let ok = true;
      const pos = [];
      for (let i = 0; i < word.length; i++) {
        const r = sr + d.dr * i, c = sc + d.dc * i;
        if (grid[r][c] !== '' && grid[r][c] !== word[i]) { ok = false; break; }
        pos.push({r, c});
      }
      if (ok) {
        pos.forEach(({r, c}, i) => { grid[r][c] = word[i]; });
        return true;
      }
    }
  }
  return false;
}

// ==============================
// グリッド描画
// ==============================
function renderGrid() {
  const el = document.getElementById('grid');
  el.innerHTML = '';
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.r = r;
      cell.dataset.c = c;
      cell.textContent = grid[r][c];
      applyLevelClass(cell, gridState[r][c]);
      el.appendChild(cell);
    }
  }
  // ※ イベントリスナーは setupEventListeners() で1回だけ登録する
}

function getCell(r, c) {
  return document.querySelector(`#grid .cell[data-r="${r}"][data-c="${c}"]`);
}

function applyLevelClass(el, level) {
  el.classList.remove('level1', 'level2');
  if (level === 1) el.classList.add('level1');
  if (level === 2) el.classList.add('level2');
}

// ドラッグ操作
// ==============================
function onMDown(e) {
  if (!gameActive) return;
  const cell = e.target.closest('.cell');
  if (!cell) return;
  isDragging = true;
  startDrag(+cell.dataset.r, +cell.dataset.c);
}
function onMOver(e) {
  if (!gameActive || !isDragging) return;
  const cell = e.target.closest('.cell');
  if (cell) extendDrag(+cell.dataset.r, +cell.dataset.c);
}
function onMUp() {
  if (!gameActive || !isDragging) return;
  isDragging = false;
  submitDrag();
}
function onTStart(e) {
  e.preventDefault();
  if (!gameActive) return;
  const t = e.touches[0];
  const el = document.elementFromPoint(t.clientX, t.clientY);
  const cell = el && el.closest('.cell');
  if (!cell) return;
  isDragging = true;
  startDrag(+cell.dataset.r, +cell.dataset.c);
}
function onTMove(e) {
  e.preventDefault();
  if (!gameActive || !isDragging) return;
  const t = e.touches[0];
  const el = document.elementFromPoint(t.clientX, t.clientY);
  const cell = el && el.closest('.cell');
  if (cell) extendDrag(+cell.dataset.r, +cell.dataset.c);
}
function onTEnd(e) {
  e.preventDefault();
  if (!gameActive || !isDragging) return;
  isDragging = false;
  submitDrag();
}

function startDrag(r, c) {
  clearSel();
  dragStart = {r, c};
  selCells  = [{r, c}];
  const el = getCell(r, c);
  if (el) el.classList.add('selecting');
}

function extendDrag(r, c) {
  if (!dragStart) return;
  selCells.forEach(s => {
    const el = getCell(s.r, s.c);
    if (el && !el.classList.contains('found')) el.classList.remove('selecting');
  });
  const dr = r - dragStart.r, dc = c - dragStart.c;
  if (dr === 0 && dc === 0) {
    selCells = [{r: dragStart.r, c: dragStart.c}];
    const el = getCell(dragStart.r, dragStart.c);
    if (el) el.classList.add('selecting');
    return;
  }
  let stepR, stepC;
  if (dr === 0) { stepR = 0; stepC = Math.sign(dc); }
  else if (dc === 0) { stepR = Math.sign(dr); stepC = 0; }
  else if (Math.abs(dr) === Math.abs(dc)) { stepR = Math.sign(dr); stepC = Math.sign(dc); }
  else {
    selCells = [{r: dragStart.r, c: dragStart.c}];
    const el = getCell(dragStart.r, dragStart.c);
    if (el) el.classList.add('selecting');
    return;
  }
  const steps = Math.max(Math.abs(dr), Math.abs(dc));
  const newSel = [];
  for (let i = 0; i <= steps; i++) {
    const cr = dragStart.r + stepR * i, cc = dragStart.c + stepC * i;
    if (cr < 0 || cr >= GRID_SIZE || cc < 0 || cc >= GRID_SIZE) break;
    newSel.push({r: cr, c: cc});
  }
  selCells = newSel;
  selCells.forEach(s => {
    const el = getCell(s.r, s.c);
    if (el) el.classList.add('selecting');
  });
}

function clearSel() {
  selCells.forEach(s => {
    const el = getCell(s.r, s.c);
    if (el && !el.classList.contains('found')) el.classList.remove('selecting');
  });
  selCells  = [];
  dragStart = null;
}

// ==============================
// 選択確認
// ==============================
function submitDrag() {
  if (selCells.length < 2) { clearSel(); return; }

  const forward  = selCells.map(s => grid[s.r][s.c]).join('');
  const backward = forward.split('').reverse().join('');
  const matched  = WORD_SET.has(forward) ? forward : (WORD_SET.has(backward) ? backward : null);

  if (matched) {
    const wordObj = WORD_MAP[matched];
    const hitCells = [...selCells];

    // セルの色に応じたポイント計算（白: 10pt/4文字以上20pt, 黄緑: 20pt, 赤: 30pt）
    const basePer = matched.length >= 4 ? 20 : 10;
    let pts = 0;
    hitCells.forEach(s => {
      const st = gridState[s.r][s.c];
      pts += st === 2 ? 30 : st === 1 ? 20 : basePer;
    });

    // リフィルのレベル = 使ったセルの最大レベル + 1（最大2で固定）
    const maxState  = Math.max(...hitCells.map(s => gridState[s.r][s.c]));
    const newLevel  = Math.min(maxState + 1, 2);

    score += pts;
    foundCount++;
    foundWordsArr.push(wordObj);

    // セルを緑表示
    hitCells.forEach(s => {
      const el = getCell(s.r, s.c);
      if (el) {
        el.classList.remove('selecting', 'level1', 'level2');
        el.classList.add('found', 'found-anim');
        setTimeout(() => el.classList.remove('found-anim'), 380);
      }
    });
    selCells  = [];
    dragStart = null;

    // 0.7秒後にランダム文字で補充（色レベル付き）
    setTimeout(() => refillCells(hitCells, newLevel), 700);

    document.getElementById('scoreDisp').textContent = score;
    document.getElementById('countDisp').textContent = foundCount + '語';
    addFoundWordToList(wordObj);
    showExplosion(hitCells, matched, pts);
    playBeep(true);

    lastFoundTime = Date.now();
    hideHint();
  } else {
    // 不正解
    playBeep(false);
    selCells.forEach(s => {
      const el = getCell(s.r, s.c);
      if (el && !el.classList.contains('found')) {
        el.classList.add('wrong');
        setTimeout(() => el.classList.remove('wrong'), 380);
      }
    });
    clearSel();
  }
}

function refillCells(cells, newLevel = 0) {
  cells.forEach(({r, c}) => {
    grid[r][c]      = CHAR_POOL[Math.floor(Math.random() * CHAR_POOL.length)];
    gridState[r][c] = newLevel;
    const el = getCell(r, c);
    if (el) {
      el.classList.remove('found', 'level1', 'level2');
      el.textContent = grid[r][c];
      applyLevelClass(el, newLevel);
      // レベル別アニメーション
      const aniClass = newLevel === 1 ? 'refill-level1' : newLevel === 2 ? 'refill-level2' : 'refill-anim';
      el.classList.add(aniClass);
      setTimeout(() => el.classList.remove(aniClass), 480);
    }
  });
}

function addFoundWordToList(wordObj) {
  const li = document.createElement('li');
  li.textContent = wordObj.r;
  document.getElementById('foundList').prepend(li);
}

function showExplosion(cells, word, pts) {
  const COLORS = ['#FF6B9D','#FFE66D','#4ECDC4','#A855F7','#FF8E53','#44CF6C','#38BDF8','#F97316','#EC4899'];
  const PTYPES = ['p-circle','p-circle','p-circle','p-square','p-star','p-diamond'];

  // 画面フラッシュ
  const flash = document.createElement('div');
  flash.className = 'flash-overlay';
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 420);

  cells.forEach(({r, c}) => {
    const cellEl = getCell(r, c);
    if (!cellEl) return;
    const rect = cellEl.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top  + rect.height / 2;

    // 衝撃波リング（2重）
    [0, 80].forEach((delay, ri) => {
      const ring = document.createElement('div');
      ring.className = 'explosion-ring';
      const sz = rect.width * (ri === 0 ? 1.2 : 0.8);
      ring.style.cssText = `left:${cx}px;top:${cy}px;width:${sz}px;height:${sz}px;` +
        `border:${ri===0?4:2}px solid ${ri===0?'var(--primary)':'var(--accent)'};` +
        `animation-delay:${delay}ms;`;
      document.body.appendChild(ring);
      setTimeout(() => ring.remove(), 620 + delay);
    });

    // パーティクル大量発射（1セルにつき20個）
    const count = 20;
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      const ptype = PTYPES[Math.floor(Math.random() * PTYPES.length)];
      p.className = `particle ${ptype}`;
      const angle  = (i / count) * 360 + Math.random() * 18;
      const dist   = 55 + Math.random() * 90;
      const sz     = 7 + Math.random() * 12;
      const rotDeg = (Math.random() > 0.5 ? 1 : -1) * (360 + Math.random() * 360);
      const tx = Math.cos(angle * Math.PI / 180) * dist;
      const ty = Math.sin(angle * Math.PI / 180) * dist;
      p.style.cssText = `
        left:${cx}px; top:${cy}px;
        width:${sz}px; height:${sz}px;
        background:${COLORS[Math.floor(Math.random() * COLORS.length)]};
        --tx:${tx}px; --ty:${ty}px; --rot:${rotDeg}deg;
        animation-duration:${0.75 + Math.random() * 0.35}s;
      `;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 1150);
    }
  });

  // 言葉BIG表示
  const pop = document.createElement('div');
  pop.className = 'word-blast';
  pop.textContent = word;
  document.body.appendChild(pop);

  const ptsEl = document.createElement('div');
  ptsEl.className = 'pts-blast';
  ptsEl.textContent = `+${pts}pt!!`;
  document.body.appendChild(ptsEl);

  setTimeout(() => { pop.remove(); ptsEl.remove(); }, 1150);

  // 爆発音
  playExplosionSound();
}

function playExplosionSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    // 低音ノイズ爆発
    const bufLen = Math.floor(ctx.sampleRate * 0.5);
    const buf  = ctx.createBuffer(1, bufLen, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;

    const noise  = ctx.createBufferSource();
    noise.buffer = buf;

    const lpf = ctx.createBiquadFilter();
    lpf.type = 'lowpass';
    lpf.frequency.setValueAtTime(700, ctx.currentTime);
    lpf.frequency.exponentialRampToValueAtTime(60, ctx.currentTime + 0.45);

    const nGain = ctx.createGain();
    nGain.gain.setValueAtTime(0.65, ctx.currentTime);
    nGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.45);

    noise.connect(lpf); lpf.connect(nGain); nGain.connect(ctx.destination);
    noise.start(ctx.currentTime);

    // 8ビット風ピッチダウン音
    const osc  = ctx.createOscillator();
    const oGain = ctx.createGain();
    osc.connect(oGain); oGain.connect(ctx.destination);
    osc.type = 'square';
    osc.frequency.setValueAtTime(520, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(38, ctx.currentTime + 0.28);
    oGain.gain.setValueAtTime(0.3, ctx.currentTime);
    oGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.3);

    // 高音スパーク（キラキラ感）
    const osc2  = ctx.createOscillator();
    const oGain2 = ctx.createGain();
    osc2.connect(oGain2); oGain2.connect(ctx.destination);
    osc2.type = 'square';
    osc2.frequency.setValueAtTime(1200, ctx.currentTime + 0.02);
    osc2.frequency.setValueAtTime(900, ctx.currentTime + 0.06);
    osc2.frequency.setValueAtTime(1400, ctx.currentTime + 0.10);
    oGain2.gain.setValueAtTime(0.15, ctx.currentTime + 0.02);
    oGain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
    osc2.start(ctx.currentTime + 0.02);
    osc2.stop(ctx.currentTime + 0.22);
  } catch(e) { /* 無視 */ }
}

function checkHint() {
  if (hintShowing) return;
  if (Date.now() - lastFoundTime >= 10000) {
    const hint = findHintWord();
    if (hint) {
      showHint(`💡 ヒント：「${hint}」がかくれているよ！`);
      lastFoundTime = Date.now(); // 次のヒントまでリセット
    }
  }
}

function findHintWord() {
  const candidates = [];
  const seen = new Set();
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      for (const d of DIRS) {
        let word = '';
        for (let i = 0; i < GRID_SIZE; i++) {
          const rr = r + d.dr * i, cc = c + d.dc * i;
          if (rr < 0 || rr >= GRID_SIZE || cc < 0 || cc >= GRID_SIZE) break;
          word += grid[rr][cc];
          if (i >= 1 && WORD_SET.has(word) && !seen.has(word)) {
            candidates.push(word);
            seen.add(word);
          }
        }
      }
    }
  }
  if (candidates.length === 0) return null;
  return candidates[Math.floor(Math.random() * candidates.length)];
}

function showHint(msg) {
  hintShowing = true;
  const el = document.getElementById('hintText');
  el.textContent = msg;
  setTimeout(() => {
    el.textContent = '';
    hintShowing = false;
  }, 6000);
}

function hideHint() {
  hintShowing = false;
  document.getElementById('hintText').textContent = '';
}

function endGame() {
  gameActive = false;
  isDragging = false;
  clearSel();
  stopBGM();
  document.getElementById('overScore').textContent = `${score} ポイント`;
  renderPyramid();
  renderFoundDetail();
  renderNewWords();
  showScreen('gameOverScreen');
}

function renderPyramid() {
  const el = document.getElementById('pyramid');
  el.innerHTML = '';
  el.className = 'rank-stairs';

  const rankIdx = RANKS.findIndex(r => score >= r.min && score <= r.max);

  // バー部分（階段状：低ランクほど低いバー）
  const chart = document.createElement('div');
  chart.className = 'stair-chart';

  // ラベル部分
  const labels = document.createElement('div');
  labels.className = 'stair-labels';

  RANKS.forEach((r, i) => {
    const isCurrent  = i === rankIdx;
    const isAchieved = i < rankIdx;

    // バー列
    const col = document.createElement('div');
    col.className = 'stair-col' + (isCurrent ? ' current' : isAchieved ? ' achieved' : '');
    const barPct = ((i + 1) * 10);           // 10%〜100%
    col.innerHTML = `
      <div class="stair-emoji">${r.emoji}</div>
      <div class="stair-bar" style="height:${barPct}%"></div>`;
    chart.appendChild(col);

    // ラベル列
    const lbl = document.createElement('div');
    lbl.className = 'stair-label' + (isCurrent ? ' current' : isAchieved ? ' achieved' : '');
    const rangeText = r.max === Infinity ? `${r.min}〜` : `${r.min}〜${r.max}`;
    lbl.innerHTML = `<span class="sl-name">${r.name}</span><span class="sl-pts">${rangeText}pt</span>`;
    labels.appendChild(lbl);
  });

  el.appendChild(chart);
  el.appendChild(labels);
}

function renderFoundDetail() {
  const el = document.getElementById('foundDetail');
  if (foundWordsArr.length === 0) {
    el.innerHTML = '<p class="no-words">見つけた言葉はありませんでした。次はがんばろう！</p>';
    return;
  }
  // 重複除去して表示
  const unique = [...new Map(foundWordsArr.map(w => [w.r, w])).values()];
  el.innerHTML = unique.map(w => `
    <div class="word-card">
      <div class="wc-top">${w.w} <span class="wc-reading">（${w.r}）</span></div>
      <div class="wc-meaning">${w.m}</div>
    </div>
  `).join('');
}

function renderNewWords() {
  const el = document.getElementById('newWords');
  const foundSet = new Set(foundWordsArr.map(w => w.r));
  const unfound  = PLACEABLE.filter(w => !foundSet.has(w.r)).sort(() => Math.random() - 0.5);
  const picks    = unfound.slice(0, 3);
  if (picks.length === 0) {
    el.innerHTML = '<p class="no-words">全ての言葉を知っているね！さすが！</p>';
    return;
  }
  el.innerHTML = picks.map(w => `
    <div class="word-card new">
      <div class="wc-top">${w.w} <span class="wc-reading">（${w.r}）</span></div>
      <div class="wc-meaning">${w.m}</div>
    </div>
  `).join('');
}

function playBeep(success) {
  try {
    const ctx  = new (window.AudioContext || window.webkitAudioContext)();
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    if (success) {
      osc.type = 'square';
      osc.frequency.setValueAtTime(523.25, ctx.currentTime);
      osc.frequency.setValueAtTime(659.25, ctx.currentTime + 0.08);
      osc.frequency.setValueAtTime(783.99, ctx.currentTime + 0.16);
      osc.frequency.setValueAtTime(1046.5, ctx.currentTime + 0.24);
      gain.gain.setValueAtTime(0.2, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.5);
    } else {
      osc.type = 'square';
      osc.frequency.setValueAtTime(200, ctx.currentTime);
      osc.frequency.setValueAtTime(150, ctx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.15, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.25);
    }
  } catch(e) { /* 無視 */ }
}

// ==============================
// 16ビット風 BGM（Web Audio API チップチューン）
// ==============================
let bgmCtx = null;
let bgmMaster = null;
let bgmLoopTimer = null;

// 音符周波数テーブル
const N = {
  r:0,
  c3:130.81, d3:146.83, e3:164.81, f3:174.61, g3:196.00, a3:220.00, b3:246.94,
  c4:261.63, d4:293.66, e4:329.63, f4:349.23, g4:392.00, a4:440.00, b4:493.88,
  c5:523.25, d5:587.33, e5:659.25, f5:698.46, g5:783.99, a5:880.00, b5:987.77, c6:1046.50,
};

// テンポ 160BPM、8分音符 = 0.1875秒
const EIGHTH = 60 / 160 / 2;

// [周波数, 8分音符の個数]
// ── メロディ（C メジャー）──
const MEL = [
  [N.e5,1],[N.g5,1],[N.c5,1],[N.g5,1],  // bar 1
  [N.e5,1],[N.d5,1],[N.c5,2],            // bar 2
  [N.d5,1],[N.f5,1],[N.a4,1],[N.f5,1],  // bar 3
  [N.d5,1],[N.c5,1],[N.d5,2],            // bar 4
  [N.e5,1],[N.g5,1],[N.a5,1],[N.g5,1],  // bar 5
  [N.e5,1],[N.c5,1],[N.e5,2],            // bar 6
  [N.g5,2],[N.e5,1],[N.d5,1],            // bar 7
  [N.c5,4],                              // bar 8
];

// ── ハーモニー（3度上）──
const HAR = [
  [N.g5,1],[N.b5,1],[N.e5,1],[N.b5,1],
  [N.g5,1],[N.f5,1],[N.e5,2],
  [N.f5,1],[N.a5,1],[N.c5,1],[N.a5,1],
  [N.f5,1],[N.e5,1],[N.f5,2],
  [N.g5,1],[N.b5,1],[N.c6,1],[N.b5,1],
  [N.g5,1],[N.e5,1],[N.g5,2],
  [N.b5,2],[N.g5,1],[N.f5,1],
  [N.e5,4],
];

// ── ベース ──
const BAS = [
  [N.c3,2],[N.g3,2],
  [N.c3,2],[N.g3,2],
  [N.f3,2],[N.c3,2],
  [N.g3,2],[N.r, 2],
  [N.a3,2],[N.e3,2],
  [N.f3,2],[N.c3,2],
  [N.g3,2],[N.d3,2],
  [N.c3,4],
];

function schedBGMNote(ctx, dst, freq, t, durBeats, wave) {
  if (freq <= 0) return;
  const osc = ctx.createOscillator();
  const env = ctx.createGain();
  osc.connect(env); env.connect(dst);
  osc.type = wave;
  osc.frequency.value = freq;
  const dur = durBeats * EIGHTH;
  env.gain.setValueAtTime(0, t);
  env.gain.linearRampToValueAtTime(1.0, t + 0.006);
  env.gain.setValueAtTime(1.0, t + dur * 0.82);
  env.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.98);
  osc.start(t);
  osc.stop(t + dur + 0.02);
}

function schedBGMLoop(startT) {
  if (!bgmCtx) return;

  // メロディチャンネル
  const melGain = bgmCtx.createGain(); melGain.gain.value = 0.22;
  melGain.connect(bgmMaster);
  let mt = startT;
  for (const [f, b] of MEL) { schedBGMNote(bgmCtx, melGain, f, mt, b, 'square'); mt += b * EIGHTH; }

  // ハーモニーチャンネル
  const harGain = bgmCtx.createGain(); harGain.gain.value = 0.12;
  harGain.connect(bgmMaster);
  let ht = startT;
  for (const [f, b] of HAR) { schedBGMNote(bgmCtx, harGain, f, ht, b, 'square'); ht += b * EIGHTH; }

  // ベースチャンネル
  const basGain = bgmCtx.createGain(); basGain.gain.value = 0.18;
  basGain.connect(bgmMaster);
  let bt = startT;
  for (const [f, b] of BAS) { schedBGMNote(bgmCtx, basGain, f, bt, b, 'triangle'); bt += b * EIGHTH; }

  // ループ長を計算して次を予約
  const loopBeats = MEL.reduce((s, [, b]) => s + b, 0);
  const loopSec   = loopBeats * EIGHTH;
  bgmLoopTimer = setTimeout(() => schedBGMLoop(startT + loopSec), (loopSec - 0.35) * 1000);
}

function startBGM() {
  stopBGM();
  try {
    bgmCtx = new (window.AudioContext || window.webkitAudioContext)();
    bgmMaster = bgmCtx.createGain();
    bgmMaster.gain.value = 0.45;
    bgmMaster.connect(bgmCtx.destination);
    schedBGMLoop(bgmCtx.currentTime + 0.05);
  } catch(e) { /* 非対応環境は無視 */ }
}

function stopBGM() {
  clearTimeout(bgmLoopTimer);
  bgmLoopTimer = null;
  if (bgmCtx) {
    try { bgmCtx.close(); } catch(e) {}
    bgmCtx = null;
    bgmMaster = null;
  }
}

// ==============================
// イベントリスナーを1回だけ登録（重複防止）
// ==============================
(function setupEventListeners() {
  const gridEl = document.getElementById('grid');

  gridEl.addEventListener('mousedown',  onMDown);
  gridEl.addEventListener('mouseover',  onMOver);
  document.addEventListener('mouseup',  onMUp);

  gridEl.addEventListener('touchstart', onTStart, { passive: false });
  gridEl.addEventListener('touchmove',  onTMove,  { passive: false });
  gridEl.addEventListener('touchend',   onTEnd,   { passive: false });

  // ゲーム画面全体で pull-to-refresh・スワイプバック・ページ遷移を防ぐ
  const gameScreen = document.getElementById('gameScreen');
  gameScreen.addEventListener('touchstart', (e) => {
    e.preventDefault();  // 全タッチイベントのデフォルト動作（pull-to-refresh等）を阻止
  }, { passive: false });
  gameScreen.addEventListener('touchmove', (e) => {
    e.preventDefault();
  }, { passive: false });
  gameScreen.addEventListener('touchend', (e) => {
    e.stopPropagation();
  }, { passive: false });
})();
</script>
