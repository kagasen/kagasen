<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>作家の時間</title>
    <!-- Tailwindは同梱のローカルファイルから読み込む（オフラインのiPadでも動くように）。
         CDNフォールバックは完全オフライン化(2026-07-06)で撤去した（tailwind.min.js 同梱済みのため不要） -->
    <script src="tailwind.min.js"></script>
    <style>
        /* Tailwindが読み込めなかったときの保険（画面の表示・非表示だけは必ず動くように） */
        .hidden {
            display: none;
        }

        /* === アプリ専用のスタイル（他の要素に干渉しないように #sakka-app に限定） === */
        #sakka-app {
            font-family: 'Hiragino Maru Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: #FFF9E6;
            background-image: radial-gradient(#FDE68A 1px, transparent 1px);
            background-size: 20px 20px;
            color: #333;
            touch-action: manipulation;
        }

        #sakka-app .btn-bounce {
            transition: all 0.15s ease;
        }

        #sakka-app .btn-bounce:active {
            transform: scale(0.95);
        }

        /* スクロールバーのカスタマイズ */
        #sakka-app ::-webkit-scrollbar {
            width: 8px;
        }

        #sakka-app ::-webkit-scrollbar-track {
            background: transparent;
        }

        #sakka-app ::-webkit-scrollbar-thumb {
            background: #FCD34D;
            border-radius: 4px;
        }

        #sakka-app ::-webkit-scrollbar-thumb:hover {
            background: #F59E0B;
        }

        @keyframes sakka-pop {
            0% {
                transform: scale(0.9);
            }

            50% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
            }
        }

        #sakka-app .chip-selected {
            animation: sakka-pop 0.2s ease-out forwards;
        }

        /* === ふりがな（ルビ）のバランス調整 === */
        #sakka-app ruby {
            ruby-align: center;
        }

        #sakka-app rt {
            font-size: 0.65em;
            color: #666;
        }

        /* === ページレイアウト（プレビュー・印刷共通で絶対にズレない仕組み） === */
        .sakka-page-container {
            container-type: inline-size;
            width: 100%;
            aspect-ratio: 1 / 1.414;
            /* A4比率 */
            position: relative;
            box-sizing: border-box;
            overflow: hidden;
        }

        .sakka-page-inner {
            position: absolute;
            inset: 0;
            /* 以前より下部の余白を減らし、文字が入るスペースを広げました */
            padding: 8cqw 9cqw 5cqw 9cqw;
            display: flex;
            flex-direction: column;
            /* 文字サイズ・行送り・字間は「1行の字数×行の数」からJSが計算してセットする */
            font-size: var(--sakka-font, 3cqw);
            line-height: var(--sakka-line, 6.6cqw);
            letter-spacing: var(--sakka-tracking, 0);
            overflow: hidden;
            word-break: break-word;
        }

        .sakka-page-title {
            font-size: 4.5cqw;
            font-weight: 800;
            /* 論理プロパティ（block-end / inline-end）なので、たて書きでも正しい向きに余白がつく */
            margin-block-end: 1.5cqw;
            line-height: 1.4;
            letter-spacing: normal;
            text-align: center;
        }

        .sakka-page-author {
            font-size: 3cqw;
            font-weight: 700;
            text-align: right;
            color: inherit;
            opacity: 0.8;
            margin-block-end: 4cqw;
            padding-inline-end: 2cqw;
            line-height: 1.6;
            letter-spacing: normal;
        }

        .sakka-page-num {
            position: absolute;
            bottom: 2cqw;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 2cqw;
            font-weight: bold;
            opacity: 0.6;
        }

        /* === たて書きモード（A4よこ・右上から書きはじめる） === */
        .sakka-page-container.sakka-vertical {
            aspect-ratio: 1.414 / 1;
            /* A4よこ比率 */
        }

        .sakka-vertical .sakka-page-inner {
            writing-mode: vertical-rl;
            /* 紙がよこ長になるぶん、cqw（横幅基準）の値を 1.414 で割って換算した余白 */
            padding: 5.7cqw 6.4cqw 3.5cqw 6.4cqw;
        }

        .sakka-vertical .sakka-page-title {
            font-size: 3.2cqw;
            margin-block-end: 1cqw;
        }

        .sakka-vertical .sakka-page-author {
            font-size: 2.1cqw;
            margin-block-end: 2.8cqw;
        }

        .sakka-vertical .sakka-page-num {
            bottom: 1.4cqw;
            font-size: 1.4cqw;
        }

        /* === 本のデザイン（テーマ）10種類 === */
        .sakka-theme-classic {
            background-color: #fdf6e3;
            color: #333;
            border: 8px double #d4a373;
            font-family: serif;
        }

        .sakka-theme-magic {
            background-color: #1e1b4b;
            color: #e0e7ff;
            border: 4px dashed #fcd34d;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.6);
        }

        .sakka-theme-forest {
            background-color: #f0fdf4;
            color: #14532d;
            border: 12px solid #86efac;
            border-radius: 20px;
        }

        .sakka-theme-notebook {
            background-color: #ffffff;
            color: #374151;
            border: 2px solid #e5e7eb;
            border-left: 20px solid #fca5a5;
            border-radius: 4px;
        }

        .sakka-theme-antique {
            background-color: #fef3c7;
            color: #451a03;
            border: 10px solid #78350f;
            outline: 2px solid #fef3c7;
            outline-offset: -8px;
            font-family: serif;
        }

        .sakka-theme-ocean {
            background-color: #e0f2fe;
            color: #0369a1;
            border: 8px dashed #38bdf8;
            border-radius: 12px;
        }

        .sakka-theme-sunset {
            background: linear-gradient(to bottom, #fff7ed, #ffedd5, #fed7aa);
            color: #9a3412;
            border: 8px solid #ea580c;
            border-radius: 8px;
        }

        .sakka-theme-sakura {
            background-color: #fdf2f8;
            color: #9d174d;
            border: 6px solid #f9a8d4;
            border-radius: 16px;
        }

        .sakka-theme-space {
            background-color: #0f172a;
            color: #f8fafc;
            border: 4px solid #475569;
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .sakka-theme-monochrome {
            background-color: #f8fafc;
            color: #0f172a;
            border: 12px solid #334155;
            font-family: serif;
        }

        /* === 印刷用のスタイル === */
        #sakka-print-area {
            display: none;
        }

        @media print {

            body,
            html {
                background: none !important;
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                margin: 0 !important;
                padding: 0 !important;
                width: 100% !important;
                height: 100% !important;
            }

            #sakka-app {
                display: none !important;
            }

            #sakka-print-area {
                display: block !important;
                width: 100%;
                margin: 0;
                padding: 0;
            }

            .sakka-print-page {
                /* A4用紙の安全領域（ヘッダー・フッターに干渉しないサイズ）にひと回り縮小 */
                width: 170mm !important;
                height: 240mm !important;
                aspect-ratio: auto !important;
                /* 比率計算を解除して絶対値を優先 */
                margin: 0 auto !important;
                /* 横方向のみ中央配置、上下の余白はブラウザの仕様に任せる */
                box-sizing: border-box;
                overflow: hidden;
                position: relative;
                page-break-inside: avoid !important;
                page-break-after: always !important;
            }

            /* たて書きのときはA4よこ向きの安全領域に合わせる */
            .sakka-print-page.sakka-vertical {
                width: 240mm !important;
                height: 170mm !important;
            }

            /* 最後のページだけは改ページしない（無駄な白紙ページを防ぐ） */
            .sakka-print-page:last-child {
                page-break-after: auto !important;
            }
        }
    </style>
    <style id="sakka-print-orientation">
        /* 用紙の向きは印刷時にJSが書きかえる（よこ書き=A4たて / たて書き=A4よこ） */
        @page {
            size: A4 portrait;
            margin: 15mm;
            /* ページの外側に15mmの余白を設け、ヘッダやフッタの場所を確保する */
        }
    </style>
    <meta name="theme-color" content="#D97706">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icon.svg">
</head>

<body class="antialiased">

    <div id="sakka-app" class="relative w-full min-h-screen h-full flex flex-col">

        <!-- ================== トップ画面 ================== -->
        <div id="sakka-screen-start" class="flex-grow flex flex-col items-center justify-center p-4">
            <div
                class="bg-white/80 backdrop-blur-sm p-8 rounded-3xl shadow-xl text-center max-w-lg w-full border-4 border-orange-200">
                <div class="text-6xl mb-4">📖✍️</div>
                <h1
                    class="text-4xl md:text-5xl font-extrabold text-orange-500 mb-6 drop-shadow-sm tracking-wide leading-normal">
                    <ruby>作家<rt>さっか</rt></ruby>の<ruby>時間<rt>じかん</rt></ruby>
                </h1>
                <p class="text-lg md:text-xl text-gray-700 mb-10 font-bold leading-relaxed">
                    キミだけのオリジナルストーリーを<br><ruby>作<rt>つく</rt></ruby>ってみよう！
                </p>

                <button onclick="sakka_startApp()"
                    class="btn-bounce w-full bg-gradient-to-r from-orange-400 to-orange-500 text-white text-xl md:text-2xl font-extrabold py-4 px-10 rounded-full shadow-lg hover:shadow-xl hover:from-orange-500 hover:to-orange-600 border-b-4 border-orange-600 active:border-b-0 active:translate-y-1 leading-normal mb-4">
                    <span><ruby>新<rt>あたら</rt></ruby>しく<ruby>書<rt>か</rt></ruby>く ✨</span>
                </button>

                <!-- 自動保存からの再開ボタン（保存データがあるときだけ表示） -->
                <button id="sakka-resume-btn" onclick="sakka_restoreAutosave()" style="display: none;"
                    class="btn-bounce w-full bg-gradient-to-r from-green-400 to-green-500 text-white text-lg md:text-xl font-extrabold py-3 px-10 rounded-full shadow-lg hover:from-green-500 hover:to-green-600 border-b-4 border-green-600 active:border-b-0 active:translate-y-1 leading-normal mb-4">
                    <span>▶️ さっきのつづきから</span>
                    <span id="sakka-resume-info" class="block text-xs font-bold text-green-100 mt-1"></span>
                </button>

                <!-- 読み込みボタン -->
                <button onclick="document.getElementById('sakka-file-input').click()"
                    class="btn-bounce w-full bg-white text-orange-500 text-lg md:text-xl font-extrabold py-3 px-10 rounded-full shadow border-2 border-orange-400 hover:bg-orange-50 active:translate-y-1 leading-normal">
                    <span>📂 つづきから<ruby>書<rt>か</rt></ruby>く</span>
                    <span class="block text-xs font-bold text-gray-500 mt-1">（ファイルを<ruby>読<rt>よ</rt></ruby>み<ruby>込<rt>こ
                            </rt></ruby>む）</span>
                </button>
                <input type="file" id="sakka-file-input" accept=".json" style="display: none;"
                    onchange="sakka_importData(event)">

            </div>
        </div>

        <!-- ================== 質問画面 ================== -->
        <div id="sakka-screen-question"
            class="hidden flex-grow flex flex-col p-2 md:p-4 lg:p-6 max-w-4xl mx-auto w-full h-full">
            <div
                class="mb-2 md:mb-4 flex justify-between items-center text-sm md:text-base font-bold text-gray-500 bg-white py-2 px-4 rounded-full shadow-sm">
                <span id="sakka-q-progress" class="tracking-widest">1 / 6</span>
                <span id="sakka-q-badge"
                    class="px-4 py-1 rounded-full text-sm md:text-base font-bold shadow-inner">はじめ</span>
            </div>

            <div
                class="bg-white p-4 md:p-6 rounded-3xl shadow-md border-2 border-orange-100 flex-grow flex flex-col overflow-y-auto relative">
                <div class="mb-4">
                    <h2 id="sakka-q-title"
                        class="text-xl md:text-3xl font-extrabold text-gray-800 mb-2 leading-relaxed block">どんな主人公？</h2>
                    <p id="sakka-q-desc" class="text-gray-600 font-bold text-sm md:text-base leading-relaxed block">
                        5つまでえらんでね！</p>
                </div>

                <div class="mb-4 bg-gray-50 p-3 md:p-5 rounded-2xl border border-gray-100">
                    <div id="sakka-q-options" class="flex flex-wrap justify-center gap-2 md:gap-3">
                        <!-- JSで動的生成 -->
                    </div>
                </div>

                <div class="mt-auto">
                    <div class="block text-gray-700 font-bold mb-2 flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" class="text-orange-500 flex-shrink-0">
                                <path
                                    d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z" />
                                <path d="m15 5 4 4" />
                            </svg>
                            <span class="leading-relaxed"><ruby>自由<rt>じゆう</rt></ruby>に<ruby>書<rt>か</rt>
                                </ruby>いてもいいよ！</span>
                        </div>
                    </div>
                    <textarea id="sakka-q-freetext"
                        class="w-full p-3 md:p-4 border-2 border-gray-200 rounded-2xl focus:border-orange-400 focus:ring-4 focus:ring-orange-100 focus:outline-none resize-none transition-all font-medium text-gray-700 text-sm md:text-base"
                        rows="2" placeholder="思（おも）いついたことを自由（じゆう）に書いてみよう！"></textarea>
                </div>
            </div>

            <div class="flex justify-between items-center mt-3 gap-3 pb-2">
                <button onclick="sakka_prevStep()" id="sakka-btn-prev"
                    class="btn-bounce bg-white text-gray-600 font-bold py-3 md:py-4 px-6 md:px-8 rounded-full shadow-sm border-2 border-gray-200 hover:bg-gray-50 flex-1 md:flex-none text-center">
                    もどる
                </button>
                <button onclick="sakka_nextStep()"
                    class="btn-bounce bg-orange-500 text-white font-extrabold py-3 md:py-4 px-8 md:px-12 rounded-full shadow-md hover:bg-orange-600 border-b-4 border-orange-700 active:border-b-0 active:translate-y-1 flex-1 md:flex-none text-center text-lg">
                    つぎへ ➔
                </button>
            </div>
        </div>

        <!-- ================== 執筆画面 ================== -->
        <div id="sakka-screen-writing"
            class="hidden flex-grow flex flex-col p-2 md:p-6 lg:p-8 max-w-7xl mx-auto w-full h-auto min-h-screen md:h-screen md:min-h-0 md:overflow-hidden">

            <div
                class="flex justify-between items-center mb-4 bg-white p-3 md:p-4 rounded-2xl shadow-sm overflow-x-auto">
                <h2
                    class="text-xl md:text-3xl font-extrabold text-gray-800 flex items-center gap-2 flex-shrink-0 mr-4 leading-relaxed">
                    <span>📝</span>
                    <span>お<ruby>話<rt>はなし</rt></ruby>を<ruby>書<rt>か</rt></ruby>こう！</span>
                </h2>
                <div class="flex gap-2 flex-shrink-0">

                    <!-- 途中保存ボタン -->
                    <button onclick="sakka_exportData()"
                        class="btn-bounce bg-blue-500 text-white font-bold py-2 px-3 md:px-6 rounded-full shadow hover:bg-blue-600 text-sm md:text-base flex items-center gap-1 border-b-4 border-blue-700 active:border-b-0 active:translate-y-1">
                        💾 <span class="hidden md:inline leading-none">途中保存</span>
                    </button>

                    <button onclick="sakka_openChecklist()"
                        class="btn-bounce bg-green-500 text-white font-bold py-2 px-3 md:px-6 rounded-full shadow hover:bg-green-600 text-sm md:text-base flex items-center gap-2 border-b-4 border-green-700 active:border-b-0 active:translate-y-1">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                            <polyline points="14 2 14 8 20 8" />
                            <path d="m9 15 2 2 4-4" />
                        </svg>
                        <span class="hidden md:inline leading-none">ふり<ruby>返<rt>かえ</rt></ruby>り</span><span
                            class="leading-none">チェック</span>
                    </button>
                    <button onclick="sakka_finishStory()"
                        class="btn-bounce bg-yellow-400 text-yellow-900 font-extrabold py-2 px-4 md:px-8 rounded-full shadow-md hover:bg-yellow-500 text-sm md:text-lg flex items-center gap-1 border-b-4 border-yellow-600 active:border-b-0 active:translate-y-1">
                        ✨ 完成！
                    </button>
                </div>
            </div>

            <div class="flex flex-col md:flex-row gap-4 flex-grow md:overflow-hidden">

                <!-- 左側：設定の確認 -->
                <div
                    class="w-full md:w-1/3 lg:w-1/4 bg-white rounded-3xl shadow-sm border-2 border-orange-100 flex flex-col h-40 md:h-full flex-shrink-0">
                    <div class="bg-orange-50 p-3 rounded-t-3xl border-b border-orange-100">
                        <h3
                            class="font-bold text-base md:text-lg text-orange-700 flex items-center gap-1 leading-relaxed">
                            <span>🔍</span>
                            <span>キミが<ruby>考<rt>かんが</rt></ruby>えたこと</span>
                        </h3>
                    </div>
                    <div id="sakka-memo-content" class="flex-grow overflow-y-auto p-4 space-y-5 text-sm md:text-base">
                        <!-- JSで動的生成 -->
                    </div>
                    <div class="p-3 bg-gray-50 rounded-b-3xl border-t border-gray-100 flex flex-col gap-2">
                        <button onclick="sakka_useMagicWand()"
                            class="btn-bounce w-full bg-purple-500 text-white font-bold py-3 px-2 rounded-xl shadow hover:bg-purple-600 text-xs md:text-sm flex items-center justify-center gap-1 border-b-4 border-purple-700 active:border-b-0 active:translate-y-1 leading-none">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round" class="flex-shrink-0">
                                <path
                                    d="m21.64 3.64-1.28-1.28a1.21 1.21 0 0 0-1.72 0L2.36 18.64a1.21 1.21 0 0 0 0 1.72l1.28 1.28a1.2 1.2 0 0 0 1.72 0L21.64 5.36a1.2 1.2 0 0 0 0-1.72Z" />
                                <path d="m14 7 3 3" />
                                <path d="M5 6v4" />
                                <path d="M19 14v4" />
                                <path d="M10 2v2" />
                                <path d="M7 8H3" />
                                <path d="M21 16h-4" />
                                <path d="M11 3H9" />
                            </svg>
                            <span>まほうのステッキで<ruby>下書<rt>したが</rt></ruby>き</span>
                        </button>
                        <button onclick="sakka_appData.step = 1; sakka_updateScreen();"
                            class="btn-bounce w-full bg-white text-gray-600 font-bold py-2 px-2 rounded-xl shadow-sm border-2 border-gray-200 hover:bg-gray-100 text-xs md:text-sm flex items-center justify-center gap-1 transition-colors active:translate-y-1">
                            <span>🔄 もう<ruby>一度<rt>いちど</rt></ruby><ruby>考<rt>かんが</rt></ruby>える</span>
                        </button>
                    </div>
                </div>

                <!-- 右側：エディタ -->
                <div id="sakka-editor-panel"
                    class="w-full md:w-2/3 lg:w-3/4 flex flex-col min-h-[60vh] md:min-h-0 md:h-full bg-white rounded-3xl shadow-sm border-2 border-gray-200 overflow-hidden">
                    <div class="flex flex-col">
                        <input type="text" id="sakka-story-title" placeholder="お話（はなし）のタイトル"
                            class="text-xl md:text-3xl font-extrabold p-4 md:p-6 pb-2 border-b border-dashed border-gray-300 focus:bg-orange-50 focus:outline-none w-full text-center text-gray-800 placeholder-gray-300 transition-colors">
                        <div
                            class="flex justify-end items-center pr-4 md:pr-6 py-2 border-b border-dashed border-gray-300 bg-gray-50 focus-within:bg-orange-50 transition-colors">
                            <div class="flex items-center">
                                <span class="text-gray-500 font-bold mr-2 text-sm md:text-base">なまえ：</span>
                                <input type="text" id="sakka-story-author" placeholder="ここに入力"
                                    class="text-base md:text-lg font-bold p-1 focus:outline-none bg-transparent text-gray-800 w-32 md:w-48 text-left">
                            </div>
                        </div>
                        <!-- 書き方の設定（マスの数）。たて書きは完成画面でえらべる。 -->
                        <div
                            class="flex flex-wrap items-center justify-center gap-x-4 gap-y-2 px-3 py-2 border-b-2 border-dashed border-gray-300 bg-gray-50 text-xs md:text-sm font-bold text-gray-600">
                            <label class="flex items-center gap-1">
                                <span>1<ruby>行<rt>ぎょう</rt></ruby>の<ruby>字<rt>じ</rt></ruby>：</span>
                                <select onchange="sakka_setGridChars(this.value)"
                                    class="sakka-grid-chars border-2 border-gray-200 rounded-lg px-2 py-1 bg-white text-gray-700 font-bold"></select>
                            </label>
                            <label class="flex items-center gap-1">
                                <span><ruby>行<rt>ぎょう</rt></ruby>の<ruby>数<rt>かず</rt></ruby>：</span>
                                <select onchange="sakka_setGridLines(this.value)"

            "みんながえがおになった", "ゆめに[向:む]かって[走:はし]り[出:だ]した", "[大:おお]きな[声:こえ]で[笑:わら]った", "[星空:ほしぞら]を[見上:みあ]げてちかった", "そしてだれもいなくなった",
            "[次:つぎ]の[日:ひ]から[何:なに]かがかわった", "ずっと[忘:わす]れない[思:おも]い[出:で]になった", "[空:そら]の[上:うえ]から[見守:みまも]ることにした", "[魔法:まほう]の[力:ちから]はきえてしまった", "みんなでパーティーをした",
            "あしたもきっといい[日:ひ]になる", "お[腹:なか]がいっぱいになった", "またひとつ[年:とし]をとった", "ふしぎな[夢:ゆめ]からさめた", "[誰:だれ]も[知:し]らない[秘密:ひみつ]のまま",
            "[宝物:たからもの]はずっと[心:こころ]の[中:なか]に", "[新:あたら]しい[友:とも]だちができた", "そして[夜:よる]が[明:あ]けた", "いつもの[笑顔:えがお]がもどった", "[遠:とお]くから[歌:うた]が[聞:き]こえた",
            "[風:かぜ]がやさしくふいた", "どこかへ[旅立:たびだ]っていった", "にじの[橋:はし]をわたった", "ほんの[少:すこ]し[勇気:ゆうき]がもてた", "これからもぼうけんはつづく"
        ];

        const sakka_questionsData = [
            { id: 'protagonist', badge: 'はじめ', title: 'どんな[主人公:しゅじんこう]？', desc: '[主人公:しゅじんこう]のイメージを5つまでえらんでね！', maxSelect: 5, options: sakka_protagonistOptions },
            { id: 'time', badge: 'はじめ', title: 'いつのお[話:はなし]？', desc: 'お[話:はなし]の[始:はじ]まりはいつだろう？3つまでえらべるよ。', maxSelect: 3, options: sakka_timeOptions },
            { id: 'place', badge: 'はじめ', title: '[場所:ばしょ]はどこ？', desc: 'お[話:はなし]の[舞台:ぶたい]はどこ？3つまでえらべるよ。', maxSelect: 3, options: sakka_placeOptions },
            { id: 'event', badge: '中', title: 'どんな[出来事:できごと]が[起:お]きた？', desc: '[主人公:しゅじんこう]に[何:なに]が[起:お]きたかな？3つまでえらべるよ。', maxSelect: 3, options: sakka_eventOptions },
            { id: 'solution', badge: '中', title: 'どうやってかいけつした？', desc: 'その[出来事:できごと]をどうやってのりこえた？3つまでえらべるよ。', maxSelect: 3, options: sakka_solutionOptions },
            { id: 'ending', badge: 'おわり', title: '[最後:さいご]にどう[思:おも]った？', desc: 'お[話:はなし]の[最後:さいご]はどうなったかな？3つまでえらべるよ。', maxSelect: 3, options: sakka_endingOptions }
        ];

        // --- 状態管理 ---
        function sakka_createEmptyAnswers() {
            const answers = {};
            sakka_questionsData.forEach(q => {
                answers[q.id] = { selected: [], free: '', visibleOptions: [] };
            });
            return answers;
        }

        const sakka_appData = {
            step: 0,
            answers: sakka_createEmptyAnswers()
        };

        // Fisher-Yates シャッフル（偏りのないランダム）
        function sakka_shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function sakka_getRandomItems(array, num) {
            return sakka_shuffleArray(array).slice(0, num);
        }

        function sakka_generateVisibleOptions(qId) {
            const q = sakka_questionsData.find(item => item.id === qId);
            const ans = sakka_appData.answers[qId];
            let newVisible = [...ans.selected];
            const neededCount = 5 - ans.selected.length;
            if (neededCount > 0) {
                const unselectedOptions = q.options.filter(opt => !ans.selected.includes(opt));
                newVisible = newVisible.concat(sakka_getRandomItems(unselectedOptions, neededCount));
            }
            ans.visibleOptions = sakka_shuffleArray(newVisible);
        }

        function sakka_shuffleOptions(qId) {
            sakka_generateVisibleOptions(qId);
            sakka_renderQuestion(sakka_appData.step - 1);
        }

        function sakka_startApp() {
            // 自動保存されたお話があるときは、消える前に確認する
            try {
                if (localStorage.getItem(SAKKA_STORAGE_KEY)) {
                    const ok = confirm('まえに書いたお話のデータがあるよ。\n新しく書きはじめると、まえのデータは消えてしまうけどいいかな？\n\n（とっておきたいときは「キャンセル」をおして、「さっきのつづきから」を開いて💾保存してね）');
                    if (!ok) return;
                    localStorage.removeItem(SAKKA_STORAGE_KEY);
                }
            } catch (e) { }
            document.getElementById('sakka-resume-btn').style.display = 'none';

            // はじめて書くときはデータをリセットする
            sakka_appData.answers = sakka_createEmptyAnswers();
            document.getElementById('sakka-story-title').value = '';
            document.getElementById('sakka-story-author').value = '';
            document.getElementById('sakka-story-editor').value = '';
            sakka_updateCharCount();
            sakka_resetChecklist();

            // 向き・デザイン・マスの数もはじめの状態にもどす
            sakka_isVertical = false;
            sakka_currentTheme = 'classic';
            sakka_gridChars = 20;
            sakka_gridLines = 10;
            sakka_renderThemeButtons();
            sakka_updateModeButtons();
            sakka_updateEditorMode();
            sakka_syncGridSelects();

            sakka_appData.step = 1;
            sakka_updateScreen();
        }

        function sakka_finishStory() {
            if (!document.getElementById('sakka-story-editor').value.trim()) {
                sakka_showToast('✍️ まだお話が書かれていないよ！');
                return;
            }
            sakka_appData.step = 8;
            sakka_updateScreen();
        }

        function sakka_updateScreen() {
            document.getElementById('sakka-screen-start').classList.add('hidden');
            document.getElementById('sakka-screen-question').classList.add('hidden');
            document.getElementById('sakka-screen-writing').classList.add('hidden');
            document.getElementById('sakka-screen-finish').classList.add('hidden');

            try { window.scrollTo(0, 0); } catch (e) { }

            if (sakka_appData.step === 0) {
                document.getElementById('sakka-screen-start').classList.remove('hidden');
            } else if (sakka_appData.step >= 1 && sakka_appData.step <= 6) {
                sakka_renderQuestion(sakka_appData.step - 1);
                document.getElementById('sakka-screen-question').classList.remove('hidden');
            } else if (sakka_appData.step === 7) {
                sakka_renderWritingScreen();
                document.getElementById('sakka-screen-writing').classList.remove('hidden');
                // 表示されてから、向き・スクロールバー・文字サイズをまとめて適用
                // （非表示中はサイズが取れないため、ここで確定させる）
                sakka_updateEditorMode();
            } else if (sakka_appData.step === 8) {
                document.getElementById('sakka-screen-finish').classList.remove('hidden');
                setTimeout(() => sakka_createPreviewPages(), 100);
            }

            sakka_autoSave();
        }

        function sakka_renderQuestion(index) {
            const q = sakka_questionsData[index];
            const currentAnswers = sakka_appData.answers[q.id];

            if (!currentAnswers.visibleOptions || currentAnswers.visibleOptions.length === 0) {
                sakka_generateVisibleOptions(q.id);
            }

            document.getElementById('sakka-q-progress').innerText = `${index + 1} / 6`;

            const badge = document.getElementById('sakka-q-badge');
            badge.innerText = q.badge;
            badge.className = 'px-4 py-1 rounded-full text-sm md:text-base font-bold shadow-inner ';
            if (q.badge === 'はじめ') badge.classList.add('bg-blue-100', 'text-blue-700');
            else if (q.badge === '中') badge.classList.add('bg-green-100', 'text-green-700');
            else if (q.badge === 'おわり') badge.classList.add('bg-pink-100', 'text-pink-700');

            document.getElementById('sakka-q-title').innerHTML = sakka_parseRuby(q.title);
            document.getElementById('sakka-q-desc').innerHTML = sakka_parseRuby(q.desc);

            const optionsContainer = document.getElementById('sakka-q-options');
            optionsContainer.innerHTML = '';

            currentAnswers.visibleOptions.forEach(opt => {
                const btn = document.createElement('button');
                const isSelected = currentAnswers.selected.includes(opt);

                btn.innerHTML = `<span class="leading-relaxed">${sakka_parseRuby(opt)}</span>`;
                let baseClass = 'px-3 py-1.5 md:px-4 md:py-2 rounded-full border-2 text-sm md:text-base font-bold transition-all duration-200 select-none ';
                if (isSelected) {
                    btn.className = baseClass + 'bg-orange-500 border-orange-500 text-white shadow-md chip-selected';
                } else {
                    btn.className = baseClass + 'bg-white border-gray-200 text-gray-700 hover:border-orange-300 hover:bg-orange-50';
                }
                btn.onclick = () => sakka_toggleOption(q.id, opt, q.maxSelect, btn, baseClass);
                optionsContainer.appendChild(btn);
            });

            const othersBtn = document.createElement('button');
            othersBtn.innerHTML = '🔄 そのほか';
            othersBtn.className = 'px-4 py-1.5 md:px-6 md:py-2 rounded-full border-2 border-dashed border-gray-400 text-gray-600 bg-white text-sm md:text-base font-bold hover:bg-gray-100 transition-all select-none w-full md:w-auto mt-1 md:mt-2';
            othersBtn.onclick = () => sakka_shuffleOptions(q.id);
            optionsContainer.appendChild(othersBtn);

            const freeTextEl = document.getElementById('sakka-q-freetext');
            freeTextEl.value = currentAnswers.free;
            freeTextEl.oninput = (e) => {
                sakka_appData.answers[q.id].free = e.target.value;
                sakka_autoSave();
            };

            document.getElementById('sakka-btn-prev').style.visibility = (index === 0) ? 'hidden' : 'visible';
        }

        function sakka_toggleOption(qId, option, maxSelect, btnEl, baseClass) {
            const selectedArr = sakka_appData.answers[qId].selected;
            const index = selectedArr.indexOf(option);

            if (index > -1) {
                selectedArr.splice(index, 1);
                btnEl.className = baseClass + 'bg-white border-gray-200 text-gray-700 hover:border-orange-300 hover:bg-orange-50';
            } else {
                if (selectedArr.length < maxSelect) {
                    selectedArr.push(option);
                    btnEl.className = baseClass + 'bg-orange-500 border-orange-500 text-white shadow-md';
                    void btnEl.offsetWidth;
                    btnEl.classList.add('chip-selected');
                } else {
                    sakka_showToast(`えらべるのは ${maxSelect}つ までだよ！`);
                    btnEl.classList.add('transform', 'translate-x-1');
                    setTimeout(() => btnEl.classList.remove('translate-x-1'), 100);
                    setTimeout(() => btnEl.classList.add('-translate-x-1'), 200);
                    setTimeout(() => btnEl.classList.remove('-translate-x-1'), 300);
                }
            }
            sakka_autoSave();
        }

        function sakka_nextStep() {
            if (sakka_appData.step < 8) {
                sakka_appData.step++;
                sakka_updateScreen();
            }
        }

        function sakka_prevStep() {
            if (sakka_appData.step > 1) {
                sakka_appData.step--;
                sakka_updateScreen();
            }
        }

        function sakka_renderWritingScreen() {
            const memoContent = document.getElementById('sakka-memo-content');
            memoContent.innerHTML = '';

            sakka_questionsData.forEach(q => {
                const ans = sakka_appData.answers[q.id];
                if (ans.selected.length === 0 && !ans.free.trim()) return;

                const div = document.createElement('div');
                div.className = "bg-white p-3 rounded-2xl shadow-sm border border-gray-100";

                let badgeColor = q.badge === 'はじめ' ? 'bg-blue-100 text-blue-700' : (q.badge === '中' ? 'bg-green-100 text-green-700' : 'bg-pink-100 text-pink-700');

                let contentHtml = `
          <h4 class="font-bold text-gray-800 mb-2 flex items-start text-sm md:text-base leading-relaxed">
            <span class="text-xs px-2 py-0.5 rounded-full ${badgeColor} mr-2 mt-1 flex-shrink-0">${q.badge}</span>
            <span class="block">${sakka_parseRuby(q.title.replace(/【.*】/, ''))}</span>
          </h4>`;

                if (ans.selected.length > 0) {
                    contentHtml += `<div class="flex flex-wrap gap-1 mb-2">`;
                    ans.selected.forEach(s => {
                        contentHtml += `<span class="bg-orange-100 text-orange-800 text-xs font-bold px-2 py-1 rounded-md leading-relaxed">${sakka_parseRuby(s)}</span>`;
                    });
                    contentHtml += `</div>`;
                }

                if (ans.free.trim()) {
                    contentHtml += `<p class="text-gray-600 text-sm whitespace-pre-wrap border-l-4 border-orange-300 pl-3 py-1 bg-orange-50/50 rounded-r-md">${sakka_escapeHtml(ans.free)}</p>`;
                }

                div.innerHTML = contentHtml;
                memoContent.appendChild(div);
            });

            if (memoContent.innerHTML === '') {
                memoContent.innerHTML = '<p class="text-gray-400 text-center py-4 text-sm leading-relaxed">なにもえらばれていないよ。<br>自由に書いてみよう！</p>';
            }
        }

        function sakka_useMagicWand() {
            const ans = sakka_appData.answers;
            const getAnsStr = (key, defaultText) => {
                let str = ans[key].selected.map(sakka_stripRuby).join('と、');
                if (ans[key].free.trim()) {
                    str += (str ? '。さらに、' : '') + ans[key].free.trim();
                }
                return str || defaultText;
            };

            const protagonist = getAnsStr('protagonist', 'だれか');
            const time = getAnsStr('time', 'あるとき');
            const place = getAnsStr('place', 'どこか');
            const event = getAnsStr('event', 'ふしぎなこと');
            const solution = getAnsStr('solution', 'がんばった');
            const ending = getAnsStr('ending', 'おしまいになりました');

            const draft = `（　）の中（なか）のヒントは、読（よ）んだらけして、自分（じぶん）の言葉（ことば）に書（か）きかえてね！

　${time}、${place}に、${protagonist}がいました。
（どんなけしきが広（ひろ）がっているかな？天気（てんき）や周（まわ）りの音（おと）、主人公（しゅじんこう）のようすも書（か）いてみよう！）

　ある日（ひ）、${event}ということが起（お）きました。
（その時（とき）、主人公はどんな気持（きも）ちになった？「　」を使（つか）ってセリフを入（い）れてみよう！）

　どうなることかと思（おも）いましたが、${solution}ことで、なんとかのりこえることができました。
（のりこえるために、一番（いちばん）大変（たいへん）だったことは何（なに）かな？）

　最後（さいご）に、${ending}。
（この出来事（できごと）のあと、主人公はどんなふうにかわったかな？）

　これでお話（はなし）はおしまいです。`;

            const editor = document.getElementById('sakka-story-editor');
            const magicHeader = '【✨ まほうのステッキの下書き ✨】';

            if (editor.value.includes(magicHeader)) {
                const parts = editor.value.split(magicHeader);
                const beforeText = parts[0].trimEnd();

                if (beforeText === '') {
                    editor.value = magicHeader + '\n' + draft;
                } else {
                    editor.value = beforeText + '\n\n' + magicHeader + '\n' + draft;
                }
                sakka_showToast("🪄 下書きを作りなおしたよ！");
            } else {
                if (editor.value.trim() !== '') {
                    editor.value += '\n\n' + magicHeader + '\n' + draft;
                } else {
                    editor.value = magicHeader + '\n' + draft;
                }
                sakka_showToast("🪄 まほうのステッキで下書きを作ったよ！");
            }

            editor.classList.add('bg-purple-50');
            setTimeout(() => editor.classList.remove('bg-purple-50'), 1000);
        }

        // === 保存・読み込み（共通処理） ===
        function sakka_collectData() {
            return {
                appData: sakka_appData,
                title: document.getElementById('sakka-story-title').value,
                author: document.getElementById('sakka-story-author').value,
                text: document.getElementById('sakka-story-editor').value,
                theme: sakka_currentTheme,
                vertical: sakka_isVertical,
                gridChars: sakka_gridChars,
                gridLines: sakka_gridLines
            };
        }

        // 読み込んだデータを画面に反映する（ファイル読み込み・自動保存の復元の両方で使う）
        function sakka_applyData(data) {
            Object.assign(sakka_appData, data.appData);

            // 古いデータでも壊れないように、足りない回答キーを補う
            const empty = sakka_createEmptyAnswers();
            for (const key in empty) {
                if (!sakka_appData.answers[key]) sakka_appData.answers[key] = empty[key];
            }

            document.getElementById('sakka-story-title').value = data.title || '';
            document.getElementById('sakka-story-author').value = data.author || '';
            document.getElementById('sakka-story-editor').value = data.text || '';
            sakka_updateCharCount();

            // 本のデザイン・文字の向き・マスの数も復元する
            sakka_currentTheme = data.theme || 'classic';
            sakka_isVertical = !!data.vertical;
            sakka_gridChars = parseInt(data.gridChars, 10) || 20;
            sakka_gridLines = parseInt(data.gridLines, 10) || 10;
            sakka_renderThemeButtons();
            sakka_updateModeButtons();
            sakka_updateEditorMode();
            sakka_syncGridSelects();

            // とちゅうのステップが不明なときは執筆画面へ
            if (!(sakka_appData.step >= 1 && sakka_appData.step <= 8)) {
                sakka_appData.step = 7;
            }
            sakka_updateScreen();
        }

        // === 自動保存（リロードや電源切れでも作品が消えないように） ===
        const SAKKA_STORAGE_KEY = 'sakka_autosave';
        let sakka_saveTimer = null;

        function sakka_autoSave() {
            clearTimeout(sakka_saveTimer);
            sakka_saveTimer = setTimeout(() => {
                try {
                    const data = sakka_collectData();
                    const hasContent = data.title || data.author || data.text.trim() ||
                        Object.values(data.appData.answers).some(a => a.selected.length > 0 || a.free.trim());
                    if (hasContent) {
                        data.savedAt = Date.now();
                        localStorage.setItem(SAKKA_STORAGE_KEY, JSON.stringify(data));
                    }
                } catch (e) { /* プライベートモードなどで保存できない場合は静かに諦める */ }
            }, 500);
        }

        function sakka_checkAutosave() {
            try {
                const raw = localStorage.getItem(SAKKA_STORAGE_KEY);
                if (!raw) return;
                const data = JSON.parse(raw);
                if (!data.appData) return;

                document.getElementById('sakka-resume-btn').style.display = 'block';
                const date = new Date(data.savedAt || Date.now());
                const name = data.title ? `「${data.title}」` : '（タイトルはまだないよ）';
                document.getElementById('sakka-resume-info').textContent =
                    `${name} ${date.getMonth() + 1}/${date.getDate()} ${date.getHours()}:${String(date.getMinutes()).padStart(2, '0')} ほぞん`;
            } catch (e) { }
        }

        function sakka_restoreAutosave() {
            try {
                const data = JSON.parse(localStorage.getItem(SAKKA_STORAGE_KEY));
                sakka_applyData(data);
                sakka_showToast('▶️ つづきから再開したよ！');
            } catch (e) {
                console.error(e);
                sakka_showToast('❌ データの読み込みに失敗したよ😢');
            }
        }

        // === ファイル保存（エクスポート）と読み込み（インポート）機能 ===
        function sakka_exportData() {
            const exportObj = sakka_collectData();

            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(exportObj));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", (exportObj.title || "さっかのじかん_とちゅう") + ".json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();

            sakka_showToast("💾 ファイルに保存したよ！");
        }

        function sakka_importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                try {
                    const contents = e.target.result;
                    const imported = JSON.parse(contents);

                    if (imported.appData) {
                        // ファイル入力をリセット
                        event.target.value = '';

                        // データを復元して、保存したときの画面へ移動
                        sakka_applyData(imported);

                        sakka_showToast("📂 つづきから読み込んだよ！");
                    } else {
                        sakka_showToast("❌ 正しいファイルじゃないみたい😢");
                    }
                } catch (err) {
                    console.error(err);
                    sakka_showToast("❌ ファイルの読み込みに失敗したよ😢");
                }
            };
            reader.readAsText(file);
        }

        let sakka_pagesData = [];
        let sakka_currentPageIndex = 0;
        let sakka_currentTheme = 'classic';
        let sakka_isVertical = false;

        // --- 文字の向き（よこ書き / たて書き） ---
        function sakka_updateModeButtons() {
            document.querySelectorAll('.sakka-mode-btn').forEach(btn => {
                const active = (btn.dataset.vertical === 'true') === sakka_isVertical;
                btn.classList.toggle('bg-orange-500', active);
                btn.classList.toggle('text-white', active);
                btn.classList.toggle('border-orange-600', active);
                btn.classList.toggle('shadow-sm', active);
                btn.classList.toggle('bg-white', !active);
                btn.classList.toggle('text-gray-600', !active);
                btn.classList.toggle('border-gray-300', !active);
                btn.classList.toggle('hover:bg-gray-100', !active);
            });
        }

        function sakka_setWritingMode(vertical) {
            sakka_isVertical = vertical;
            sakka_updateModeButtons();
            sakka_updateEditorMode();
            sakka_createPreviewPages(sakka_currentPageIndex);
            sakka_autoSave();
        }

        // 書くところ（エディタ）は つねに よこ書き。
        // たて書きエディタはカーソルがずれるため使わず、たて書きは完成画面の本だけに使う。
        function sakka_updateEditorMode() {
            const editor = document.getElementById('sakka-story-editor');
            editor.classList.remove('sakka-editor-vertical');

            // スクロールバーが「出たり消えたり」すると書くスペースの幅が変わって、
            // 1行の字数がズレたりカーソルが飛んだりする。右の縦バーを常に出して幅を一定に保つ。
            // ※iPadなどの重なり表示スクロールバーは場所を取らないので見た目は変わらない。
            editor.style.overflowX = 'hidden';
            editor.style.overflowY = 'scroll';
            document.getElementById('sakka-editor-panel').style.minHeight = '';

            sakka_updateEditorGrid();
        }

        // エディタを「1行の字数」どおりに折り返すよう、文字サイズ（よこ書き）を合わせる。
        // letter-spacing や px指定の line-height はカーソル位置がズレる原因になるため使わず、
        // フォントの字送り係数を実測して、フォントサイズだけで折り返し位置を合わせる。
        function sakka_updateEditorGrid() {
            const editor = document.getElementById('sakka-story-editor');
            if (!editor.clientWidth) return; // 画面に出ていないときは何もしない（表示時に再計算される）

            const cs = getComputedStyle(editor);
            const availPx = editor.clientWidth - parseFloat(cs.paddingLeft) - parseFloat(cs.paddingRight);
            if (availPx <= 0) return;

            // 基準フォント20pxで「1文字の送り ÷ フォントサイズ」の係数を実測
            const probe = document.createElement('div');
            probe.style.cssText = `position:absolute;visibility:hidden;white-space:pre;letter-spacing:0;font-family:${cs.fontFamily};font-size:20px;`;
            probe.textContent = 'ああああああああああ';
            document.body.appendChild(probe);
            const advanceRatio = probe.getBoundingClientRect().width / 10 / 20;
            probe.remove();
            if (!(advanceRatio > 0)) return;

            // 「N＋0.5文字ぶん」で行の長さが埋まるフォントサイズにする。
            // こうすると N文字はぴったり入り、N+1文字目は必ずあふれて次の行に折り返す。
            // （固定の％余白だと、N=25のとき余白がちょうど1文字ぶんになり26文字目が入ってしまう）
            let font = availPx / ((sakka_gridChars + 0.5) * advanceRatio);
            // 読めないほど小さく／大きくなりすぎないよう制限（本のページのマスは別計算で常に正確）
            font = Math.max(Math.min(font, 48), 12);
            // 計算値を超えないよう 0.1px 単位で切り下げ、N文字が確実に入るようにする
            font = Math.floor(font * 10) / 10;

            editor.style.fontSize = font + 'px';
            editor.style.letterSpacing = 'normal';
        }

        // --- マスの数（1行の字数 × 1ページの行数） ---
        let sakka_gridChars = 20;
        let sakka_gridLines = 10;
        const SAKKA_GRID_CHAR_OPTIONS = [10, 12, 15, 18, 20, 22, 25, 30];
        const SAKKA_GRID_LINE_OPTIONS = [6, 8, 10, 12, 15, 18, 20, 24];

        function sakka_renderGridSelects() {
            document.querySelectorAll('select.sakka-grid-chars').forEach(sel => {
                sel.innerHTML = SAKKA_GRID_CHAR_OPTIONS.map(n => `<option value="${n}">${n}字</option>`).join('');
            });
            document.querySelectorAll('select.sakka-grid-lines').forEach(sel => {
                sel.innerHTML = SAKKA_GRID_LINE_OPTIONS.map(n => `<option value="${n}">${n}行</option>`).join('');
            });
            sakka_syncGridSelects();
        }

        function sakka_syncGridSelects() {
            document.querySelectorAll('select.sakka-grid-chars').forEach(sel => sel.value = String(sakka_gridChars));
            document.querySelectorAll('select.sakka-grid-lines').forEach(sel => sel.value = String(sakka_gridLines));
        }

        function sakka_setGridChars(value) {
            sakka_gridChars = parseInt(value, 10) || 20;
            sakka_onGridChanged();
        }

        function sakka_setGridLines(value) {
            sakka_gridLines = parseInt(value, 10) || 10;
            sakka_onGridChanged();
        }

        function sakka_onGridChanged() {
            sakka_syncGridSelects();
            sakka_updateEditorGrid();
            if (sakka_appData.step === 8) {
                sakka_createPreviewPages(sakka_currentPageIndex);
            }
            sakka_autoSave();
        }

        // 「N字 × M行」がきっちり収まる文字サイズ・行送り・字間。
        // テーマの枠線の太さで紙面が変わるため、定数ではなく計測ボックスの実寸から計算する。
        // 値は cqw（紙面の横幅の1%）単位なので、プレビュー・印刷どちらでも同じ見た目になる。
        let sakka_gridVars = { font: 3, line: 6.6, tracking: 0 };

        function sakka_setupGrid(measureBox, measureContent) {
            const cs = getComputedStyle(measureContent);
            const boxW = measureContent.clientWidth - parseFloat(cs.paddingLeft) - parseFloat(cs.paddingRight);
            const boxH = measureContent.clientHeight - parseFloat(cs.paddingTop) - parseFloat(cs.paddingBottom);
            const cqwPx = measureContent.clientWidth / 100;

            // 字がならぶ方向の長さ ÷ 字数 ＝ 1マスの大きさ（縦書きなら縦方向）
            const charPitch = (sakka_isVertical ? boxH : boxW) / sakka_gridChars / cqwPx;
            // 行がならぶ方向の長さ ÷ 行数 ＝ 行送り（0.98倍の余裕で印刷時の枠線差を吸収）
            const linePitch = (sakka_isVertical ? boxW : boxH) / sakka_gridLines / cqwPx * 0.98;
            // マスより少し小さめ＆行送りの0.72倍までに抑えて、ふりがなの場所も確保
            const font = Math.min(charPitch * 0.97, linePitch * 0.72);

            // フォントの字送りは1emぴったりとは限らない（特に縦書き）ので、
            // 実際に文字を置いて測り、1マス＝charPitch になるよう字間で補正する
            measureBox.style.setProperty('--sakka-font', font.toFixed(3) + 'cqw');
            measureBox.style.setProperty('--sakka-tracking', '0cqw');
            const probe = document.createElement('div');
            probe.style.cssText = 'position:absolute;visibility:hidden;letter-spacing:0;white-space:pre;';
            probe.textContent = 'ああああああああああ';
            measureContent.innerHTML = '';
            measureContent.appendChild(probe);
            const rect = probe.getBoundingClientRect();
            const advanceCqw = (sakka_isVertical ? rect.height : rect.width) / 10 / cqwPx;
            measureContent.removeChild(probe);
            // 0.99倍の余裕をもたせて、端数のはみ出しによる予定外の改行を防ぐ
            const tracking = advanceCqw > 0 ? charPitch * 0.99 - advanceCqw : 0;

            sakka_gridVars = { font, line: linePitch, tracking };
        }

        function sakka_applyGridVars(el) {
            el.style.setProperty('--sakka-font', sakka_gridVars.font.toFixed(3) + 'cqw');
            el.style.setProperty('--sakka-line', sakka_gridVars.line.toFixed(3) + 'cqw');
            el.style.setProperty('--sakka-tracking', sakka_gridVars.tracking.toFixed(3) + 'cqw');
        }

        // --- 本のデザイン（テーマ）一覧 ---
        const sakka_themes = [
            { id: 'classic', label: '📖 クラシック' },
            { id: 'magic', label: '✨ ほしぞら魔法' },
            { id: 'forest', label: '🌿 森の物語' },
            { id: 'notebook', label: '📓 かわいいノート' },
            { id: 'antique', label: '🖼️ アンティーク' },
            { id: 'ocean', label: '🌊 海のぼうけん' },
            { id: 'sunset', label: '🌇 夕焼け空' },
            { id: 'sakura', label: '🌸 さくら色' },
            { id: 'space', label: '🚀 宇宙旅行' },
            { id: 'monochrome', label: '🎞️ モノクロ映画' }
        ];

        function sakka_renderThemeButtons() {
            document.getElementById('sakka-theme-buttons').innerHTML = sakka_themes.map(t => {
                const active = t.id === sakka_currentTheme;
                const colorClass = active
                    ? 'bg-orange-500 text-white border-orange-600 shadow-sm'
                    : 'bg-white text-gray-600 border-gray-300 hover:bg-gray-100';
                return `<button onclick="sakka_setTheme('${t.id}')" data-theme="${t.id}"
                    class="px-4 py-2 rounded-full text-sm md:text-base font-bold border-2 sakka-theme-btn ${colorClass}">${t.label}</button>`;
            }).join('');
        }

        function sakka_setTheme(themeName) {
            sakka_currentTheme = themeName;

            document.querySelectorAll('.sakka-theme-btn').forEach(btn => {
                if (btn.dataset.theme === themeName) {
                    btn.classList.add('bg-orange-500', 'text-white', 'border-orange-600');
                    btn.classList.remove('bg-white', 'text-gray-600', 'border-gray-300');
                } else {
                    btn.classList.remove('bg-orange-500', 'text-white', 'border-orange-600');
                    btn.classList.add('bg-white', 'text-gray-600', 'border-gray-300');
                }
            });

            // テーマを変えても、いま見ていたページにとどまる
            sakka_createPreviewPages(sakka_currentPageIndex);
        }

        function sakka_tokenizeAll(text) {
            const tokens = [];
            let i = 0;
            while (i < text.length) {
                if (text[i] === '[') {
                    let j = text.indexOf(']', i);
                    if (j !== -1 && text.substring(i, j).includes(':')) {
                        tokens.push({ type: 'ruby', value: text.substring(i, j + 1) });
                        i = j + 1;
                        continue;
                    }
                }
                if (text[i] === '\n') {
                    tokens.push({ type: 'br' });
                } else {
                    tokens.push({ type: 'text', value: text[i] });
                }
                i++;
            }
            return tokens;
        }

        function sakka_tokenToNode(t) {
            if (t.type === 'br') return document.createElement('br');
            if (t.type === 'ruby') {
                const match = t.value.match(/\[(.+?):(.+?)\]/);
                const ruby = document.createElement('ruby');
                const rt = document.createElement('rt');
                ruby.appendChild(document.createTextNode(match[1]));
                rt.appendChild(document.createTextNode(match[2]));
                ruby.appendChild(rt);
                return ruby;
            }
            return document.createTextNode(t.value);
        }

        function sakka_createPreviewPages(keepIndex = 0) {
            const title = document.getElementById('sakka-story-title').value || '無題のお話';
            const author = document.getElementById('sakka-story-author').value || '';
            const text = document.getElementById('sakka-story-editor').value || '';

            const previewBox = document.getElementById('sakka-preview-box');
            const measureBox = document.getElementById('sakka-measure-box');
            const measureContent = document.getElementById('sakka-measure-content');

            const vertClass = sakka_isVertical ? ' sakka-vertical' : '';
            previewBox.className = `sakka-page-container shadow-2xl transition-all duration-300 sakka-theme-${sakka_currentTheme}${vertClass} mx-auto`;
            previewBox.style.maxWidth = sakka_isVertical ? '800px' : '600px';

            measureBox.className = `sakka-page-container sakka-theme-${sakka_currentTheme}${vertClass}`;
            measureBox.style.width = '800px';

            // 紙面の実寸からマスに合う文字サイズを計算し、計測用とプレビューの両方に適用
            sakka_setupGrid(measureBox, measureContent);
            sakka_applyGridVars(measureBox);
            sakka_applyGridVars(previewBox);

            sakka_pagesData = [];

            // たて書きは右から左へ流れるので、あふれ判定は横方向で行う
            const isOverflow = sakka_isVertical
                ? () => measureContent.scrollWidth > measureContent.clientWidth
                : () => measureContent.scrollHeight > measureContent.clientHeight;
            const tokens = sakka_tokenizeAll(text);

            const headerHtml = `
        <h1 class="sakka-page-title">${sakka_parseRuby(sakka_escapeHtml(title))}</h1>
        <p class="sakka-page-author">なまえ：${sakka_parseRuby(sakka_escapeHtml(author))}</p>
      `;

            let pos = 0;
            let isFirstPage = true;
            do {
                measureContent.innerHTML = '';
                if (isFirstPage) {
                    const headerDiv = document.createElement('div');
                    headerDiv.className = "flex-shrink-0";
                    headerDiv.innerHTML = headerHtml;
                    measureContent.appendChild(headerDiv);
                }
                const contentDiv = document.createElement('div');
                contentDiv.className = "whitespace-pre-wrap flex-grow";
                measureContent.appendChild(contentDiv);

                const renderRange = (count) => {
                    contentDiv.innerHTML = '';
                    const frag = document.createDocumentFragment();
                    for (let k = pos; k < pos + count; k++) {
                        frag.appendChild(sakka_tokenToNode(tokens[k]));
                    }
                    contentDiv.appendChild(frag);
                };

                const remaining = tokens.length - pos;
                let count = remaining;
                renderRange(count);

                if (isOverflow()) {
                    // 二分探索で「あふれない最大の文字数」を見つける（1文字ずつ試すより速い）
                    let fits = 0;
                    let breaks = remaining;
                    while (breaks - fits > 1) {
                        const mid = Math.floor((fits + breaks) / 2);
                        renderRange(mid);
                        if (isOverflow()) breaks = mid; else fits = mid;
                    }
                    count = Math.max(fits, 1); // 1文字も入らないときの無限ループを防ぐ
                    renderRange(count);
                }

                sakka_pagesData.push(measureContent.innerHTML);
                pos += count;
                isFirstPage = false;
            } while (pos < tokens.length);

            sakka_showPage(Math.min(keepIndex, sakka_pagesData.length - 1));
        }

        function sakka_showPage(index) {
            if (sakka_pagesData.length === 0) return;
            if (index < 0) index = 0;
            if (index >= sakka_pagesData.length) index = sakka_pagesData.length - 1;

            sakka_currentPageIndex = index;
            document.getElementById('sakka-preview-content').innerHTML = sakka_pagesData[index];
            document.getElementById('sakka-page-indicator').innerText = `${index + 1} / ${sakka_pagesData.length} ページ`;
        }

        function sakka_nextPage() { sakka_showPage(sakka_currentPageIndex + 1); }
        function sakka_prevPage() { sakka_showPage(sakka_currentPageIndex - 1); }

        function sakka_printStory() {
            const printArea = document.getElementById('sakka-print-area');
            printArea.innerHTML = '';

            // 用紙の向きを文字の向きに合わせる（よこ書き=A4たて / たて書き=A4よこ）
            document.getElementById('sakka-print-orientation').textContent =
                `@page { size: A4 ${sakka_isVertical ? 'landscape' : 'portrait'}; margin: 15mm; }`;

            const vertClass = sakka_isVertical ? ' sakka-vertical' : '';
            sakka_pagesData.forEach((pageHtml, index) => {
                const pageDiv = document.createElement('div');
                pageDiv.className = `sakka-print-page sakka-page-container sakka-theme-${sakka_currentTheme}${vertClass}`;
                // プレビューと同じ文字サイズ計算（cqw単位）なので、印刷も画面と同じ見た目になる
                sakka_applyGridVars(pageDiv);

                const innerDiv = document.createElement('div');
                innerDiv.className = "sakka-page-inner";
                innerDiv.innerHTML = pageHtml;

                const pageNum = document.createElement('div');
                pageNum.className = "sakka-page-num";
                pageNum.innerText = `- ${index + 1} -`;

                pageDiv.appendChild(innerDiv);
                pageDiv.appendChild(pageNum);
                printArea.appendChild(pageDiv);
            });

            try { window.print(); } catch (e) { }
        }

        // === ふり返りチェックリスト（[漢字:よみ] 形式で書くと自動でルビになる） ===
        const sakka_checklistData = {
            basic: [
                'まちがえた[字:じ]や、ぬけている[字:じ]はないかな？',
                '「　」（かぎかっこ）を[使:つか]って、[会話文:かいわぶん]を[入:い]れているかな？',
                '「〜です」「〜だ」などの[文:ぶん]の[終:お]わり[方:かた]はそろっているかな？',
                '「、」や「。」は[読:よ]みやすい[場所:ばしょ]にあるかな？',
                '[気持:きも]ちやようすがわかる[言葉:ことば]（ドキドキ、キラキラなど）を[使:つか]っているかな？',
                'お[話:はなし]がかわるところで、[行:ぎょう]をかえたり、マスをあけたりしているかな？（だんらく）',
                'つなぐ[言葉:ことば]（そして、しかし、など）を[使:つか]って、[文:ぶん]と[文:ぶん]をつないでいるかな？'
            ],
            advanced: [
                'その[場所:ばしょ]のけしきを、[色:いろ]もまじえて[書:か]いているかな？',
                '[主人公:しゅじんこう]の[気持:きも]ちがかわったきっかけを、くわしく[書:か]いているかな？',
                'においや、さわった[感:かん]じなど、いろいろな[感覚:かんかく]を[言葉:ことば]にしているかな？',
                'お[話:はなし]の[始:はじ]まりから[終:お]わりまで、[順番:じゅんばん]がわかりやすくつながっているかな？',
                '[読:よ]む[人:ひと]がワクワクしたり、びっくりしたりするような[工夫:くふう]があるかな？'
            ]
        };

        function sakka_renderChecklist() {
            const buildItems = (items, hoverBg, hoverBorder, checkColor) => items.map(item => `
                <label class="flex items-start gap-4 cursor-pointer p-3 ${hoverBg} rounded-2xl transition-colors border border-transparent ${hoverBorder}">
                    <input type="checkbox" class="mt-1 w-6 h-6 ${checkColor} bg-gray-100 border-gray-300 rounded flex-shrink-0">
                    <span class="text-gray-700 font-medium text-sm md:text-base leading-relaxed">${sakka_parseRuby(item)}</span>
                </label>`).join('');

            document.getElementById('sakka-checklist-basic').innerHTML =
                buildItems(sakka_checklistData.basic, 'hover:bg-green-50', 'hover:border-green-200', 'text-green-600 focus:ring-green-500');
            document.getElementById('sakka-checklist-advanced').innerHTML =
                buildItems(sakka_checklistData.advanced, 'hover:bg-orange-50', 'hover:border-orange-200', 'text-orange-500 focus:ring-orange-500');
        }

        // 新しいお話を書きはじめたらチェックを全部はずす
        function sakka_resetChecklist() {
            document.querySelectorAll('#sakka-modal-checklist input[type="checkbox"]').forEach(cb => cb.checked = false);
        }

        function sakka_openChecklist() {
            const modal = document.getElementById('sakka-modal-checklist');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.firstElementChild.classList.add('scale-100');
                modal.firstElementChild.classList.remove('scale-95');
            }, 10);
        }

        function sakka_closeChecklist() {
            const modal = document.getElementById('sakka-modal-checklist');
            modal.firstElementChild.classList.remove('scale-100');
            modal.firstElementChild.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 150);
        }

        let sakka_toastTimeout;
        function sakka_showToast(msg) {
            const toast = document.getElementById('sakka-toast');
            toast.innerText = msg;
            toast.classList.remove('opacity-0');
            toast.classList.add('opacity-100');

            clearTimeout(sakka_toastTimeout);
            sakka_toastTimeout = setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0');
            }, 2500);
        }

        // === 文字数カウント（がんばりが目に見えるように） ===
        function sakka_updateCharCount() {
            const text = document.getElementById('sakka-story-editor').value;
            // 改行・空白をのぞいた文字数（[漢字:よみ] 形式は漢字だけ数える）
            const count = sakka_stripRuby(text).replace(/\s/g, '').length;
            document.getElementById('sakka-char-count').innerText = count;
        }

        // 画面サイズが変わったら（iPadの回転・ウインドウ変更）レイアウトを作りなおす。
        // リサイズ中は何度も発火するので、落ち着いてから1回だけ計算する
        let sakka_resizeTimer = null;
        window.addEventListener('resize', () => {
            clearTimeout(sakka_resizeTimer);
            sakka_resizeTimer = setTimeout(() => {
                if (sakka_appData.step === 7) {
                    // 画面幅でエディタ高さの方針が変わるので、向きの設定からやり直す
                    sakka_updateEditorMode();
                    // フォント変更で周りのレイアウトが動いた場合にそなえて、確定後にもう一度
                    requestAnimationFrame(() => sakka_updateEditorGrid());
                } else if (sakka_appData.step === 8) {
                    sakka_createPreviewPages(sakka_currentPageIndex);
                }
            }, 200);
        });

        // 完成画面では矢印キーでもページをめくれる
        document.addEventListener('keydown', (e) => {
            if (sakka_appData.step !== 8) return;
            if (e.key === 'ArrowRight') sakka_nextPage();
            else if (e.key === 'ArrowLeft') sakka_prevPage();
        });

        // === 初期化 ===
        sakka_renderThemeButtons();
        sakka_renderGridSelects();
        sakka_renderChecklist();
        sakka_checkAutosave();

        ['sakka-story-title', 'sakka-story-author', 'sakka-story-editor'].forEach(id => {
            document.getElementById(id).addEventListener('input', () => {
                sakka_updateCharCount();
                sakka_autoSave();
            });
        });

    </script>
<script>
if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  window.addEventListener('load', ()=>{ navigator.serviceWorker.register('./sw.js').catch(()=>{}); });
}
</script>
