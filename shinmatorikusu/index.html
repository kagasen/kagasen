<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>心マトリクス | メタ認知アプリ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: "Hiragino Maru Gothic ProN", "ヒラギノ丸ゴ ProN", "Hiragino Sans", Meiryo, sans-serif;
    }

    .pin {
      position: absolute;
      transform: translate(-50%, -100%);
      pointer-events: none;
      filter: drop-shadow(0 3px 6px rgba(0, 0, 0, 0.35));
    }

    .pin-enter {
      animation: pinDrop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes pinDrop {
      from { transform: translate(-50%, -180%) scale(0.4); opacity: 0; }
      to   { transform: translate(-50%, -100%) scale(1);   opacity: 1; }
    }

    .fade-in {
      animation: fadeIn 0.35s ease-out forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .matrix-wrapper {
      position: relative;
      display: inline-block;
      line-height: 0;
    }

    .matrix-wrapper img {
      display: block;
      max-width: min(640px, 90vw);
      width: 100%;
      border-radius: 16px;
    }

    .matrix-wrapper svg.arrow-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      border-radius: 16px;
    }

    /* Textarea focus ring */
    textarea:focus {
      outline: none;
      border-color: #818cf8;
      box-shadow: 0 0 0 3px rgba(129,140,248,0.2);
    }
  </style>
</head>

<body class="min-h-screen" style="background: linear-gradient(135deg, #f0f4ff 0%, #f5f0ff 50%, #f0fff4 100%);">

  <div id="app" class="max-w-2xl mx-auto px-4 py-6 min-h-screen flex flex-col"></div>

  <script>
    // ==================== State ====================
    const state = {
      step: 1,
      pin1: null,   // { xPct, yPct }
      pin2: null,   // { xPct, yPct }
      feeling: '',
      action: '',
      reflection: ''
    };

    const IMG = './心マトリクス１.webp';

    // ==================== Main render ====================
    function render() {
      const app = document.getElementById('app');
      app.innerHTML = `
        ${buildHeader()}
        <main class="flex-1 flex flex-col items-center gap-6 pb-10 fade-in">
          ${buildStepContent()}
        </main>
      `;
      attachEvents();
    }

    // ==================== Header ====================
    function buildHeader() {
      return `
        <header class="flex items-center justify-between mb-4">
          <a href="../index.html"
             class="text-slate-400 hover:text-slate-600 text-sm font-bold px-3 py-1.5 rounded-xl hover:bg-white/70 transition-all">
            ← 一覧へ
          </a>
          <h1 class="text-lg font-extrabold text-slate-700 tracking-wide">心マトリクス</h1>
          <div class="w-16"></div>
        </header>
        ${buildStepBar()}
      `;
    }

    function buildStepBar() {
      const steps = [
        { n: 1, label: '現在地' },
        { n: 2, label: '言語化' },
        { n: 3, label: '変化'   },
        { n: 4, label: '振り返り' }
      ];
      const dots = steps.map((s, i) => {
        const active   = state.step === s.n;
        const done     = state.step > s.n;
        const dotClass = active
          ? 'bg-indigo-500 text-white shadow-lg shadow-indigo-200 scale-110'
          : done
          ? 'bg-indigo-200 text-indigo-700'
          : 'bg-slate-200 text-slate-400';
        const lineClass = done || (state.step === s.n + 1)
          ? 'bg-indigo-300' : 'bg-slate-200';
        return `
          <div class="flex items-center">
            <div class="flex flex-col items-center gap-1">
              <div class="w-9 h-9 rounded-full flex items-center justify-center font-extrabold text-sm transition-all duration-300 ${dotClass}">
                ${done ? '✓' : s.n}
              </div>
              <span class="text-[10px] font-bold ${active ? 'text-indigo-600' : 'text-slate-400'}">${s.label}</span>
            </div>
            ${i < steps.length - 1
              ? `<div class="w-10 h-0.5 mt-[-14px] mx-1 rounded-full transition-all duration-500 ${lineClass}"></div>`
              : ''}
          </div>
        `;
      }).join('');

      return `
        <div class="flex items-center justify-center gap-0 mb-6">
          ${dots}
        </div>
      `;
    }

    // ==================== Steps ====================
    function buildStepContent() {
      switch (state.step) {
        case 1: return buildStep1();
        case 2: return buildStep2();
        case 3: return buildStep3();
        case 4: return buildStep4();
        default: return '';
      }
    }

    /* ---------- Step 1 ---------- */
    function buildStep1() {
      return `
        <div class="text-center">
          <h2 class="text-2xl font-extrabold text-slate-800 mb-1">今の心はどこにいる？</h2>
          <p class="text-slate-500 text-sm">心マトリクスの中で、今の自分の状態をクリックして選んでね。</p>
        </div>

        <div class="flex flex-col items-center gap-4">
          <div class="matrix-wrapper cursor-crosshair rounded-2xl overflow-hidden shadow-2xl
                      border-4 border-white ring-2 ring-indigo-100" id="matrix1">
            <img src="${IMG}" alt="心マトリクス" draggable="false" id="matrixImg1">
            ${state.pin1 ? buildPin(state.pin1, 'red', true) : ''}
          </div>

          ${state.pin1
            ? `<div class="flex flex-col items-center gap-3">
                 <p class="text-slate-400 text-sm">ここでいい？クリックし直すと変えられるよ。</p>
                 <button id="nextStep1"
                   class="px-10 py-3 bg-indigo-500 hover:bg-indigo-600 active:scale-95 text-white
                          font-extrabold rounded-full shadow-lg shadow-indigo-200 transition-all hover:scale-105">
                   次へ →
                 </button>
               </div>`
            : `<p class="text-slate-400 text-sm animate-pulse">↑ クリックしてピンを置こう</p>`
          }
        </div>
      `;
    }

    /* ---------- Step 2 ---------- */
    function buildStep2() {
      return `
        <div class="text-center">
          <h2 class="text-2xl font-extrabold text-slate-800 mb-1">今の気持ちを言葉にしよう</h2>
          <p class="text-slate-500 text-sm">ピンの位置を見ながら、今の自分を言葉にしてみよう。</p>
        </div>

        <div class="matrix-wrapper rounded-2xl overflow-hidden shadow-md border-4 border-white ring-1 ring-indigo-100 opacity-90">
          <img src="${IMG}" alt="心マトリクス" draggable="false" style="max-width:min(400px,80vw);">
          ${state.pin1 ? buildPin(state.pin1, 'red', false) : ''}
        </div>

        <div class="w-full max-w-md flex flex-col gap-4">
          ${buildCard({
            dot: '#f87171', label: '今の気持ちは？',
            id: 'feelingInput', value: state.feeling,
            placeholder: '例：なんだか焦っていて、頭がいっぱいな感じ...'
          })}
          ${buildCard({
            dot: '#818cf8', label: 'これからどうしたい？（目標・アクション）',
            id: 'actionInput', value: state.action,
            placeholder: '例：深呼吸して、まず1つずつ片付けていきたい...'
          })}

          <button id="nextStep2"
            class="px-10 py-3 bg-indigo-500 hover:bg-indigo-600 active:scale-95 text-white
                   font-extrabold rounded-full shadow-lg shadow-indigo-200 transition-all
                   hover:scale-105 self-center">
            決定 →
          </button>
        </div>
      `;
    }

    /* ---------- Step 3 ---------- */
    function buildStep3() {
      return `
        <div class="text-center">
          <h2 class="text-2xl font-extrabold text-slate-800 mb-1">アクションの後、心はどこへ？</h2>
          <p class="text-slate-500 text-sm">アクションをした後の自分の状態をクリックして選んでね。</p>
        </div>

        <div class="flex flex-col items-center gap-4">
          <div class="matrix-wrapper cursor-crosshair rounded-2xl overflow-hidden shadow-2xl
                      border-4 border-white ring-2 ring-blue-100" id="matrix3">
            <img src="${IMG}" alt="心マトリクス" draggable="false" id="matrixImg3">
            ${state.pin1 ? buildPin(state.pin1, 'red', false) : ''}
            ${state.pin2 ? buildPin(state.pin2, 'blue', true) : ''}
            ${state.pin1 && state.pin2 ? buildArrow() : ''}
          </div>

          ${state.pin2
            ? `<div class="flex flex-col items-center gap-3">
                 <p class="text-slate-400 text-sm">ここでいい？クリックし直すと変えられるよ。</p>
                 <button id="nextStep3"
                   class="px-10 py-3 bg-blue-500 hover:bg-blue-600 active:scale-95 text-white
                          font-extrabold rounded-full shadow-lg shadow-blue-200 transition-all hover:scale-105">
                   次へ →
                 </button>
               </div>`
            : `<p class="text-slate-400 text-sm animate-pulse">↑ クリックして新しいピンを置こう</p>`
          }
        </div>
      `;
    }

    /* ---------- Step 4 ---------- */
    function buildStep4() {
      return `
        <div class="text-center">
          <h2 class="text-2xl font-extrabold text-slate-800 mb-1">変化を振り返ろう</h2>
          <p class="text-slate-500 text-sm">どんなアクションをして、心はどう変わった？</p>
        </div>

        <div class="matrix-wrapper rounded-2xl overflow-hidden shadow-md border-4 border-white ring-1 ring-blue-100 opacity-90">
          <img src="${IMG}" alt="心マトリクス" draggable="false" style="max-width:min(400px,80vw);">
          ${state.pin1 ? buildPin(state.pin1, 'red', false) : ''}
          ${state.pin2 ? buildPin(state.pin2, 'blue', false) : ''}
          ${state.pin1 && state.pin2 ? buildArrow() : ''}
        </div>

        <div class="w-full max-w-md flex flex-col gap-4">
          <!-- ここまでの入力サマリ -->
          <div class="bg-white/80 rounded-2xl p-4 border border-indigo-100 flex flex-col gap-2 text-sm">
            <div class="flex gap-2">
              <span class="text-red-400 font-extrabold flex-shrink-0">●</span>
              <span><span class="font-bold text-slate-600">今の気持ち：</span>
                    <span class="text-slate-700">${escHtml(state.feeling) || '<span class="text-slate-300">(未入力)</span>'}</span></span>
            </div>
            <div class="flex gap-2">
              <span class="text-indigo-400 font-extrabold flex-shrink-0">→</span>
              <span><span class="font-bold text-slate-600">アクション：</span>
                    <span class="text-slate-700">${escHtml(state.action) || '<span class="text-slate-300">(未入力)</span>'}</span></span>
            </div>
          </div>

          ${buildCard({
            dot: '#60a5fa', label: '振り返り（何をして、どう変わった？）',
            id: 'reflectionInput', value: state.reflection, rows: 4,
            placeholder: '例：散歩に出かけたら少し落ち着いた。まだ完全じゃないけど、前より穏やかになった気がする...'
          })}

          <button id="saveRecord"
            class="px-10 py-3 bg-emerald-500 hover:bg-emerald-600 active:scale-95 text-white
                   font-extrabold rounded-full shadow-lg shadow-emerald-200 transition-all
                   hover:scale-105 self-center">
            記録を保存 ✓
          </button>
        </div>
      `;
    }

    // ==================== UI Helpers ====================
    function buildCard({ dot, label, id, value, placeholder, rows = 3 }) {
      return `
        <div class="bg-white rounded-2xl shadow-md p-5 border border-slate-100">
          <label class="block text-sm font-extrabold text-slate-700 mb-2" for="${id}">
            <span class="inline-block w-3 h-3 rounded-full mr-2 align-middle" style="background:${dot}"></span>
            ${label}
          </label>
          <textarea
            id="${id}"
            class="w-full rounded-xl border-2 border-slate-100 p-3 text-slate-700 resize-none text-sm transition-all"
            rows="${rows}"
            placeholder="${placeholder}"
          >${escHtml(value)}</textarea>
        </div>
      `;
    }

    function buildPin({ xPct, yPct }, color, animate) {
      const fill  = color === 'red' ? '#ef4444' : '#3b82f6';
      const inner = color === 'red' ? 'rgba(255,255,255,0.75)' : 'rgba(255,255,255,0.75)';
      return `
        <div class="pin${animate ? ' pin-enter' : ''}" style="left:${xPct}%;top:${yPct}%;">
          <svg width="30" height="44" viewBox="0 0 30 44" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M15 0C6.716 0 0 6.716 0 15C0 26.25 15 44 15 44C15 44 30 26.25 30 15C30 6.716 23.284 0 15 0Z" fill="${fill}"/>
            <circle cx="15" cy="14" r="6" fill="${inner}"/>
          </svg>
        </div>
      `;
    }

    function buildArrow() {
      if (!state.pin1 || !state.pin2) return '';
      return `
        <svg class="arrow-layer" overflow="visible">
          <defs>
            <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
              <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6" opacity="0.9"/>
            </marker>
          </defs>
          <line
            x1="${state.pin1.xPct}%" y1="${state.pin1.yPct}%"
            x2="${state.pin2.xPct}%" y2="${state.pin2.yPct}%"
            stroke="#3b82f6" stroke-width="2.5" stroke-dasharray="8,4"
            opacity="0.75" marker-end="url(#arrowBlue)"
          />
        </svg>
      `;
    }

    function escHtml(str) {
      return (str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ==================== Events ====================
    function attachEvents() {
      /* Step 1 */
      const m1 = document.getElementById('matrix1');
      if (m1) {
        m1.addEventListener('click', (e) => {
          const r = m1.getBoundingClientRect();
          state.pin1 = {
            xPct: ((e.clientX - r.left) / r.width)  * 100,
            yPct: ((e.clientY - r.top)  / r.height) * 100
          };
          render();
        });
      }
      on('nextStep1', () => { state.step = 2; render(); });

      /* Step 2 */
      liveInput('feelingInput',  v => state.feeling = v);
      liveInput('actionInput',   v => state.action  = v);
      on('nextStep2', () => {
        state.feeling  = val('feelingInput');
        state.action   = val('actionInput');
        state.step = 3;
        render();
      });

      /* Step 3 */
      const m3 = document.getElementById('matrix3');
      if (m3) {
        m3.addEventListener('click', (e) => {
          const r = m3.getBoundingClientRect();
          state.pin2 = {
            xPct: ((e.clientX - r.left) / r.width)  * 100,
            yPct: ((e.clientY - r.top)  / r.height) * 100
          };
          render();
        });
      }
      on('nextStep3', () => { state.step = 4; render(); });

      /* Step 4 */
      liveInput('reflectionInput', v => state.reflection = v);
      on('saveRecord', () => {
        state.reflection = val('reflectionInput');
        saveToStorage();
        showSuccess();
      });
    }

    function on(id, fn) {
      const el = document.getElementById(id);
      if (el) el.addEventListener('click', fn);
    }

    function liveInput(id, setter) {
      const el = document.getElementById(id);
      if (el) el.addEventListener('input', e => setter(e.target.value));
    }

    function val(id) {
      const el = document.getElementById(id);
      return el ? el.value : '';
    }

    // ==================== Storage ====================
    function saveToStorage() {
      const record = {
        id:         Date.now(),
        date:       new Date().toISOString(),
        pin1:       state.pin1,
        pin2:       state.pin2,
        feeling:    state.feeling,
        action:     state.action,
        reflection: state.reflection
      };
      const records = JSON.parse(localStorage.getItem('shinmatorikusu_records') || '[]');
      records.push(record);
      localStorage.setItem('shinmatorikusu_records', JSON.stringify(records));
    }

    // ==================== Success screen ====================
    function showSuccess() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div class="flex-1 flex flex-col items-center justify-center gap-6 text-center fade-in py-20">
          <div class="text-7xl select-none">✨</div>
          <h2 class="text-2xl font-extrabold text-slate-800">記録しました！</h2>
          <p class="text-slate-500 text-sm leading-relaxed max-w-xs">
            今日の心の動きを記録したよ。<br>また振り返りたいときにいつでも使ってね。
          </p>
          <button id="startAgain"
            class="px-10 py-3 bg-indigo-500 hover:bg-indigo-600 active:scale-95 text-white
                   font-extrabold rounded-full shadow-lg shadow-indigo-200 transition-all hover:scale-105 mt-2">
            もう一度はじめる
          </button>
          <a href="../index.html"
             class="text-slate-400 hover:text-slate-600 text-sm font-bold transition-colors">
            一覧へ戻る
          </a>
        </div>
      `;
      document.getElementById('startAgain').addEventListener('click', () => {
        Object.assign(state, { step: 1, pin1: null, pin2: null, feeling: '', action: '', reflection: '' });
        render();
      });
    }

    // ==================== Boot ====================
    render();
  </script>
</body>
</html>
