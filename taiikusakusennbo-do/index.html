<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>体育授業用 作戦ボード | 小学生向けの安全な教育アプリ</title>
    <meta name="description" content="体育授業用 作戦ボードは、小学生向けのシンプルで安全な教育・学習アプリです。学校の授業やご家庭で安心して使えるよう設計されており、アイフィルター等でも安全に利用できます。">
    <link rel="stylesheet" href="tailwind.css">
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f3f4f6;
            touch-action: none; /* スクロール防止 */
            user-select: none; /* テキスト選択防止 */
            -webkit-user-select: none;
            -webkit-touch-callout: none; /* iPad長押しメニュー防止 */
            height: 100dvh; /* iOS Safariのアドレスバー対応 */
        }
        input, textarea {
            user-select: text;
            -webkit-user-select: text;
        }
        /* iOS safe area 対応 */
        #bottomBar {
            padding-bottom: max(0.25rem, env(safe-area-inset-bottom));
        }
        .tool-button.active {
            background-color: #3b82f6;
            color: white;
        }
        .sheet-tab.active {
            background-color: #3b82f6;
            color: white;
        }
        .color-swatch {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 2px solid #d1d5db;
            cursor: pointer;
            flex-shrink: 0;
        }
        .color-swatch.active {
            border-color: #1f2937;
            box-shadow: 0 0 0 2px white, 0 0 0 4px #3b82f6;
        }
        .court-line {
            fill: none;
            stroke: white;
            stroke-width: 2;
        }
        .court-circle {
            fill: none;
            stroke: white;
            stroke-width: 2;
        }
        .court-area {
            fill: none;
            stroke: white;
            stroke-width: 2;
        }
        .three-point-area {
            fill: #d97706; /* Amber-600 */
            opacity: 0.3;
        }
        .key-area {
            fill: #b45309; /* Amber-700 */
            opacity: 0.4;
        }
        .court-backboard {
            fill: white;
        }
        .court-rim {
            fill: none;
            stroke: #ef4444;
            stroke-width: 2;
        }
        .court-net {
            fill: none;
            stroke: white;
            stroke-width: 1;
        }
        .player {
            cursor: grab;
            transition: transform 0.1s;
        }
        .player:active {
            cursor: grabbing;
            transform: scale(1.1);
        }
        .player.selected div {
            box-shadow: 0 0 0 4px #fbbf24; /* 黄色の枠線 */
            z-index: 50;
        }
        .player-number {
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            pointer-events: none;
        }
        /* 黄色チーム用のテキスト色調整 */
        .player[data-type="yellow"] .player-number {
            color: #1f2937; /* Gray-800 */
        }
        .ball-emoji {
            font-size: 2rem;
            pointer-events: none;
            user-select: none;
        }
        .drawing-board {
            touch-action: none;
        }
        .soccer-goal {
            fill: none;
            stroke: white;
            stroke-width: 2;
        }
        .soccer-net {
            stroke: white;
            stroke-width: 1;
            opacity: 0.5;
        }
        .menu-button {
            display: block;
            width: 100%;
            text-align: left;
            padding: 10px 16px;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .player-menu {
            position: fixed;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 100;
            overflow: hidden;
            min-width: 150px;
        }
        .animation-target {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px dashed #ef4444;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 100;
        }
        /* その他コートのスタイル */
        .other-court-rect {
            fill: white;
            stroke: #333;
            stroke-width: 3;
        }
        /* 選択中の線の削除ボタン */
        #shapeActions {
            position: absolute;
            display: none;
            z-index: 60;
            transform: translate(-50%, 0);
        }
        #shapeActions button {
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 9999px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: bold;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            cursor: pointer;
        }
    </style>
    <meta name="theme-color" content="#10B981">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icon.svg">
</head>
<body class="flex flex-col overflow-hidden" style="height: 100dvh;">
    <div class="container mx-auto px-2 pt-1 pb-0 flex-grow flex flex-col" style="height: 100%; min-height: 0;">
        <!-- ツールバー：コート選択 -->
        <div class="mb-1 flex flex-wrap gap-1 justify-center">
            <button id="basketballBtn" class="tool-button bg-white px-2.5 py-1 text-xs rounded-lg shadow hover:shadow-md active">
                🏀 バスケ
            </button>
            <button id="soccerBtn" class="tool-button bg-white px-2.5 py-1 text-xs rounded-lg shadow hover:shadow-md">
                ⚽ サッカー
            </button>
            <button id="baseballBtn" class="tool-button bg-white px-2.5 py-1 text-xs rounded-lg shadow hover:shadow-md">
                ⚾ 野球
            </button>
            <button id="dodgeballBtn" class="tool-button bg-white px-2.5 py-1 text-xs rounded-lg shadow hover:shadow-md">
                🔴 ドッジ
            </button>
            <button id="volleyballBtn" class="tool-button bg-white px-2.5 py-1 text-xs rounded-lg shadow hover:shadow-md">
                🏐 バレー
            </button>
            <button id="otherBtn" class="tool-button bg-white px-2.5 py-1 text-xs rounded-lg shadow hover:shadow-md">
                ⬜ その他
            </button>
        </div>

        <!-- シートタブ + 描画ツール (1行に統合) -->
        <div class="mb-1 flex flex-wrap gap-1 justify-center items-center">
            <!-- シートタブ -->
            <div class="flex gap-1 overflow-x-auto flex-nowrap" id="sheetTabsContainer">
                <button class="sheet-tab bg-white px-2.5 py-1 text-xs rounded-lg shadow hover:shadow-md active whitespace-nowrap" data-sheet-id="sheet-1">
                    シート1
                </button>
                <button class="sheet-tab bg-green-500 text-white px-2.5 py-1 text-xs rounded-lg shadow hover:shadow-md whitespace-nowrap" id="addSheetBtn">
                    ＋ 新規
                </button>
            </div>
            <!-- 仕切り -->
            <div class="w-px h-5 bg-gray-300 mx-0.5 hidden sm:block"></div>
            <!-- 描画ツール -->
            <button id="drawBtn" class="tool-button bg-white px-2.5 py-1 text-xs rounded-lg shadow hover:shadow-md">
                ✏️ フリー
            </button>
            <button id="straightLineBtn" class="tool-button bg-white px-2.5 py-1 text-xs rounded-lg shadow hover:shadow-md">
                📏 直線
            </button>
            <button id="arrowBtn" class="tool-button bg-white px-2.5 py-1 text-xs rounded-lg shadow hover:shadow-md">
                ➡️ 矢印
            </button>
            <button id="selectBtn" class="tool-button bg-white px-2.5 py-1 text-xs rounded-lg shadow hover:shadow-md">
                👆 えらぶ
            </button>
            <!-- 色えらび -->
            <div class="flex gap-1 items-center mx-0.5">
                <button id="colorBlack" class="color-swatch active" style="background:#111827;" title="黒"></button>
                <button id="colorRed" class="color-swatch" style="background:#ef4444;" title="赤"></button>
                <button id="colorBlue" class="color-swatch" style="background:#2563eb;" title="青"></button>
            </div>
            <button id="undoBtn" class="tool-button bg-white px-2.5 py-1 text-xs rounded-lg shadow hover:shadow-md">
                ↩️ 戻る
            </button>
            <button id="clearBtn" class="tool-button bg-white px-2.5 py-1 text-xs rounded-lg shadow hover:shadow-md">
                🗑️ 全消し
            </button>
        </div>

        <!-- 作戦名入力 -->
        <div class="mb-1 flex justify-center">
            <div class="relative w-full max-w-md">
                <input type="text" id="strategyName" placeholder="作戦名を入力" class="w-full px-3 py-0.5 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
        </div>

        <!-- メインキャンバスエリア -->
        <div class="flex-grow flex justify-center overflow-hidden relative" style="min-height: 0;">
            <div id="boardWrapper" class="relative w-full max-w-4xl h-full aspect-video bg-white rounded-xl shadow-lg overflow-hidden border border-gray-200">
                <!-- シートコンテナ -->
                <div id="sheetsContainer" class="w-full h-full">
                    <!-- シート1 (デフォルト) -->
                    <div id="sheet-1" class="sheet w-full h-full relative">
                        <!-- 描画キャンバス -->
                        <canvas id="drawingCanvas-sheet-1" class="absolute top-0 left-0 w-full h-full z-10 drawing-board"></canvas>

                        <!-- コートレイヤー -->
                        <div id="court-sheet-1" class="absolute top-0 left-0 w-full h-full z-0 select-none">
                            <!-- バスケットボールコート (デフォルト) -->
                            <div id="basketballCourt-sheet-1" class="w-full h-full basketball-court flex items-center justify-center bg-gray-100">
                                <svg class="w-full h-full" viewBox="0 0 940 500" preserveAspectRatio="none">
                                    <rect x="0" y="0" width="940" height="500" fill="#BA8C63" />
                                    <!-- 左3P -->
                                    <path d="M20,100 L190,100 A170,170 0 0,1 190,400 L20,400 Z" class="three-point-area" />
                                    <!-- 右3P -->
                                    <path d="M920,100 L750,100 A170,170 0 0,0 750,400 L920,400 Z" class="three-point-area" />
                                    <!-- キーエリア -->
                                    <rect x="20" y="150" width="170" height="200" class="key-area" />
                                    <rect x="750" y="150" width="170" height="200" class="key-area" />
                                    <!-- ライン -->
                                    <rect x="20" y="20" width="900" height="460" class="court-line" />
                                    <line x1="470" y1="20" x2="470" y2="480" class="court-line" />
                                    <circle cx="470" cy="250" r="60" class="court-circle" />
                                    <!-- フリースロー -->
                                    <line x1="190" y1="100" x2="190" y2="400" class="court-line" stroke-dasharray="5,5" />
                                    <line x1="750" y1="100" x2="750" y2="400" class="court-line" stroke-dasharray="5,5" />
                                    <path d="M190,100 A60,60 0 0,0 190,400" class="court-circle" />
                                    <path d="M750,100 A60,60 0 0,1 750,400" class="court-circle" />
                                    <!-- ゴール -->
                                    <rect x="10" y="225" width="10" height="50" class="court-backboard" />
                                    <circle cx="30" cy="250" r="15" class="court-rim" />
                                    <rect x="920" y="225" width="10" height="50" class="court-backboard" />
                                    <circle cx="910" cy="250" r="15" class="court-rim" />
                                    <!-- 3Pライン -->
                                    <path d="M20,100 L190,100 A170,170 0 0,1 190,400 L20,400" class="court-line" fill="none" />
                                    <path d="M920,100 L750,100 A170,170 0 0,0 750,400 L920,400" class="court-line" fill="none" />
                                </svg>
                            </div>

                            <!-- サッカーコート -->
                            <div id="soccerCourt-sheet-1" class="w-full h-full bg-green-700 hidden flex items-center justify-center">
                                <svg class="w-full h-full" viewBox="0 0 940 500" preserveAspectRatio="none">
                                    <rect x="0" y="0" width="940" height="500" fill="#16a34a" />
                                    <rect x="20" y="20" width="900" height="460" class="court-line" />
                                    <line x1="470" y1="20" x2="470" y2="480" class="court-line" />
                                    <circle cx="470" cy="250" r="60" class="court-circle" />
                                    <rect x="20" y="125" width="120" height="250" class="court-area" />
                                    <rect x="800" y="125" width="120" height="250" class="court-area" />
                                    <rect x="20" y="175" width="60" height="150" class="court-area" />
                                    <rect x="860" y="175" width="60" height="150" class="court-area" />
                                    <!-- コーナー -->
                                    <path d="M20,20 A15,15 0 0,1 35,35" class="court-circle" />
                                    <path d="M20,480 A15,15 0 0,0 35,465" class="court-circle" />
                                    <path d="M920,20 A15,15 0 0,0 905,35" class="court-circle" />
                                    <path d="M920,480 A15,15 0 0,1 905,465" class="court-circle" />
                                </svg>
                            </div>

                            <!-- 野球コート（内野拡大版） -->
                            <div id="baseballCourt-sheet-1" class="w-full h-full bg-green-700 hidden flex items-center justify-center">
                                <svg class="w-full h-full" viewBox="0 0 940 500" preserveAspectRatio="none">
                                    <!-- 芝生 -->
                                    <rect x="0" y="0" width="940" height="500" fill="#16a34a" />

                                    <!-- 内野土エリア (円形) - 半径拡大 -->
                                    <circle cx="470" cy="280" r="230" fill="#b45309" opacity="0.8" />

                                    <!-- ダイヤモンド内の芝生エリア -->
                                    <rect x="470" y="180" width="130" height="130" transform="rotate(45 470 180)" fill="#16a34a" />

                                    <!-- ファウルライン -->
                                    <line x1="470" y1="440" x2="50" y2="20" stroke="white" stroke-width="3" />
                                    <line x1="470" y1="440" x2="890" y2="20" stroke="white" stroke-width="3" />

                                    <!-- 外野フェンス -->
                                    <path d="M50,20 Q470,-100 890,20" stroke="white" stroke-width="3" fill="none" />

                                    <!-- ダイヤモンド -->
                                    <path d="M470,440 L600,310 L470,180 L340,310 Z" fill="#b45309" stroke="white" stroke-width="3" />

                                    <!-- ベース -->
                                    <rect x="461" y="171" width="18" height="18" transform="rotate(45 470 180)" fill="white" />
                                    <rect x="331" y="301" width="18" height="18" transform="rotate(45 340 310)" fill="white" />
                                    <rect x="591" y="301" width="18" height="18" transform="rotate(45 600 310)" fill="white" />
                                    <polygon points="470,440 480,430 480,422 460,422 460,430" fill="white" />

                                    <!-- ピッチャーマウンド -->
                                    <circle cx="470" cy="323" r="12" fill="#b45309" stroke="white" stroke-width="1" />
                                    <rect x="462" y="320" width="16" height="6" fill="white" />

                                    <!-- バッターボックス -->
                                    <rect x="425" y="420" width="30" height="40" fill="none" stroke="white" stroke-width="2" />
                                    <rect x="485" y="420" width="30" height="40" fill="none" stroke="white" stroke-width="2" />

                                    <!-- コーチャーズボックス -->
                                    <rect x="240" y="300" width="30" height="60" fill="none" stroke="white" stroke-width="2" />
                                    <rect x="670" y="300" width="30" height="60" fill="none" stroke="white" stroke-width="2" />
                                </svg>
                            </div>

                            <!-- ドッジボールコート -->
                            <div id="dodgeballCourt-sheet-1" class="w-full h-full bg-amber-100 hidden flex items-center justify-center p-4">
                                <div class="w-full h-full border-4 border-red-800 bg-amber-50 relative box-border">
                                    <!-- センターライン -->
                                    <div class="absolute top-0 left-1/2 transform -translate-x-1/2 w-0 h-full border-l-4 border-dashed border-red-800"></div>
                                </div>
                            </div>

                            <!-- バレーボールコート -->
                            <div id="volleyballCourt-sheet-1" class="w-full h-full bg-amber-100 hidden flex items-center justify-center p-4">
                                <div class="w-full h-full border-4 border-blue-800 bg-amber-50 relative box-border">
                                    <!-- ネット -->
                                    <div class="absolute top-0 left-1/2 transform -translate-x-1/2 w-0 h-full border-l-4 border-black z-0"></div>
                                    <!-- アタックライン (左) -->
                                    <div class="absolute top-0 left-[30%] w-0 h-full border-l-4 border-dashed border-blue-800"></div>
                                    <!-- アタックライン (右) -->
                                    <div class="absolute top-0 right-[30%] w-0 h-full border-l-4 border-dashed border-blue-800"></div>
                                </div>
                            </div>

                            <!-- その他（長方形）コート -->
                            <div id="otherCourt-sheet-1" class="w-full h-full bg-gray-200 hidden flex items-center justify-center">
                                <svg class="w-full h-full" viewBox="0 0 940 500" preserveAspectRatio="none">
                                    <rect x="0" y="0" width="940" height="500" fill="#f3f4f6" />
                                    <!-- 外枠 -->
                                    <rect x="20" y="20" width="900" height="460" class="other-court-rect" />
                                    <!-- 中心線 (薄く) -->
                                    <line x1="470" y1="20" x2="470" y2="480" stroke="#ddd" stroke-width="2" stroke-dasharray="5,5" />
                                </svg>
                            </div>
                        </div>

                        <!-- プレイヤー -->
                        <div id="players-sheet-1" class="absolute top-0 left-0 w-full h-full z-20 pointer-events-none overflow-hidden">
                            <!-- プレイヤーはJSで動的に追加 -->
                        </div>

                        <!-- アニメーションパス -->
                        <svg id="animationPaths-sheet-1" class="absolute top-0 left-0 w-full h-full pointer-events-none" style="z-index:15;">
                            <!-- アニメーションパスはJSで動的に追加 -->
                        </svg>
                    </div>
                </div>

                <!-- 選択中の線の操作ボタン -->
                <div id="shapeActions">
                    <button id="deleteShapeBtn">🗑 削除</button>
                </div>
            </div>
        </div>

        <!-- プレイヤー追加・操作エリア -->
        <div id="bottomBar" class="mt-1 flex justify-center gap-1.5 flex-wrap shrink-0">
            <button id="addRedPlayer" class="bg-red-500 text-white px-3 py-1.5 text-sm rounded-lg shadow hover:bg-red-600">
                赤チーム 👤
            </button>
            <button id="addBluePlayer" class="bg-blue-500 text-white px-3 py-1.5 text-sm rounded-lg shadow hover:bg-blue-600">
                青チーム 👤
            </button>
            <button id="addYellowPlayer" class="bg-yellow-400 text-gray-800 px-3 py-1.5 text-sm rounded-lg shadow hover:bg-yellow-500 font-bold">
                黄チーム 👤
            </button>
            <button id="addBall" class="bg-orange-500 text-white px-3 py-1.5 text-sm rounded-lg shadow hover:bg-orange-600">
                ボール ⚾
            </button>
            <div class="w-px h-7 bg-gray-300 mx-0.5 self-center"></div>
            <button id="playAnimation" class="bg-green-600 text-white px-3 py-1.5 text-sm rounded-lg shadow hover:bg-green-700 font-bold">
                ▶️ 再生
            </button>
            <button id="stopAnimation" class="bg-gray-500 text-white px-3 py-1.5 text-sm rounded-lg shadow hover:bg-gray-600 font-bold">
                ⏹️ 停止
            </button>
        </div>
    </div>

    <!-- プレイヤーメニュー (初期状態では非表示) -->
    <div id="playerMenu" class="player-menu" style="display: none;">
        <button id="movePlayerBtn" class="menu-button bg-blue-50 hover:bg-blue-100 text-blue-700">
            移動 (ドラッグ)
        </button>
        <button id="animatePlayerBtn" class="menu-button bg-green-50 hover:bg-green-100 text-green-700">
            アニメーション移動設定
        </button>
        <button id="renamePlayerBtn" class="menu-button bg-purple-50 hover:bg-purple-100 text-purple-700">
            名前の変更
        </button>
        <button id="deletePlayerBtn" class="menu-button bg-red-50 hover:bg-red-100 text-red-700">
            削除
        </button>
    </div>

    <!-- 名前変更モーダル -->
    <div id="renameModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:200; align-items:center; justify-content:center;">
        <div style="background:white; border-radius:12px; padding:20px; min-width:260px; box-shadow:0 8px 24px rgba(0,0,0,0.2);">
            <p style="font-size:15px; font-weight:bold; margin-bottom:10px; color:#374151;">名前を入力してください</p>
            <input id="renameInput" type="text" maxlength="6" placeholder="名前（最大6文字）"
                style="width:100%; padding:8px 10px; border:2px solid #d1d5db; border-radius:8px; font-size:15px; outline:none; box-sizing:border-box;"
                onfocus="this.style.borderColor='#8b5cf6'" onblur="this.style.borderColor='#d1d5db'">
            <div style="display:flex; gap:8px; margin-top:12px;">
                <button id="renameConfirmBtn"
                    style="flex:1; background:#7c3aed; color:white; border:none; padding:8px; border-radius:8px; font-size:14px; cursor:pointer; font-weight:bold;">
                    決定
                </button>
                <button id="renameCancelBtn"
                    style="flex:1; background:#e5e7eb; color:#374151; border:none; padding:8px; border-radius:8px; font-size:14px; cursor:pointer;">
                    キャンセル
                </button>
            </div>
        </div>
    </div>

<script>
    // iOS Safari 100dvh フォールバック
    function fixViewportHeight() {
        document.body.style.height = window.innerHeight + 'px';
    }
    if (!CSS.supports('height', '100dvh')) {
        fixViewportHeight();
        window.addEventListener('resize', fixViewportHeight);
        window.addEventListener('orientationchange', () => setTimeout(fixViewportHeight, 100));
    }

    // シート管理
    let currentSheetId = 'sheet-1';
    let sheetCounter = 1;
    let currentCourtType = 'basketball';
    let sheetNames = { 'sheet-1': 'シート1' };

    const courtTypes = ['basketball', 'soccer', 'baseball', 'dodgeball', 'volleyball', 'other'];

    // 図形データ（座標は 0〜1 に正規化して保存。リサイズ・画面回転でもズレない）
    let sheetShapes = { 'sheet-1': [] };
    let undoStacks = { 'sheet-1': [] };
    let shapeIdCounter = 0;
    let selectedShapeId = null;

    // シートごとのプレイヤーカウンター
    let playerCounters = {
        'sheet-1': { red: 0, blue: 0, yellow: 0, ball: 0 }
    };

    // シートごとの直近レイアウトサイズ（リサイズ時のスケーリング用）
    let sheetLastSize = {};

    // 作戦名の入力イベント
    document.getElementById('strategyName').addEventListener('input', function(e) {

            else if (color === 'blue') bgClass = 'bg-blue-500';

            const playerDiv = document.createElement('div');
            playerDiv.className = `w-10 h-10 md:w-12 md:h-12 rounded-full ${bgClass} flex items-center justify-center relative shadow-md`;

            const numberSpan = document.createElement('span');

        player.style.left = `${Math.random() * (cw * 0.5) + cw * 0.25}px`;
        player.style.top = `${Math.random() * (ch * 0.5) + ch * 0.25}px`;

        playersContainer.appendChild(player);

        // ドラッグ＆タップ処理（Pointer Eventsに統一：iPadでもPCでも同じ動作）
        let isDragging = false;
        let hasMoved = false;
        let dragPointerId = null;
        let startX, startY, initLeft, initTop;

        player.addEventListener('pointerdown', (e) => {
            if (animationMode) return;
            if (!e.isPrimary) return;
            if (e.pointerType === 'mouse' && e.button !== 0) return;

            e.preventDefault();
            isDragging = true;
            hasMoved = false;
            dragPointerId = e.pointerId;
            startX = e.clientX;
            startY = e.clientY;
            initLeft = parseFloat(player.style.left) || 0;
            initTop = parseFloat(player.style.top) || 0;

            try { player.setPointerCapture(e.pointerId); } catch (err) {}
        });

        player.addEventListener('pointermove', (e) => {
            if (!isDragging || e.pointerId !== dragPointerId) return;
            e.preventDefault();

            const dx = e.clientX - startX;
            const dy = e.clientY - startY;

            // 数px以内はタップとみなす（ドラッグ後にメニューが誤って開くのを防止）
            if (!hasMoved && Math.hypot(dx, dy) < 5) return;
            hasMoved = true;

            const container = document.getElementById('sheetsContainer');
            const rect = container.getBoundingClientRect();
            const maxW = rect.width - player.offsetWidth;
            const maxH = rect.height - player.offsetHeight;

            let newLeft = Math.max(0, Math.min(initLeft + dx, maxW));
            let newTop = Math.max(0, Math.min(initTop + dy, maxH));

            player.style.left = `${newLeft}px`;
            player.style.top = `${newTop}px`;

            // 位置が変わったらアニメーションパスは削除
            if (playerAnimations[player.dataset.id]) {
                removePlayerAnimation(player.dataset.id);
            }
        });

        const endPointer = (e) => {
            if (!isDragging || e.pointerId !== dragPointerId) return;
            isDragging = false;
            dragPointerId = null;

            // 動かしていなければ「タップ」→ メニューを開く
            if (!hasMoved && !animationMode) {
                const rect = player.getBoundingClientRect();
                showPlayerMenu(player, rect.right + 5, rect.top);
            }
        };

        player.addEventListener('pointerup', endPointer);
        player.addEventListener('pointercancel', endPointer);
    }

    // アニメーションのパス（点線と矢印）を描き直す
    function rebuildAnimationPath(player) {
        const playerId = player.dataset.id;
        const anim = playerAnimations[playerId];
        if (!anim) return;

        const sheet = player.closest('.sheet');
        const pathsContainer = sheet ? document.getElementById(`animationPaths-${sheet.id}`) : null;
        if (!pathsContainer) return;

        const pw = player.offsetWidth;
        const ph = player.offsetHeight;
        const sx = anim.startX + pw / 2;
        const sy = anim.startY + ph / 2;
        const ex = anim.endX + pw / 2;
        const ey = anim.endY + ph / 2;

        let strokeColor = '#000';
        if (player.dataset.type === 'red') strokeColor = '#ef4444';
        else if (player.dataset.type === 'blue') strokeColor = '#3b82f6';
        else if (player.dataset.type === 'yellow') strokeColor = '#eab308';
        else strokeColor = '#f97316';

        const existingPath = document.getElementById(`path-${playerId}`);
        if (existingPath) existingPath.remove();
        const existingArrow = document.getElementById(`arrow-${playerId}`);
        if (existingArrow) existingArrow.remove();

        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.id = `path-${playerId}`;
        path.setAttribute('d', `M${sx},${sy} L${ex},${ey}`);
        path.setAttribute('stroke', strokeColor);
        path.setAttribute('stroke-width', '3');
        path.setAttribute('fill', 'none');
        path.setAttribute('stroke-dasharray', '5');
        path.classList.add('animation-path');
        pathsContainer.appendChild(path);

        const angle = Math.atan2(ey - sy, ex - sx);
        const arrowLen = 15;
        const ax = ex - 5 * Math.cos(angle);
        const ay = ey - 5 * Math.sin(angle);
        const x1 = ax - arrowLen * Math.cos(angle - Math.PI / 6);
        const y1 = ay - arrowLen * Math.sin(angle - Math.PI / 6);
        const x2 = ax - arrowLen * Math.cos(angle + Math.PI / 6);
        const y2 = ay - arrowLen * Math.sin(angle + Math.PI / 6);

        const arrow = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
        arrow.id = `arrow-${playerId}`;
        arrow.setAttribute('points', `${ax},${ay} ${x1},${y1} ${x2},${y2}`);
        arrow.setAttribute('fill', strokeColor);
        pathsContainer.appendChild(arrow);
    }

    // ================= 描画機能 =================
    // 図形は正規化座標(0〜1)で保存し、毎回キャンバスへ描き直す方式。
    // 直線・矢印は後から「えらぶ」で選択して移動・端点変更・削除・色変更ができる。

    const LINE_WIDTH = 3;
    const HIT_DIST = 12;       // 線の当たり判定(px)
    const HANDLE_HIT = 16;     // 端点ハンドルの当たり判定(px)
    const HANDLE_R = 7;        // 端点ハンドルの表示半径(px)

    let currentTool = 'none';
    let currentColor = '#111827';
    let drawState = null; // 進行中の操作 {mode, ...}
    let lineEditHintShown = false;

    function getCanvas(sheetId) {
        return document.getElementById(`drawingCanvas-${sheetId || currentSheetId}`);
    }

    function canvasSize(canvas) {
        return { w: canvas.clientWidth, h: canvas.clientHeight };
    }

    // 高解像度対応：CSSサイズ×devicePixelRatioでバックバッファを確保
    function resizeCanvasBuffer(canvas) {
        const parent = canvas.parentElement;
        const w = parent.clientWidth;
        const h = parent.clientHeight;
        if (!w || !h) return false;

        const dpr = window.devicePixelRatio || 1;
        const bw = Math.round(w * dpr);
        const bh = Math.round(h * dpr);
        if (canvas.width !== bw || canvas.height !== bh) {
            canvas.width = bw;
            canvas.height = bh;
        }
        const ctx = canvas.getContext('2d');
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        return true;
    }

    function drawShape(ctx, s, w, h) {
        ctx.strokeStyle = s.color;
        ctx.fillStyle = s.color;
        ctx.lineWidth = s.width;

        if (s.type === 'free') {
            if (s.points.length === 0) return;
            ctx.beginPath();
            ctx.moveTo(s.points[0].x * w, s.points[0].y * h);
            if (s.points.length === 1) {
                // 点だけの場合は小さな丸
                ctx.arc(s.points[0].x * w, s.points[0].y * h, s.width / 2, 0, Math.PI * 2);
                ctx.fill();
                return;
            }
            for (let i = 1; i < s.points.length; i++) {
                ctx.lineTo(s.points[i].x * w, s.points[i].y * h);
            }
            ctx.stroke();
        } else {
            const x1 = s.x1 * w, y1 = s.y1 * h, x2 = s.x2 * w, y2 = s.y2 * h;
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();

            if (s.type === 'arrow') {
                const headLength = 15;
                const angle = Math.atan2(y2 - y1, x2 - x1);
                ctx.beginPath();
                ctx.moveTo(x2, y2);
                ctx.lineTo(x2 - headLength * Math.cos(angle - Math.PI / 6), y2 - headLength * Math.sin(angle - Math.PI / 6));
                ctx.lineTo(x2 - headLength * Math.cos(angle + Math.PI / 6), y2 - headLength * Math.sin(angle + Math.PI / 6));
                ctx.closePath();
                ctx.fill();
            }
        }
    }

    function shapeBounds(s, w, h) {
        if (s.type === 'free') {
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            s.points.forEach(p => {
                minX = Math.min(minX, p.x * w); maxX = Math.max(maxX, p.x * w);
                minY = Math.min(minY, p.y * h); maxY = Math.max(maxY, p.y * h);
            });
            return { minX, minY, maxX, maxY };
        }
        return {
            minX: Math.min(s.x1, s.x2) * w, maxX: Math.max(s.x1, s.x2) * w,
            minY: Math.min(s.y1, s.y2) * h, maxY: Math.max(s.y1, s.y2) * h
        };
    }

    function drawSelectionOverlay(ctx, s, w, h) {
        // 選択中の強調（半透明の太線）
        ctx.save();
        ctx.strokeStyle = 'rgba(59, 130, 246, 0.35)';
        ctx.lineWidth = s.width + 8;
        ctx.lineCap = 'round';
        if (s.type === 'free') {
            const b = shapeBounds(s, w, h);
            ctx.setLineDash([6, 4]);
            ctx.lineWidth = 2;
            ctx.strokeStyle = '#3b82f6';
            ctx.strokeRect(b.minX - 8, b.minY - 8, (b.maxX - b.minX) + 16, (b.maxY - b.minY) + 16);
        } else {
            ctx.beginPath();
            ctx.moveTo(s.x1 * w, s.y1 * h);
            ctx.lineTo(s.x2 * w, s.y2 * h);
            ctx.stroke();

            // 端点ハンドル（○を掴んで動かせる）
            [[s.x1 * w, s.y1 * h], [s.x2 * w, s.y2 * h]].forEach(([hx, hy]) => {
                ctx.beginPath();
                ctx.arc(hx, hy, HANDLE_R, 0, Math.PI * 2);
                ctx.fillStyle = 'white';
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#2563eb';
                ctx.setLineDash([]);
                ctx.stroke();
            });
        }
        ctx.restore();
    }

    function redrawCanvas(sheetId, tempShape) {
        const canvas = getCanvas(sheetId);
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const { w, h } = canvasSize(canvas);
        ctx.clearRect(0, 0, w, h);

        const shapes = sheetShapes[sheetId] || [];
        shapes.forEach(s => {
            drawShape(ctx, s, w, h);
            if (sheetId === currentSheetId && s.id === selectedShapeId) {
                drawSelectionOverlay(ctx, s, w, h);
            }
        });

        if (tempShape) drawShape(ctx, tempShape, w, h);
    }

    // ---- 当たり判定 ----
    function distToSegment(px, py, x1, y1, x2, y2) {
        const dx = x2 - x1, dy = y2 - y1;
        const lenSq = dx * dx + dy * dy;
        let t = lenSq === 0 ? 0 : ((px - x1) * dx + (py - y1) * dy) / lenSq;
        t = Math.max(0, Math.min(1, t));
        const cx = x1 + t * dx, cy = y1 + t * dy;
        return Math.hypot(px - cx, py - cy);
    }

    function hitHandle(s, x, y, w, h) {
        if (s.type === 'free') return null;
        if (Math.hypot(x - s.x1 * w, y - s.y1 * h) <= HANDLE_HIT) return 'p1';
        if (Math.hypot(x - s.x2 * w, y - s.y2 * h) <= HANDLE_HIT) return 'p2';
        return null;
    }

    function hitShape(s, x, y, w, h) {
        if (s.type === 'free') {
            if (s.points.length === 1) {
                return Math.hypot(x - s.points[0].x * w, y - s.points[0].y * h) <= HIT_DIST;
            }
            for (let i = 1; i < s.points.length; i++) {
                if (distToSegment(x, y,
                    s.points[i - 1].x * w, s.points[i - 1].y * h,
                    s.points[i].x * w, s.points[i].y * h) <= HIT_DIST) return true;
            }
            return false;
        }
        return distToSegment(x, y, s.x1 * w, s.y1 * h, s.x2 * w, s.y2 * h) <= HIT_DIST;
    }

    function findShapeAt(x, y, w, h) {
        const shapes = sheetShapes[currentSheetId] || [];
        for (let i = shapes.length - 1; i >= 0; i--) {
            if (hitShape(shapes[i], x, y, w, h)) return shapes[i];
        }
        return null;
    }

    // ---- 元に戻す ----
    function pushUndo(sheetId) {
        const stack = undoStacks[sheetId];
        stack.push(JSON.parse(JSON.stringify(sheetShapes[sheetId])));
        if (stack.length > 60) stack.shift();
    }

    function undoLastDrawing() {
        const stack = undoStacks[currentSheetId];
        if (stack && stack.length > 0) {
            sheetShapes[currentSheetId] = stack.pop();
            deselectShape();
            redrawCanvas(currentSheetId);
            showMessage('1つ戻りました', 1000);
        } else {
            showMessage('これ以上戻れません', 1000);
        }
    }

    // ---- 選択 ----
    const shapeActions = document.getElementById('shapeActions');

    function getSelectedShape() {
        if (selectedShapeId === null) return null;
        return (sheetShapes[currentSheetId] || []).find(s => s.id === selectedShapeId) || null;
    }

    function selectShape(id) {
        selectedShapeId = id;
        redrawCanvas(currentSheetId);
        updateShapeActions();
    }

    function deselectShape() {
        if (selectedShapeId === null) {
            shapeActions.style.display = 'none';
            return;
        }
        selectedShapeId = null;
        shapeActions.style.display = 'none';
        redrawCanvas(currentSheetId);
    }

    function updateShapeActions() {
        const s = getSelectedShape();
        if (!s) { shapeActions.style.display = 'none'; return; }

        const canvas = getCanvas();
        const { w, h } = canvasSize(canvas);
        const b = shapeBounds(s, w, h);

        const midX = (b.minX + b.maxX) / 2;
        let top = b.minY - 44;
        if (top < 4) top = Math.min(b.maxY + 14, h - 40);

        const clampedX = Math.max(50, Math.min(midX, w - 50));
        shapeActions.style.left = `${clampedX}px`;
        shapeActions.style.top = `${top}px`;
        shapeActions.style.display = 'block';
    }

    document.getElementById('deleteShapeBtn').addEventListener('click', () => {
        const s = getSelectedShape();
        if (!s) return;
        pushUndo(currentSheetId);
        sheetShapes[currentSheetId] = sheetShapes[currentSheetId].filter(x => x.id !== s.id);
        deselectShape();
        redrawCanvas(currentSheetId);
        showMessage('削除しました', 1000);
    });

    // ---- ツールボタン ----
    const toolButtons = ['drawBtn', 'straightLineBtn', 'arrowBtn', 'selectBtn'];

    function setTool(tool) {
        currentTool = tool;
        toolButtons.forEach(id => {
            const btn = document.getElementById(id);
            const t = id.replace('Btn', '');
            btn.classList.toggle('active', t === tool);
        });
        // カーソル切り替え
        const cursor = (tool === 'draw' || tool === 'straightLine' || tool === 'arrow') ? 'crosshair' : 'default';
        document.querySelectorAll('.drawing-board').forEach(c => c.style.cursor = cursor);
        if (tool !== 'select' && tool !== 'none') deselectShape();
    }

    toolButtons.forEach(btnId => {
        document.getElementById(btnId).addEventListener('click', () => {
            const tool = btnId.replace('Btn', '');
            if (currentTool === tool) {
                setTool('none');
            } else {
                setTool(tool);
                if (tool === 'select') showMessage('線をタップすると移動・削除できます', 1800);
            }
        });
    });

    document.getElementById('undoBtn').addEventListener('click', undoLastDrawing);

    // 全消し（2回押しで確定）
    let clearConfirmTimer = null;
    document.getElementById('clearBtn').addEventListener('click', () => {
        const shapes = sheetShapes[currentSheetId] || [];
        if (shapes.length === 0) {
            showMessage('消す線がありません', 1000);
            return;
        }
        if (clearConfirmTimer) {
            clearTimeout(clearConfirmTimer);
            clearConfirmTimer = null;
            pushUndo(currentSheetId);
            sheetShapes[currentSheetId] = [];
            deselectShape();
            redrawCanvas(currentSheetId);
            showMessage('全部消しました（↩️戻るで復活できます）', 1500);
        } else {
            showMessage('もう一度押すと全部消えます', 2000);
            clearConfirmTimer = setTimeout(() => { clearConfirmTimer = null; }, 2500);
        }
    });

    // ---- 色えらび ----
    const colorButtons = [
        { id: 'colorBlack', color: '#111827' },
        { id: 'colorRed', color: '#ef4444' },
        { id: 'colorBlue', color: '#2563eb' }
    ];
    colorButtons.forEach(({ id, color }) => {
        document.getElementById(id).addEventListener('click', () => {
            currentColor = color;
            colorButtons.forEach(c => document.getElementById(c.id).classList.toggle('active', c.id === id));
            // 選択中の線があればその色も変える
            const s = getSelectedShape();
            if (s) {
                pushUndo(currentSheetId);
                s.color = color;
                redrawCanvas(currentSheetId);
                showMessage('色を変えました', 1000);
            }
        });
    });

    // ---- キャンバスのポインタ操作 ----
    function getCoords(e, canvas) {
        const rect = canvas.getBoundingClientRect();
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

    function onCanvasPointerDown(e) {
        if (!e.isPrimary) return;
        if (e.pointerType === 'mouse' && e.button !== 0) return;
        if (animationMode) return;

        const canvas = e.currentTarget;
        if (canvas.id !== `drawingCanvas-${currentSheetId}`) return;
        if (drawState) return;

        const { x, y } = getCoords(e, canvas);
        const { w, h } = canvasSize(canvas);

        if (currentTool === 'draw' || currentTool === 'straightLine' || currentTool === 'arrow') {
            e.preventDefault();
            try { canvas.setPointerCapture(e.pointerId); } catch (err) {}

            if (currentTool === 'draw') {
                drawState = {
                    mode: 'free',
                    pointerId: e.pointerId,
                    temp: { type: 'free', color: currentColor, width: LINE_WIDTH, points: [{ x: x / w, y: y / h }] }
                };
            } else {
                drawState = {
                    mode: currentTool,
                    pointerId: e.pointerId,
                    temp: {
                        type: currentTool === 'arrow' ? 'arrow' : 'line',
                        color: currentColor, width: LINE_WIDTH,
                        x1: x / w, y1: y / h, x2: x / w, y2: y / h
                    }
                };
            }
            redrawCanvas(currentSheetId, drawState.temp);
            return;
        }

        // 選択モード（「えらぶ」またはツール未選択時）
        const sel = getSelectedShape();
        if (sel) {
            const handle = hitHandle(sel, x, y, w, h);
            if (handle) {
                e.preventDefault();
                try { canvas.setPointerCapture(e.pointerId); } catch (err) {}
                drawState = {
                    mode: 'handle', pointerId: e.pointerId, shape: sel, which: handle,
                    snapshot: JSON.parse(JSON.stringify(sheetShapes[currentSheetId])), changed: false
                };
                shapeActions.style.display = 'none';
                return;
            }
        }

        const s = findShapeAt(x, y, w, h);
        if (s) {
            e.preventDefault();
            try { canvas.setPointerCapture(e.pointerId); } catch (err) {}
            selectShape(s.id);
            drawState = {
                mode: 'move', pointerId: e.pointerId, shape: s,
                startX: x, startY: y,
                orig: JSON.parse(JSON.stringify(s)),
                snapshot: JSON.parse(JSON.stringify(sheetShapes[currentSheetId])),
                changed: false
            };
            shapeActions.style.display = 'none';
        } else {
            deselectShape();
        }
    }

    function onCanvasPointerMove(e) {
        if (!drawState || e.pointerId !== drawState.pointerId) return;
        e.preventDefault();

        const canvas = getCanvas();
        const { x, y } = getCoords(e, canvas);
        const { w, h } = canvasSize(canvas);
        const nx = Math.max(0, Math.min(x / w, 1));
        const ny = Math.max(0, Math.min(y / h, 1));

        if (drawState.mode === 'free') {
            drawState.temp.points.push({ x: nx, y: ny });
            redrawCanvas(currentSheetId, drawState.temp);
        } else if (drawState.mode === 'straightLine' || drawState.mode === 'arrow') {
            drawState.temp.x2 = nx;
            drawState.temp.y2 = ny;
            redrawCanvas(currentSheetId, drawState.temp);
        } else if (drawState.mode === 'handle') {
            const s = drawState.shape;
            if (drawState.which === 'p1') { s.x1 = nx; s.y1 = ny; }
            else { s.x2 = nx; s.y2 = ny; }
            drawState.changed = true;
            redrawCanvas(currentSheetId);
        } else if (drawState.mode === 'move') {
            const dx = (x - drawState.startX) / w;
            const dy = (y - drawState.startY) / h;
            if (!drawState.changed && Math.hypot(x - drawState.startX, y - drawState.startY) < 3) return;
            drawState.changed = true;

            const s = drawState.shape;
            const o = drawState.orig;
            if (s.type === 'free') {
                s.points = o.points.map(p => ({ x: p.x + dx, y: p.y + dy }));
            } else {
                s.x1 = o.x1 + dx; s.y1 = o.y1 + dy;
                s.x2 = o.x2 + dx; s.y2 = o.y2 + dy;
            }
            redrawCanvas(currentSheetId);
        }
    }

    function onCanvasPointerUp(e) {
        if (!drawState || e.pointerId !== drawState.pointerId) return;

        const canvas = getCanvas();
        const { w, h } = canvasSize(canvas);

        if (drawState.mode === 'free') {
            pushUndo(currentSheetId);
            drawState.temp.id = ++shapeIdCounter;
            sheetShapes[currentSheetId].push(drawState.temp);
            redrawCanvas(currentSheetId);
        } else if (drawState.mode === 'straightLine' || drawState.mode === 'arrow') {
            const t = drawState.temp;
            const lenPx = Math.hypot((t.x2 - t.x1) * w, (t.y2 - t.y1) * h);
            if (lenPx >= 5) {
                pushUndo(currentSheetId);
                t.id = ++shapeIdCounter;
                sheetShapes[currentSheetId].push(t);
                if (!lineEditHintShown) {
                    lineEditHintShown = true;
                    showMessage('👆「えらぶ」で線を後から動かせます', 2200);
                }
            }
            redrawCanvas(currentSheetId);
        } else if (drawState.mode === 'handle' || drawState.mode === 'move') {
            if (drawState.changed) {
                // 変更前の状態をアンドゥ履歴に積む
                undoStacks[currentSheetId].push(drawState.snapshot);
                if (undoStacks[currentSheetId].length > 60) undoStacks[currentSheetId].shift();
            }
            redrawCanvas(currentSheetId);
            updateShapeActions();
        }

        drawState = null;
    }

    function initializeCanvas(canvas) {
        resizeCanvasBuffer(canvas);
        if (!canvas.dataset.listenersAttached) {
            canvas.addEventListener('pointerdown', onCanvasPointerDown);
            canvas.addEventListener('pointermove', onCanvasPointerMove);
            canvas.addEventListener('pointerup', onCanvasPointerUp);
            canvas.addEventListener('pointercancel', onCanvasPointerUp);
            canvas.dataset.listenersAttached = 'true';
        }
        const sheetId = canvas.id.split('drawingCanvas-')[1];
        redrawCanvas(sheetId);
    }

    // ---- リサイズ・画面回転対応 ----
    // 図形は正規化座標なので再描画するだけでOK。プレイヤーとアニメ座標はpxなので比率でスケーリング。
    function ensureSheetLayout(sheetId) {
        const sheet = document.getElementById(sheetId);
        if (!sheet) return;
        const w = sheet.clientWidth;
        const h = sheet.clientHeight;
        if (!w || !h) return;

        const last = sheetLastSize[sheetId];
        if (last && (last.w !== w || last.h !== h)) {
            const rx = w / last.w;
            const ry = h / last.h;

            const players = document.getElementById(`players-${sheetId}`).querySelectorAll('.player');
            players.forEach(p => {
                const left = (parseFloat(p.style.left) || 0) * rx;
                const top = (parseFloat(p.style.top) || 0) * ry;
                p.style.transition = 'none';
                p.style.left = `${Math.max(0, Math.min(left, w - p.offsetWidth))}px`;
                p.style.top = `${Math.max(0, Math.min(top, h - p.offsetHeight))}px`;

                const anim = playerAnimations[p.dataset.id];
                if (anim) {
                    anim.startX *= rx; anim.startY *= ry;
                    anim.endX *= rx; anim.endY *= ry;
                    rebuildAnimationPath(p);
                }
            });
        }
        sheetLastSize[sheetId] = { w, h };

        const canvas = getCanvas(sheetId);
        if (canvas) {
            resizeCanvasBuffer(canvas);
            redrawCanvas(sheetId);
        }
        if (sheetId === currentSheetId) updateShapeActions();
    }

    let resizeTimer = null;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => ensureSheetLayout(currentSheetId), 100);
    });
    window.addEventListener('orientationchange', () => {
        setTimeout(() => ensureSheetLayout(currentSheetId), 300);
    });

    // ---- キーボードショートカット（PC向け） ----
    document.addEventListener('keydown', (e) => {
        const tag = e.target.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA') return;

        if (e.key === 'Delete' || e.key === 'Backspace') {
            const s = getSelectedShape();
            if (s) {
                e.preventDefault();
                pushUndo(currentSheetId);
                sheetShapes[currentSheetId] = sheetShapes[currentSheetId].filter(x => x.id !== s.id);
                deselectShape();
                redrawCanvas(currentSheetId);
                showMessage('削除しました', 1000);
            }
        } else if (e.key === 'Escape') {
            deselectShape();
            hidePlayerMenu();
            if (animationMode) {
                animationMode = false;
                removeAnimationTarget();
            }
        } else if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') {
            e.preventDefault();
            undoLastDrawing();
        }
    });

    // ---- 初期化 ----
    initializeCanvas(document.getElementById('drawingCanvas-sheet-1'));
    ensureSheetLayout('sheet-1');

    createPlayer('red');
    createPlayer('red');
    createPlayer('blue');
    createPlayer('blue');
    createPlayer('ball', false);

</script>
<script>
if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  window.addEventListener('load', ()=>{ navigator.serviceWorker.register('./sw.js').catch(()=>{}); });
}
</script>
