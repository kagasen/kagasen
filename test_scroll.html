<!DOCTYPE html>
<html>

<head>
    <style>
        .book-pages-vertical {
            writing-mode: vertical-rl;
            height: 170mm;
            column-width: 257mm;
            column-gap: 60mm;
            padding: 20mm;
        }
    </style>
</head>

<body>
    <div id="test1" class="book-pages-vertical">
        <script>
            let text = "あ".repeat(5000);
            document.write(text);
        </script>
    </div>
    <script>
        const el = document.getElementById('test1');
        document.write(`<p>ScrollWidth: ${el.scrollWidth}, ScrollHeight: ${el.scrollHeight}, ClientWidth: ${el.clientWidth}, ClientHeight: ${el.clientHeight}</p>`);
    </script>
</body>

</html>
