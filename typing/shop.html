<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ペットショップ — タイピングポイントで育てよう</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fef9f0;
    --bg-card: #ffffff;
    --ink: #2d2a26;
    --ink-soft: #6b6357;
    --line: #e8dfd0;
    --accent: #ff6b35;
    --accent-soft: #ffe5d9;
    --gold: #f4b942;
    --gold-soft: #fdf3d6;
    --green: #7ab648;
    --green-soft: #e8f3da;
    --warm: #ff8c42;
    --warm-soft: #ffe0cc;
    --feed: #4a90c2;
    --feed-soft: #d6e9f7;
    --play: #b87cc4;
    --play-soft: #ecdcf2;
  }

  body {
    font-family: 'Hiragino Maru Gothic ProN', 'Yu Gothic', 'Meiryo', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 16px 16px 80px;
    line-height: 1.6;
  }

  .app { max-width: 940px; margin: 0 auto; }

  /* === ヘッダー === */
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--bg-card);
    border: 3px solid var(--ink);
    border-radius: 20px;
    padding: 14px 20px;
    margin-bottom: 16px;
    box-shadow: 4px 4px 0 var(--ink);
  }
  header h1 {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 0.02em;
  }
  header h1 span { color: var(--accent); }
  .points {
    background: var(--gold-soft);
    border: 2px solid var(--gold);
    border-radius: 999px;
    padding: 8px 18px;
    font-size: 18px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .points .coin {
    display: inline-block;
    width: 22px; height: 22px;
    background: var(--gold);
    border: 2px solid #c08d10;
    border-radius: 50%;
    font-size: 13px;
    text-align: center;
    line-height: 18px;
    color: #fff;
    font-weight: 800;
  }

  /* === タブ === */
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .tab {
    flex: 1;
    background: var(--bg-card);
    border: 3px solid var(--ink);
    border-radius: 14px;
    padding: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    color: var(--ink);
    box-shadow: 3px 3px 0 var(--ink);
    transition: transform 0.1s, box-shadow 0.1s;
  }
  .tab:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--ink); }
  .tab.active {
    background: var(--accent);
    color: white;
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 var(--ink);
  }

  /* === パネル === */
  .panel {
    background: var(--bg-card);
    border: 3px solid var(--ink);
    border-radius: 20px;
    padding: 22px;
    box-shadow: 4px 4px 0 var(--ink);
    margin-bottom: 16px;
  }
  .panel h2 {
    font-size: 20px;
    margin-bottom: 14px;
  }
  .panel-sub {
    color: var(--ink-soft);
    font-size: 14px;
    margin-bottom: 16px;
  }

  /* === ショップ === */
  .eggs-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px;
  }
  .egg-card {
    background: var(--bg);
    border: 2px solid var(--line);
    border-radius: 16px;
    padding: 16px;
    text-align: center;
    transition: transform 0.15s, border-color 0.15s;
  }
  .egg-card:hover { transform: translateY(-3px); border-color: var(--accent); }
  .egg-card .egg-svg { width: 80px; height: 90px; margin: 0 auto 8px; }
  .egg-card .name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .egg-card .desc {
    font-size: 11px;
    color: var(--ink-soft);
    min-height: 30px;
    margin-bottom: 10px;
    line-height: 1.4;
  }
  .egg-card .price {
    background: var(--gold-soft);
    border: 1px solid var(--gold);
    border-radius: 999px;
    padding: 3px 10px;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 8px;
    display: inline-block;
  }
  .buy-btn {
    width: 100%;
    background: var(--accent);
    color: white;
    border: 2px solid var(--ink);
    border-radius: 10px;
    padding: 8px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  .buy-btn:disabled { background: #ccc; cursor: not-allowed; }

  /* === ペットエリア === */
  .pet-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 14px;
  }
  .pet-card {
    background: var(--bg);
    border: 3px solid var(--ink);
    border-radius: 18px;
    padding: 16px;
    text-align: center;
  }
  .pet-svg { width: 110px; height: 110px; margin: 0 auto 8px; }
  .pet-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
  .pet-stage {
    font-size: 12px;
    color: var(--ink-soft);
    margin-bottom: 8px;
    background: white;
    border-radius: 999px;
    padding: 3px 10px;
    display: inline-block;
  }
  .progress-bar {
    background: white;
    border: 2px solid var(--ink);
    border-radius: 999px;
    height: 14px;
    overflow: hidden;
    margin-bottom: 6px;
    margin-top: 8px;
  }
  .progress-fill {
    height: 100%;
    transition: width 0.3s;
  }
  .progress-fill.warm { background: var(--warm); }
  .progress-fill.feed { background: var(--feed); }
  .progress-fill.play { background: var(--play); }
  .progress-fill.done { background: var(--gold); }
  .progress-label {
    font-size: 11px;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }
  .pet-actions {
    display: flex;
    gap: 6px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 6px;
  }
  .action-btn {
    background: white;
    border: 2px solid var(--ink);
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: transform 0.05s;
  }
  .action-btn:hover { transform: translateY(-1px); }
  .action-btn.warm { background: var(--warm-soft); border-color: var(--warm); }
  .action-btn.feed { background: var(--feed-soft); border-color: var(--feed); }
  .action-btn.play { background: var(--play-soft); border-color: var(--play); }
  .action-btn.done {
    background: var(--gold-soft);
    border-color: var(--gold);
    cursor: default;
  }
  .empty-msg {
    text-align: center;
    color: var(--ink-soft);
    padding: 30px;
    font-size: 15px;
  }

  /* === 図鑑 === */
  .dex-info {
    background: var(--gold-soft);
    border: 2px solid var(--gold);
    border-radius: 12px;
    padding: 10px 14px;
    margin-bottom: 16px;
    font-size: 13px;
    text-align: center;
    font-weight: 600;
  }
  .dex-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
  }
  .dex-card {
    background: var(--bg);
    border: 2px solid var(--ink);
    border-radius: 14px;
    padding: 12px;
    text-align: center;
    position: relative;
  }
  .dex-card.locked {
    background: #f3eee5;
    opacity: 0.7;
  }
  .dex-card.locked .pet-svg {
    filter: grayscale(1) brightness(0.4);
    opacity: 0.4;
  }
  .dex-num {
    position: absolute;
    top: 6px; left: 8px;
    font-size: 10px;
    font-weight: 800;
    color: var(--ink-soft);
  }
  .dex-card .pet-svg { width: 90px; height: 90px; }
  .dex-card .name { font-size: 13px; font-weight: 700; }
  .dex-card .badge {
    font-size: 10px;
    color: var(--gold);
    font-weight: 800;
    margin-top: 2px;
  }
  .dex-card.locked .name { color: var(--ink-soft); }

  /* === トースト === */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: white;
    padding: 12px 24px;
    border-radius: 999px;
    font-weight: 700;
    z-index: 100;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    max-width: 90%;
  }
  .toast.show { opacity: 1; }
  .toast.good { background: var(--green); }
  .toast.bad { background: #e74c3c; }
  .toast.special {
    background: var(--gold);
    color: var(--ink);
    font-size: 18px;
    padding: 18px 32px;
  }

  /* === デバッグ === */
  .debug-panel {
    position: fixed;
    bottom: 80px;
    right: 20px;
    background: white;
    border: 3px solid var(--ink);
    border-radius: 16px;
    padding: 16px;
    box-shadow: 4px 4px 0 var(--ink);
    z-index: 200;
    width: 260px;
    display: none;
  }
  .debug-panel.show { display: block; }
  .debug-panel h3 {
    font-size: 14px;
    margin-bottom: 4px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .debug-panel .close-x {
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    color: var(--ink-soft);
    padding: 0;
    line-height: 1;
  }
  .debug-panel p {
    font-size: 11px;
    color: var(--ink-soft);
    margin-bottom: 10px;
    line-height: 1.5;
  }
  .debug-panel input {
    width: 100%;
    padding: 8px;
    font-size: 16px;
    border: 2px solid var(--ink);
    border-radius: 8px;
    font-family: inherit;
    margin-bottom: 8px;
    outline: none;
  }
  .debug-panel input:focus { border-color: var(--accent); }
  .debug-panel .row { display: flex; gap: 6px; }
  .debug-panel .row button {
    flex: 1;
    background: var(--accent);
    color: white;
    border: 2px solid var(--ink);
    border-radius: 8px;
    padding: 8px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  .debug-panel .row button.secondary {
    background: white;
    color: var(--ink);
  }

  .back-link {
    position: fixed;
    bottom: 16px;
    right: 16px;
    background: var(--ink);
    color: white;
    border: 3px solid var(--ink);
    border-radius: 999px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 700;
    text-decoration: none;
    box-shadow: 3px 3px 0 var(--accent);
    z-index: 50;
  }
  .back-link:hover { background: var(--accent); }

  .keybuf {
    position: fixed;
    bottom: 16px;
    left: 16px;
    background: rgba(45, 42, 38, 0.06);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--ink-soft);
    font-family: monospace;
    z-index: 40;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .keybuf.show { opacity: 1; }

  /* アニメ */
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .bounce { animation: bounce 0.6s ease; }

  @keyframes sparkle {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }
  .sparkle { animation: sparkle 0.8s ease; }

  .view { display: none; }
  .view.active { display: block; }

  /* 育成フロー説明 */
  .flow-guide {
    background: var(--green-soft);
    border: 2px solid var(--green);
    border-radius: 12px;
    padding: 12px 16px;
    margin-bottom: 16px;
    font-size: 13px;
  }
  .flow-guide .step {
    display: inline-block;
    margin-right: 6px;
  }
  .flow-guide b { color: var(--ink); }

  /* マイペットの数カウンター */
  .pet-count {
    font-size: 14px;
    font-weight: 600;
    color: var(--ink-soft);
  }

  /* 天使などのお世話コストの注意書き */
  .pet-note {
    font-size: 11px;
    font-weight: 700;
    color: #b6862e;
    background: var(--gold-soft);
    border: 1px solid var(--gold);
    border-radius: 999px;
    padding: 2px 10px;
    display: inline-block;
    margin: 2px 0 6px;
  }

  /* === ペットを逃がすモーダル === */
  .release-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(45, 42, 38, 0.55);
    z-index: 300;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  .release-modal.show { display: flex; }
  .release-box {
    background: var(--bg-card);
    border: 3px solid var(--ink);
    border-radius: 20px;
    box-shadow: 6px 6px 0 var(--ink);
    padding: 20px;
    max-width: 560px;
    width: 100%;
    max-height: 88vh;
    overflow-y: auto;
    text-align: center;
  }
  .release-box h3 { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
  .release-box p {
    font-size: 13px;
    color: var(--ink-soft);
    margin-bottom: 14px;
    line-height: 1.5;
  }
  .release-box p b { color: var(--accent); }
  .release-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 10px;
    margin-bottom: 14px;
  }
  .release-item {
    background: var(--bg);
    border: 2px solid var(--line);
    border-radius: 14px;
    padding: 8px 6px;
    text-align: center;
  }
  .release-item .pet-svg { width: 64px; height: 64px; margin: 0 auto 2px; }
  .release-item .r-name { font-size: 12px; font-weight: 700; }
  .release-item .r-stage { font-size: 10px; color: var(--ink-soft); margin-bottom: 6px; }
  .release-item .r-btn {
    width: 100%;
    background: var(--green-soft);
    border: 2px solid var(--green);
    border-radius: 8px;
    padding: 5px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  .release-item .r-btn:hover { background: var(--green); color: white; }
  .release-cancel {
    background: white;
    border: 2px solid var(--ink);
    border-radius: 10px;
    padding: 8px 24px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
</style>
</head>
<body>
  <div class="app">
    <header>
      <h1>ペット<span>ショップ</span> 🥚</h1>
      <div class="points">
        <span class="coin">P</span>
        <span id="points-display">0</span>
      </div>
    </header>

    <div class="tabs">
      <button class="tab active" data-view="shop">🛒 ショップ</button>
      <button class="tab" data-view="pets">🐣 マイペット</button>
      <button class="tab" data-view="dex">📖 ずかん</button>
    </div>

    <!-- ========== ショップ画面 ========== -->
    <div class="view active" id="view-shop">
      <div class="panel">
        <h2>🛒 たまごショップ</h2>
        <p class="panel-sub">タイピングで貯めたポイントでたまごを買おう！<br>
          高いたまごほどレアな生き物が生まれるよ。</p>
        <div class="eggs-grid" id="eggs-grid"></div>
      </div>
    </div>

    <!-- ========== ペット画面 ========== -->
    <div class="view" id="view-pets">
      <div class="panel">
        <h2>🐣 マイペット <span id="pet-count" class="pet-count"></span></h2>
        <div class="flow-guide">
          <span class="step">🥚 <b>あたためる</b>(3P)</span>→
          <span class="step">🐣 <b>エサ</b>(5P)</span>→
          <span class="step">🐥 <b>あそぶ</b>(10P)</span>→
          <span class="step">⭐ <b>大人になって図鑑へ！</b></span>
        </div>
        <div id="pet-list-container"></div>
      </div>
    </div>

    <!-- ========== 図鑑画面 ========== -->
    <div class="view" id="view-dex">
      <div class="panel">
        <h2>📖 ペット図鑑</h2>
        <div class="dex-info" id="dex-info">
          コレクション：<span id="dex-count">0</span> / <span id="dex-total">9</span>
        </div>
        <div class="dex-grid" id="dex-grid"></div>
      </div>
    </div>
  </div>

  <!-- デバッグ用ポイント入力パネル -->
  <div class="debug-panel" id="debug-panel">
    <h3>
      🛠️ ポイント入力（テスト用）
      <button class="close-x" id="debug-close">×</button>
    </h3>
    <p>シミュレーション用です。本番ではタイピングアプリから引き継いだポイントが入ります。</p>
    <input type="number" id="debug-input" placeholder="ポイント数を入力" min="0" />
    <div class="row">
      <button id="debug-add">追加する</button>
      <button class="secondary" id="debug-set">上書き</button>
    </div>
    <div class="row" style="margin-top:6px;">
      <button class="secondary" id="debug-reset" style="font-size:11px;">全リセット</button>
    </div>
  </div>

  <div class="keybuf" id="keybuf"></div>

  <!-- ペットを逃がすモーダル（10ひきを超えたとき） -->
  <div class="release-modal" id="release-modal">
    <div class="release-box">
      <h3>🏠 おうちが いっぱい！</h3>
      <p>ペットは <b>10ひき</b> までしか飼えません。<br>
        新しいなかまを むかえるには、いまの子を1ひき そとに にがしてあげてね。</p>
      <div class="release-list" id="release-list"></div>
      <button class="release-cancel" id="release-cancel">やめる</button>
    </div>
  </div>

  <a class="back-link" href="./index.html">← タイピングに戻る</a>

  <div class="toast" id="toast"></div>

  <script>
  // ============================================
  // ストレージキー
  //   typing_total_points : タイピングアプリと共有のポイント残高
  //   typing-pet-save-v2  : ペット・図鑑データ専用
  // ============================================
  const TYPING_POINTS_KEY = 'typing_total_points';
  const PET_SAVE_KEY      = 'typing-pet-save-v2';

  // ============================================
  // 育成コスト設計
  //   あたためる: 3P × 80回 = 240P で孵化（egg → baby）
  //   エサ:       5P × 50回 = 250P で成長（baby → teen）
  //   あそぶ:    10P × 50回 = 500P で進化（teen → adult）
  // ============================================
  const COST_WARM = 3,  WARM_NEEDED = 80;
  const COST_FEED = 5,  FEED_NEEDED = 50;
  const COST_PLAY = 10, PLAY_NEEDED = 50;

  // ============================================
  // たまごの種類（全8種類）
  // ============================================
  const EGG_TYPES = {
    chick:    { id: 'chick',    name: 'ヒヨコ',   eggName: 'ヒヨコのたまご',     desc: 'いちばん人気の小鳥さん',         price: 100,  color: '#fff8dc', spots: '#ffd966', species: 'chick' },
    penguin:  { id: 'penguin',  name: 'ペンギン', eggName: 'ペンギンのたまご',   desc: 'タキシードの紳士',               price: 100,  color: '#e8f1f8', spots: '#2c3e50', species: 'penguin' },
    bunny:    { id: 'bunny',    name: 'ウサギ',   eggName: 'ウサギのたまご',     desc: 'ふわふわでやさしい',             price: 500,  color: '#fce4ec', spots: '#f48fb1', species: 'bunny' },
    fox:      { id: 'fox',      name: 'キツネ',   eggName: 'キツネのたまご',     desc: 'すばしっこい森の住人',           price: 500,  color: '#fff0e0', spots: '#e67e22', species: 'fox' },
    cat:      { id: 'cat',      name: 'ネコ',     eggName: 'ネコのたまご',       desc: 'いたずら好きな仲間',             price: 1000, color: '#e1d5f5', spots: '#9c7cc4', species: 'cat' },
    owl:      { id: 'owl',      name: 'フクロウ', eggName: 'フクロウのたまご',   desc: 'もの知りな夜のけんじゃ',         price: 1000, color: '#f0e1c8', spots: '#a47651', species: 'owl' },
    dino:     { id: 'dino',     name: 'キョウリュウ', eggName: 'キョウリュウのたまご', desc: 'たくさん育ててみよう！',     price: 2500, color: '#d4edda', spots: '#7ab648', species: 'dino' },
    dragon:   { id: 'dragon',   name: 'ドラゴン', eggName: 'ドラゴンのたまご',   desc: 'でんせつの生き物！',             price: 5000, color: '#ffe0e0', spots: '#e74c3c', species: 'dragon' },
    // 9番目のたまご：見た目は「？？？」だが、正体はてんし。おせわのコストは10倍（温30P/餌50P/遊100P）。
    angel:    { id: 'angel',    name: '天使',     eggName: '？？？',             desc: 'なぞに つつまれた たまご…？',   price: 77777, color: '#f3ecff', spots: '#f4b942', species: 'angel', special: true, costMul: 10 }
  };

  // 飼えるペットの最大数。これを超えるたまごは、どれか1ひきを逃がしてから飼う。
  const MAX_PETS = 10;

  // ============================================
  // 状態管理
  //   ポイントはタイピングアプリと共有のlocalStorageキーで管理
  //   ペット・図鑑データは専用キーで保存
  // ============================================
  let state = { points: 0, pets: [], dex: [] };

  function loadState() {
    // ペット・図鑑データを読み込む
    try {
      const raw = localStorage.getItem(PET_SAVE_KEY);
      if (raw) {
        const saved = JSON.parse(raw);
        state.pets = saved.pets || [];
        state.dex  = saved.dex  || [];
      }
    } catch (e) { console.warn(e); }
    if (!state.dex) state.dex = [];
    // ポイントはタイピングアプリと共有のキーから読む
    state.points = parseInt(localStorage.getItem(TYPING_POINTS_KEY) || '0');
  }

  function saveState() {
    try {
      // ペット・図鑑を専用キーに保存
      localStorage.setItem(PET_SAVE_KEY, JSON.stringify({ pets: state.pets, dex: state.dex }));
      // ポイント残高をタイピングアプリと共有のキーに書き戻す
      localStorage.setItem(TYPING_POINTS_KEY, String(state.points));
    } catch (e) { console.warn(e); }
  }

  function addPoints(n) { state.points += n; updatePointsUI(); saveState(); }
  function spendPoints(n) {
    if (state.points < n) return false;
    state.points -= n; updatePointsUI(); saveState();
    return true;
  }
  function updatePointsUI() {
    document.getElementById('points-display').textContent = state.points.toLocaleString();
  }

  function toast(msg, kind = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'toast show ' + kind;
    clearTimeout(toast._t);
    toast._t = setTimeout(() => { el.className = 'toast'; }, kind === 'special' ? 2800 : 1800);
  }

  }

  // ============================================
  // ショップ
  // ============================================
  function renderShop() {
    const grid = document.getElementById('eggs-grid');
    grid.innerHTML = '';
    const eggs = Object.values(EGG_TYPES).slice().sort((a, b) => a.price - b.price);
    eggs.forEach(egg => {
      const div = document.createElement('div');
      div.className = 'egg-card';
      const canBuy = state.points >= egg.price;
      div.innerHTML = `
        ${svgEgg(egg)}
        <div class="name">${egg.eggName}</div>
        <div class="desc">${egg.desc}</div>
        <div class="price">💰 ${egg.price.toLocaleString()} P</div>
        <button class="buy-btn" data-egg="${egg.id}" ${canBuy ? '' : 'disabled'}>
          ${canBuy ? '買う！' : 'ポイントが たりない'}
        </button>
      `;
      grid.appendChild(div);
    });
    grid.querySelectorAll('.buy-btn').forEach(btn => {
      btn.addEventListener('click', () => buyEgg(btn.dataset.egg));
    });
  }

  function buyEgg(eggId) {
    const egg = EGG_TYPES[eggId];
    // ポイントが足りるかを先にチェック（ここではまだ消費しない）
    if (state.points < egg.price) {
      toast('ポイントが たりないよ！', 'bad');
      return;
    }
    // すでに最大数まで飼っているときは、どれか1ひきを逃がしてもらう
    if (state.pets.length >= MAX_PETS) {
      openReleaseModal(eggId);
      return;
    }
    finalizeBuy(eggId);
  }

  // 実際にポイントを消費して新しいたまごをむかえる
  function finalizeBuy(eggId) {
    const egg = EGG_TYPES[eggId];
    if (!spendPoints(egg.price)) {
      toast('ポイントが たりないよ！', 'bad');
      return;
    }
    const pet = {
      id: 'pet-' + Date.now() + Math.random().toString(36).slice(2, 6),
      eggType: eggId, stage: 'egg',
      warmCount: 0, feedCount: 0, playCount: 0,
      birthAt: Date.now()
    };
    state.pets.push(pet);
    saveState();
    toast(`${egg.eggName}を かったよ！マイペットを見てね`, 'good');
    renderShop();
    renderPets();
  }

  // ============================================
  // ペットを逃がす（10ひきを超えるとき）
  // ============================================
  let pendingEggId = null;

  function openReleaseModal(eggId) {
    pendingEggId = eggId;
    const list = document.getElementById('release-list');
    list.innerHTML = '';
    state.pets.forEach(pet => {
      const egg = EGG_TYPES[pet.eggType];
      const stageMap = { egg: '🥚 たまご', baby: '🐣 ヒナ', teen: '🐥 こども', adult: '⭐ 大人' };
      const showName = (pet.stage === 'egg' && egg.special) ? '？？？' : egg.name;
      const item = document.createElement('div');
      item.className = 'release-item';
      item.innerHTML = `
        ${svgPet(egg.species, pet.stage)}
        <div class="r-name">${showName}</div>
        <div class="r-stage">${stageMap[pet.stage] || ''}</div>
        <button class="r-btn" data-pet="${pet.id}">🌿 にがす</button>
      `;
      list.appendChild(item);
    });
    list.querySelectorAll('.r-btn').forEach(btn => {
      btn.addEventListener('click', () => releasePet(btn.dataset.pet));
    });
    document.getElementById('release-modal').classList.add('show');
  }

  function closeReleaseModal() {
    document.getElementById('release-modal').classList.remove('show');
    pendingEggId = null;
  }

  function releasePet(petId) {
    const idx = state.pets.findIndex(p => p.id === petId);
    if (idx === -1) return;
    const released = state.pets[idx];
    const releasedEgg = EGG_TYPES[released.eggType];
    const releasedName = (released.stage === 'egg' && releasedEgg.special) ? '？？？' : releasedEgg.name;
    state.pets.splice(idx, 1);
    saveState();
    const eggId = pendingEggId;
    document.getElementById('release-modal').classList.remove('show');
    pendingEggId = null;
    toast(`🌿 ${releasedName}を そとに にがしてあげたよ。元気でね！`, 'good');
    // 空いた1ひき分のスペースに新しいたまごをむかえる
    if (eggId) finalizeBuy(eggId);
    renderPets();
    renderShop();
  }

  // ============================================
  // ペット育成
  // ============================================
  function renderPets() {
    const container = document.getElementById('pet-list-container');
    const counter = document.getElementById('pet-count');
    if (counter) counter.textContent = `（${state.pets.length} / ${MAX_PETS}ひき）`;
    if (state.pets.length === 0) {
      container.innerHTML = `<div class="empty-msg">
        まだペットがいません。<br>
        ショップでたまごを買ってみよう！🥚
      </div>`;
      return;
    }
    container.innerHTML = '<div class="pet-list" id="pet-list"></div>';
    const list = document.getElementById('pet-list');
    state.pets.forEach(pet => list.appendChild(renderPetCard(pet)));
  }

  function renderPetCard(pet) {
    const egg = EGG_TYPES[pet.eggType];
    const mul = egg.costMul || 1;            // 天使だけ 5倍
    const cWarm = COST_WARM * mul, cFeed = COST_FEED * mul, cPlay = COST_PLAY * mul;
    const div = document.createElement('div');
    div.className = 'pet-card';
    div.dataset.petId = pet.id;

    let stageLabel = '', progressLabel = '', progressPct = 0, fillClass = '', actionsHTML = '';

    if (pet.stage === 'egg') {
      stageLabel = '🥚 たまご';
      progressLabel = `あたためる：${pet.warmCount} / ${WARM_NEEDED}`;
      progressPct = (pet.warmCount / WARM_NEEDED) * 100;
      fillClass = 'warm';
      actionsHTML = `<button class="action-btn warm" data-act="warm" data-pet="${pet.id}">
        🔥 あたためる<br><small>${cWarm}P</small></button>`;
    } else if (pet.stage === 'baby') {
      stageLabel = '🐣 ヒナ';
      progressLabel = `エサ：${pet.feedCount} / ${FEED_NEEDED}`;
      progressPct = (pet.feedCount / FEED_NEEDED) * 100;
      fillClass = 'feed';
      actionsHTML = `<button class="action-btn feed" data-act="feed" data-pet="${pet.id}">
        🍴 エサをあげる<br><small>${cFeed}P</small></button>`;
    } else if (pet.stage === 'teen') {
      stageLabel = '🐥 こども';
      progressLabel = `あそぶ：${pet.playCount} / ${PLAY_NEEDED}`;
      progressPct = (pet.playCount / PLAY_NEEDED) * 100;
      fillClass = 'play';
      actionsHTML = `<button class="action-btn play" data-act="play" data-pet="${pet.id}">
        🎾 あそぶ<br><small>${cPlay}P</small></button>`;
    } else {
      stageLabel = '⭐ 大人になった！';
      progressLabel = `図鑑に登録ずみ！`;
      progressPct = 100;
      fillClass = 'done';
      actionsHTML = `<button class="action-btn done">📖 図鑑にいるよ</button>`;
    }

    // たまごのうちは天使の正体をかくす
    const displayName = (pet.stage === 'egg' && egg.special) ? '？？？' : egg.name;
    // 天使はおせわのコストが5倍であることを知らせる
    const noteHTML = (egg.special && pet.stage !== 'adult')
      ? `<div class="pet-note">✨ おせわは ${mul}ばい たいへん！</div>` : '';

    div.innerHTML = `
      ${svgPet(egg.species, pet.stage)}
      <div class="pet-name">${displayName}</div>
      <div class="pet-stage">${stageLabel}</div>
      <div class="progress-bar"><div class="progress-fill ${fillClass}" style="width:${Math.min(100, progressPct)}%"></div></div>
      <div class="progress-label">${progressLabel}</div>
      ${noteHTML}
      <div class="pet-actions">${actionsHTML}</div>
    `;

    div.querySelectorAll('.action-btn[data-act]').forEach(btn => {
      btn.addEventListener('click', () => petAction(btn.dataset.act, btn.dataset.pet));
    });
    return div;
  }

  function petAction(act, petId) {
    const pet = state.pets.find(p => p.id === petId);
    if (!pet) return;
    const egg = EGG_TYPES[pet.eggType];
    const mul = egg.costMul || 1;            // 天使だけ 5倍
    const costs = { warm: COST_WARM * mul, feed: COST_FEED * mul, play: COST_PLAY * mul };
    if (!spendPoints(costs[act])) {
      toast('ポイントが たりない！', 'bad');
      return;
    }

    let evolved = false;

    if (act === 'warm' && pet.stage === 'egg') {
      pet.warmCount++;
      if (pet.warmCount >= WARM_NEEDED) {
        pet.stage = 'baby';
        toast(`🎉 ${egg.name}が生まれたよ！`, 'special');
        evolved = true;
      } else toast('ぽかぽか…💕', 'good');
    } else if (act === 'feed' && pet.stage === 'baby') {
      pet.feedCount++;
      if (pet.feedCount >= FEED_NEEDED) {
        pet.stage = 'teen';
        toast(`✨ おおきくなった！`, 'special');
        evolved = true;
      } else toast('もぐもぐ🍴', 'good');
    } else if (act === 'play' && pet.stage === 'teen') {
      pet.playCount++;
      if (pet.playCount >= PLAY_NEEDED) {
        pet.stage = 'adult';
        if (!state.dex.includes(pet.eggType)) {
          state.dex.push(pet.eggType);
          setTimeout(() => toast(`📖 ずかんに「${egg.name}」を登録！`, 'special'), 1900);
        }
        toast(`🌟 大人になった！すごい！`, 'special');
        evolved = true;
      } else toast('たのしいね！🎾', 'good');
    }

    saveState();
    const card = document.querySelector(`[data-pet-id="${pet.id}"]`);
    if (card) {
      const svg = card.querySelector('svg');
      if (svg) {
        svg.classList.add(evolved ? 'sparkle' : 'bounce');
        setTimeout(() => svg.classList.remove('sparkle', 'bounce'), 800);
      }
    }
    renderPets();
    if (evolved) renderDex();
  }

  // ============================================
  // 図鑑
  // ============================================
  function renderDex() {
    const grid = document.getElementById('dex-grid');
    grid.innerHTML = '';
    const eggs = Object.values(EGG_TYPES).slice().sort((a, b) => a.price - b.price);
    let count = 0;
    eggs.forEach((egg, i) => {
      const unlocked = state.dex.includes(egg.id);
      if (unlocked) count++;
      const div = document.createElement('div');
      div.className = 'dex-card' + (unlocked ? '' : ' locked');
      div.innerHTML = `
        <div class="dex-num">No.${String(i + 1).padStart(2, '0')}</div>
        ${unlocked ? svgPet(egg.species, 'adult') : svgEggLarge(egg)}
        <div class="name">${unlocked ? egg.name : '？？？'}</div>
        ${unlocked ? '<div class="badge">⭐ コンプリート</div>' : '<div class="badge" style="color:#aaa;">未登録</div>'}
      `;
      grid.appendChild(div);
    });
    document.getElementById('dex-count').textContent = count;
    document.getElementById('dex-total').textContent = eggs.length;
  }

  // ============================================
  // タブ切り替え
  // ============================================
  function switchView(name) {
    document.querySelectorAll('.tab').forEach(t => {
      t.classList.toggle('active', t.dataset.view === name);
    });
    document.querySelectorAll('.view').forEach(v => {
      v.classList.toggle('active', v.id === 'view-' + name);
    });
    if (name === 'shop') renderShop();
    if (name === 'pets') renderPets();
    if (name === 'dex') renderDex();
  }

  // ============================================
  // 隠しコマンド：「petshopping」
  // ============================================
  const SECRET = 'petshopping';
  let keyBuffer = '';
  let keyBufTimer = null;

  function openDebugPanel() {
    document.getElementById('debug-panel').classList.add('show');
    document.getElementById('debug-input').focus();
    keyBuffer = '';
    updateKeyBufDisplay('');
  }
  function closeDebugPanel() {
    document.getElementById('debug-panel').classList.remove('show');
  }
  function updateKeyBufDisplay(text) {
    const el = document.getElementById('keybuf');
    if (text) {
      el.textContent = '入力中: ' + text;
      el.classList.add('show');
      clearTimeout(updateKeyBufDisplay._t);
      updateKeyBufDisplay._t = setTimeout(() => el.classList.remove('show'), 1500);
    } else {
      el.classList.remove('show');
    }
  }

  document.addEventListener('keydown', (e) => {
    const tag = (e.target.tagName || '').toLowerCase();
    if (tag === 'input' || tag === 'textarea') return;
    if (e.key.length === 1 && /[a-zA-Z]/.test(e.key)) {
      keyBuffer = (keyBuffer + e.key.toLowerCase()).slice(-SECRET.length);
      updateKeyBufDisplay(keyBuffer);
      clearTimeout(keyBufTimer);
      keyBufTimer = setTimeout(() => { keyBuffer = ''; updateKeyBufDisplay(''); }, 3000);
      if (keyBuffer === SECRET) {
        openDebugPanel();
        keyBuffer = '';
      }
    }
  });

  // ============================================
  // 初期化
  // ============================================
  function init() {
    loadState();
    updatePointsUI();

    document.querySelectorAll('.tab').forEach(t => {
      t.addEventListener('click', () => switchView(t.dataset.view));
    });

    // 「ペットを逃がす」モーダルを閉じる
    document.getElementById('release-cancel').addEventListener('click', closeReleaseModal);
    document.getElementById('release-modal').addEventListener('click', (e) => {
      if (e.target.id === 'release-modal') closeReleaseModal();
    });

    document.getElementById('debug-close').addEventListener('click', closeDebugPanel);
    document.getElementById('debug-add').addEventListener('click', () => {
      const v = parseInt(document.getElementById('debug-input').value, 10);
      if (isNaN(v) || v < 0) { toast('数字を入れてね', 'bad'); return; }
      addPoints(v);
      toast(`+${v.toLocaleString()} ポイント追加`, 'good');
      document.getElementById('debug-input').value = '';
      renderShop();
    });
    document.getElementById('debug-set').addEventListener('click', () => {
      const v = parseInt(document.getElementById('debug-input').value, 10);
      if (isNaN(v) || v < 0) { toast('数字を入れてね', 'bad'); return; }
      state.points = v;
      updatePointsUI(); saveState();
      toast(`${v.toLocaleString()} ポイントに設定`, 'good');
      document.getElementById('debug-input').value = '';
      renderShop();
    });
    document.getElementById('debug-reset').addEventListener('click', () => {
      if (!confirm('ポイントとペットと図鑑を全部リセットしますか？')) return;
      state = { points: 0, pets: [], dex: [] };
      localStorage.setItem(TYPING_POINTS_KEY, '0');
      localStorage.removeItem(PET_SAVE_KEY);
      updatePointsUI();
      renderShop(); renderPets(); renderDex();
      closeDebugPanel();
      toast('リセットしました', 'good');
    });

    renderShop();
    renderPets();
    renderDex();
  }

  document.addEventListener('DOMContentLoaded', init);
  </script>
