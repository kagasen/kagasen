<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>70のとっくん レベル48 | キッズタイピングマスター</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-blue-50 font-sans">
    <script src="../preflight.js"></script>

    <div id="root"></div>
    <div class="fixed top-4 left-4 z-50">
        <a href="index.html"
            class="flex items-center justify-center w-12 h-12 bg-white rounded-full shadow-lg border-2 border-indigo-200 text-gray-600 hover:text-indigo-600 hover:bg-indigo-50 hover:scale-110 active:scale-95 transition-all">
            <i data-lucide="arrow-left" class="w-6 h-6"></i>
        </a>
    </div>
    <script src="tokkun-storage.js"></script>
    <script>
        window.TOKKUN_DRILL_CONFIG = {
            level: 48,
            pattern: 'fdafdifdufdefdojdajdijdujdejdo',
            titleKanji: 'ホームポジションからだぢづでど',
            titleSub: 'F と J を つかって すすんでね',
            backHref: 'index.html',
            hintWrong: 'つぎの キーを おしてね'
        };
    </script>
    <script type="text/babel" src="../app.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
