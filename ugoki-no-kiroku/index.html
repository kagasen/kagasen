<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#38BDF8">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="./icon.svg">
<title>うごきのきろく</title>
<style>
:root{
  --sky:#38BDF8; --sky-dark:#0EA5E9; --sky-deep:#0284C7;
  --orange:#FB923C; --orange-dark:#F97316;
  --green:#4ADE80; --green-dark:#22C55E;
  --pink:#F472B6; --purple:#A78BFA; --yellow:#FACC15;
  --bg:#F0F9FF; --card:#FFFFFF; --ink:#0F3350; --ink-soft:#5B7A94;
  --line:#DBEEFB; --shadow:0 4px 14px rgba(14,116,180,.12);
  --radius:20px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:'Hiragino Maru Gothic ProN','Hiragino Kaku Gothic ProN','BIZ UDPGothic','Yu Gothic UI','Yu Gothic',sans-serif;
  background:var(--bg); color:var(--ink); font-size:16px; line-height:1.55;
  padding-bottom:calc(76px + env(safe-area-inset-bottom));
  user-select:none; -webkit-user-select:none;
}
input,select,textarea{user-select:text; -webkit-user-select:text;}
#app{max-width:640px;margin:0 auto;padding:12px 14px 20px;}

/* ---------- header ---------- */
.topbar{display:flex;align-items:center;gap:10px;padding:6px 2px 10px;}
.topbar .logo{font-size:22px;font-weight:800;color:var(--sky-deep);letter-spacing:.02em;}
.topbar .logo span{color:var(--orange-dark);}
.back-btn{
  border:none;background:var(--card);box-shadow:var(--shadow);color:var(--sky-deep);
  border-radius:14px;min-width:48px;height:44px;font-size:17px;font-weight:700;cursor:pointer;
  display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:0 14px;
}
.page-title{font-size:20px;font-weight:800;margin:4px 0 12px;display:flex;align-items:center;gap:8px;}
.page-title .em{font-size:26px;}

/* ---------- cards ---------- */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:14px;}
.card h3{margin:0 0 10px;font-size:16px;color:var(--sky-deep);display:flex;align-items:center;gap:6px;}
.muted{color:var(--ink-soft);font-size:13px;}
.small{font-size:12px;}
.center{text-align:center;}

/* ---------- buttons ---------- */
.btn{
  border:none;border-radius:16px;font-family:inherit;font-weight:800;cursor:pointer;
  min-height:48px;font-size:16px;padding:10px 18px;color:#fff;
  background:linear-gradient(180deg,var(--sky),var(--sky-dark));
  box-shadow:0 4px 0 rgba(2,132,199,.45);transition:transform .06s;
}
.btn:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(2,132,199,.45);}
.btn.orange{background:linear-gradient(180deg,var(--orange),var(--orange-dark));box-shadow:0 4px 0 rgba(194,90,10,.4);}
.btn.orange:active{box-shadow:0 2px 0 rgba(194,90,10,.4);}
.btn.green{background:linear-gradient(180deg,var(--green),var(--green-dark));box-shadow:0 4px 0 rgba(21,128,61,.4);}
.btn.green:active{box-shadow:0 2px 0 rgba(21,128,61,.4);}
.btn.ghost{background:#EFF8FF;color:var(--sky-deep);box-shadow:inset 0 0 0 2px var(--line);}
.btn.danger{background:linear-gradient(180deg,#F87171,#EF4444);box-shadow:0 4px 0 rgba(153,27,27,.35);}
.btn.wide{width:100%;}
.btn.smallbtn{min-height:40px;font-size:14px;padding:6px 12px;border-radius:12px;}
.btn:disabled{opacity:.45;cursor:default;}

/* ---------- home ---------- */
.hero{
  background:linear-gradient(160deg,#E0F4FF 0%,#FDF6E3 100%);
  border-radius:24px;box-shadow:var(--shadow);padding:18px 16px 16px;margin-bottom:14px;
  position:relative;overflow:hidden;
}
.hero .char-wrap{display:flex;align-items:center;gap:14px;}
.hero .char-svg{width:120px;height:120px;flex:none;filter:drop-shadow(0 6px 8px rgba(14,116,180,.18));animation:bob 2.6s ease-in-out infinite;}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.hero .char-info{flex:1;min-width:0;}
.hero .char-name{font-size:19px;font-weight:800;}
.hero .char-stage{font-size:12px;color:var(--ink-soft);margin-bottom:6px;}
.lv-chip{display:inline-block;background:var(--sky-deep);color:#fff;font-weight:800;font-size:13px;border-radius:999px;padding:2px 12px;margin-right:6px;}
.xpbar{height:16px;background:#DCEFFB;border-radius:999px;overflow:hidden;margin-top:8px;box-shadow:inset 0 1px 3px rgba(0,0,0,.08);}
.xpbar .fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--green),var(--sky));transition:width .6s cubic-bezier(.22,1.2,.36,1);}
.xp-label{font-size:12px;color:var(--ink-soft);margin-top:4px;display:flex;justify-content:space-between;}
.streak-chip{
  display:inline-flex;align-items:center;gap:5px;background:#FFF3E4;color:#B45309;
  border-radius:999px;padding:4px 12px;font-weight:800;font-size:13px;margin-top:10px;
}
.kyu-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.kyu-chip{background:#fff;border-radius:999px;padding:4px 10px;font-size:12px;font-weight:700;color:var(--sky-deep);box-shadow:0 1px 4px rgba(14,116,180,.15);}

/* ---------- sport grid ---------- */
.sport-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.sport-card{
  border:none;border-radius:20px;padding:16px 10px 12px;cursor:pointer;color:#fff;
  display:flex;flex-direction:column;align-items:center;gap:6px;box-shadow:var(--shadow);
  font-family:inherit;transition:transform .08s;min-height:110px;
}
.sport-card:active{transform:scale(.96);}
.sport-card .em{font-size:38px;line-height:1;filter:drop-shadow(0 3px 3px rgba(0,0,0,.15));}
.sport-card .nm{font-weight:800;font-size:16px;}
.sport-card .sub{font-size:11px;opacity:.92;}
.sc-nawatobi{background:linear-gradient(160deg,#38BDF8,#2563EB);}
.sc-tetsubo{background:linear-gradient(160deg,#FB923C,#EA580C);}
.sc-mat{background:linear-gradient(160deg,#4ADE80,#16A34A);}
.sc-tobibako{background:linear-gradient(160deg,#F472B6,#DB2777);}
.sc-suiei{background:linear-gradient(160deg,#22D3EE,#0891B2);}
.sc-marathon{background:linear-gradient(160deg,#A78BFA,#7C3AED);}
.sc-soccer{background:linear-gradient(160deg,#34D399,#059669);}
.sc-basket{background:linear-gradient(160deg,#F59E0B,#B45309);}
.sc-volley{background:linear-gradient(160deg,#FACC15,#A16207);}
.sc-baseball{background:linear-gradient(160deg,#94A3B8,#475569);}
.sc-dodge{background:linear-gradient(160deg,#F87171,#DC2626);}
.sc-relay{background:linear-gradient(160deg,#2DD4BF,#0D9488);}

/* ---------- skill cards ---------- */
.skill-card{
  background:var(--card);border-radius:16px;box-shadow:var(--shadow);
  padding:12px 14px;margin-bottom:10px;border-left:8px solid var(--line);
}
.skill-card.done{border-left-color:var(--green-dark);background:linear-gradient(160deg,#F2FFF5,#fff);}
.skill-head{display:flex;align-items:center;gap:8px;}
.skill-name{font-weight:800;font-size:16px;flex:1;}
.skill-stars{color:var(--yellow);font-size:14px;letter-spacing:1px;text-shadow:0 1px 1px rgba(0,0,0,.12);}
.skill-kotsu{font-size:12.5px;color:var(--ink-soft);margin-top:5px;background:#F4FAFF;border-radius:10px;padding:7px 10px;}
.skill-kotsu b{color:var(--sky-deep);}
.skill-body{display:flex;gap:10px;margin-top:8px;align-items:stretch;flex-wrap:wrap;}
.skill-body .skill-kotsu{flex:1 1 150px;margin-top:0;}
.skill-art{flex:none;width:108px;min-height:84px;background:#F0FAFF;border:2px solid #E3F3FC;border-radius:12px;display:flex;align-items:center;}
.skill-art svg{width:100%;height:auto;display:block;}
.done-badge{background:var(--green-dark);color:#fff;font-size:12px;font-weight:800;border-radius:999px;padding:2px 10px;flex:none;}
.best-chip{background:#E8F6FF;color:var(--sky-deep);font-size:12px;font-weight:800;border-radius:999px;padding:2px 10px;flex:none;}
.kyu-mini{background:var(--orange);color:#fff;font-size:11px;font-weight:800;border-radius:999px;padding:2px 8px;flex:none;}
.check-big{
  width:46px;height:46px;border-radius:14px;border:3px dashed #BFE3F7;background:#F4FBFF;flex:none;
  display:flex;align-items:center;justify-content:center;font-size:24px;cursor:pointer;transition:all .15s;
}
.check-big.on{border:3px solid var(--green-dark);background:var(--green);color:#fff;}

/* count stepper */
.count-row{display:flex;align-items:center;gap:8px;margin-top:10px;}
.count-row input[type=number]{
  width:86px;height:48px;border-radius:14px;border:2px solid var(--line);font-size:20px;font-weight:800;
  text-align:center;font-family:inherit;color:var(--ink);background:#FBFEFF;
}
.step-btn{
  width:48px;height:48px;border-radius:14px;border:none;background:#E8F6FF;color:var(--sky-deep);
  font-size:22px;font-weight:800;cursor:pointer;flex:none;
}
.step-btn:active{background:#D3EDFC;}

/* dan buttons (tobibako) */
.dan-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.dan-btn{
  min-width:48px;height:44px;border-radius:12px;border:2px solid var(--line);background:#FBFEFF;
  font-family:inherit;font-weight:800;font-size:14px;color:var(--ink-soft);cursor:pointer;
}
.dan-btn.reached{background:linear-gradient(180deg,var(--pink),#DB2777);border-color:#DB2777;color:#fff;}
.dan-btn.max{outline:3px solid var(--yellow);}

/* ---------- forms ---------- */
.form-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px;}
.form-row label{font-size:13px;font-weight:700;color:var(--ink-soft);min-width:64px;}
input[type=date],input[type=text],select{
  height:48px;border-radius:14px;border:2px solid var(--line);font-size:16px;font-family:inherit;
  padding:0 12px;color:var(--ink);background:#FBFEFF;
}
.quick-chip{
  border:none;background:#E8F6FF;color:var(--sky-deep);font-weight:800;font-size:13px;
  border-radius:999px;padding:8px 14px;cursor:pointer;font-family:inherit;
}
.quick-chip:active{background:#D3EDFC;}

/* ---------- progress bar ---------- */
.goalbar{height:20px;background:#E4F2FC;border-radius:999px;overflow:hidden;box-shadow:inset 0 1px 3px rgba(0,0,0,.07);}
.goalbar .fill{height:100%;background:linear-gradient(90deg,var(--orange),var(--yellow));border-radius:999px;transition:width .6s;}

/* ---------- timeline ---------- */
.tl-date{font-weight:800;color:var(--sky-deep);margin:16px 0 6px;font-size:14px;display:flex;align-items:center;gap:6px;}
.tl-item{
  background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:10px 14px;margin-bottom:8px;
  display:flex;align-items:center;gap:10px;font-size:14px;
}
.tl-item .em{font-size:22px;flex:none;}
.tl-item .xp{margin-left:auto;color:var(--green-dark);font-weight:800;font-size:13px;flex:none;}

/* ---------- badges ---------- */
.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px;}
.badge-cell{
  background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:12px 6px 10px;text-align:center;
}
.badge-cell .em{font-size:34px;display:block;}
.badge-cell .nm{font-size:11.5px;font-weight:800;margin-top:4px;line-height:1.3;}
.badge-cell .cond{font-size:10px;color:var(--ink-soft);margin-top:2px;line-height:1.3;}
.badge-cell.locked{opacity:.85;}
.badge-cell.locked .em{filter:grayscale(1);opacity:.45;}
.badge-cell.locked .nm{color:#9DB4C6;}
.badge-cell.got{background:linear-gradient(160deg,#FFFBEB,#fff);outline:2px solid #FDE68A;}

/* stat grid */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.stat-box{background:var(--card);border-radius:16px;box-shadow:var(--shadow);padding:12px;text-align:center;}
.stat-box .val{font-size:24px;font-weight:800;color:var(--sky-deep);}
.stat-box .lbl{font-size:11.5px;color:var(--ink-soft);}

/* ---------- bottom nav ---------- */
.nav{
  position:fixed;left:0;right:0;bottom:0;z-index:50;
  background:rgba(255,255,255,.94);backdrop-filter:blur(8px);
  border-top:1px solid var(--line);
  display:flex;justify-content:space-around;
  padding:6px 4px calc(6px + env(safe-area-inset-bottom));
}
.nav button{
  border:none;background:none;font-family:inherit;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:1px;
  font-size:10.5px;font-weight:800;color:#9DB4C6;min-width:56px;padding:4px 2px;border-radius:12px;
}
.nav button .em{font-size:22px;line-height:1.2;filter:grayscale(1);opacity:.6;}
.nav button.active{color:var(--sky-deep);background:#EAF6FF;}
.nav button.active .em{filter:none;opacity:1;}

/* ---------- modal ---------- */
.modal-overlay{
  position:fixed;inset:0;background:rgba(8,47,73,.55);z-index:100;
  display:flex;align-items:center;justify-content:center;padding:20px;
  animation:fadein .25s;
}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.modal-box{
  background:#fff;border-radius:26px;padding:26px 22px;max-width:340px;width:100%;text-align:center;
  animation:zoomin .45s cubic-bezier(.18,1.5,.4,1);position:relative;max-height:85vh;overflow-y:auto;
}
@keyframes zoomin{from{transform:scale(.3);opacity:0}to{transform:scale(1);opacity:1}}
.modal-box .big-em{font-size:76px;line-height:1.1;display:block;animation:pop .6s cubic-bezier(.18,2,.4,1) .15s backwards;}
@keyframes pop{from{transform:scale(0) rotate(-30deg)}to{transform:scale(1) rotate(0)}}
.modal-box h2{margin:8px 0 4px;font-size:21px;color:var(--orange-dark);}
.modal-box p{margin:4px 0 14px;color:var(--ink-soft);font-size:14px;}
.getxp{display:inline-block;background:#ECFDF3;color:var(--green-dark);font-weight:800;border-radius:999px;padding:4px 14px;font-size:14px;margin-bottom:12px;}

/* toast */
#toast{
  position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;font-weight:700;font-size:14px;border-radius:999px;
  padding:10px 20px;opacity:0;transition:all .3s;z-index:90;pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:.95;transform:translateX(-50%) translateY(0);}

/* confetti canvas */
#confetti{position:fixed;inset:0;z-index:110;pointer-events:none;}

/* chart */
.chart-wrap{overflow-x:auto;}
.bench-msg{
  background:linear-gradient(160deg,#FFF9E6,#FFF);border:2px dashed var(--yellow);
  border-radius:14px;padding:10px 12px;font-size:13.5px;font-weight:700;color:#92600A;margin-top:10px;
}
.rec-list{margin:0;padding:0;list-style:none;}
.rec-list li{display:flex;gap:8px;align-items:center;padding:8px 2px;border-bottom:1px dashed var(--line);font-size:14px;}
.rec-list li .d{color:var(--ink-soft);font-size:12px;min-width:74px;}
.rec-list li .v{font-weight:800;}
.del-x{margin-left:auto;border:none;background:#FEF2F2;color:#DC2626;border-radius:10px;width:34px;height:34px;font-size:15px;cursor:pointer;flex:none;}

.section-tabs{display:flex;gap:8px;margin-bottom:12px;}
.section-tabs button{
  flex:1;border:none;border-radius:14px;min-height:44px;font-family:inherit;font-weight:800;font-size:14px;
  background:#E8F6FF;color:var(--sky-deep);cursor:pointer;
}
.section-tabs button.active{background:var(--sky-dark);color:#fff;}

@media (min-width:520px){
  .sport-grid{grid-template-columns:repeat(3,1fr);}
}
</style>
</head>
<body>
<div id="app"></div>
<nav class="nav" id="nav"></nav>
<div id="toast"></div>
<div id="modal-root"></div>
<canvas id="confetti"></canvas>
<script src="backup-kit.js?v=2"></script>
<script>
'use strict';
/* ============================================================
   うごきのきろく — 小学生向け 運動チャレンジ＆成長ログ
   完全オフライン(localStorage) / PWA
   検定・級のデータは栃木県「みんなが使えるチャレンジカード集」
   (鉄棒検定カード・なわとびチャレンジカード・水泳がんばりカード)を参考
   ============================================================ */

/* ---------------- 種目データ ---------------- */
const SPORTS = {
  nawatobi:{ name:'なわとび', em:'🪢', cls:'sc-nawatobi', sub:'わざ19こ＋30びょうチャレンジ' },
  tetsubo:{ name:'てつぼう', em:'🤾', cls:'sc-tetsubo', sub:'けんてい20わざ' },
  mat:{ name:'マットうんどう', em:'🤸', cls:'sc-mat', sub:'わざ10こ' },
  tobibako:{ name:'とびばこ', em:'🦘', cls:'sc-tobibako', sub:'わざ×なんだん？' },
  suiei:{ name:'すいえい', em:'🏊', cls:'sc-suiei', sub:'けんてい22だんかい' },
  marathon:{ name:'マラソン', em:'🏃', cls:'sc-marathon', sub:'きょり・タイム' },
  soccer:{ name:'サッカー', em:'⚽', cls:'sc-soccer', sub:'チャレンジ7こ' },
  basket:{ name:'バスケットボール', em:'🏀', cls:'sc-basket', sub:'チャレンジ7こ' },
  volley:{ name:'バレーボール', em:'🏐', cls:'sc-volley', sub:'チャレンジ7こ' },
  baseball:{ name:'やきゅう', em:'⚾', cls:'sc-baseball', sub:'チャレンジ7こ' },
  dodge:{ name:'ドッジボール', em:'🤾', cls:'sc-dodge', sub:'チャレンジ7こ' },
  relay:{ name:'リレー・かけっこ', em:'🏁', cls:'sc-relay', sub:'チャレンジ7こ' },
};

/* なわとび: 級ひょう(かいすう→級) 0=特級 0.5=準特級 */
const NAWATOBI_SKILLS = [
  { id:'n1',  name:'1かいせん2ちょうやく', kotsu:'なわが1しゅうするあいだに2かいジャンプ。ゆっくりリズムよく！', lv:[[10,5],[9,10]] },
  { id:'n2',  name:'まえとび', kotsu:'ひじをわきにつけて、手くびで小さくまわそう。目せんはまっすぐ前！', lv:[[9,5],[8,10],[7,20],[6,30],[5,40],[4,50]] },
  { id:'n3',  name:'うしろとび', kotsu:'なわを後ろへ。かかとの後ろをなわが通るのをかんじよう。', lv:[[8,5],[7,10],[6,15],[5,20],[4,30],[3,40]] },
  { id:'n4',  name:'かけあしとび', kotsu:'その場でかけあしをしながらとぶよ。1・2・1・2のリズム！', lv:[[8,5],[7,10],[6,15],[5,20]] },
  { id:'n5',  name:'グーチョキとび', kotsu:'グー(そろえる)→チョキ(まえうしろ)と足をかえながらとぼう。', lv:[[8,4],[7,8],[6,10],[5,20]] },
  { id:'n6',  name:'グーパーとび', kotsu:'グー(とじる)→パー(ひらく)！足のかたちを声に出すとやりやすいよ。', lv:[[8,4],[7,8],[6,10],[5,20]] },
  { id:'n7',  name:'よこステップとび', kotsu:'とぶたびに左右へちょっとずつステップ。スキーみたいに！', lv:[[7,5],[6,10],[5,15],[4,20]] },
  { id:'n8',  name:'まえふりとび', kotsu:'足を前にふり出しながらとぶよ。バランスをくずさないでね。', lv:[[7,4],[6,8],[5,10],[4,20]] },
  { id:'n9',  name:'あやとび', kotsu:'うでを大きくクロス！むねの前でしっかりバッテンを作ろう。', lv:[[6,3],[5,5],[4,10],[3,15]] },
  { id:'n10', name:'こうさとび', kotsu:'うでをクロスしたままとびつづける。ひじをおへその前でキープ！', lv:[[6,3],[5,5],[4,10],[3,15]] },
  { id:'n11', name:'うしろあやとび', kotsu:'うしろまわしでバッテン！まずはうしろとびをかんぺきに。', lv:[[5,3],[4,5],[3,10],[2,15]] },
  { id:'n12', name:'うしろこうさとび', kotsu:'うしろまわしのままクロスをキープ。手くびのちからで回そう。', lv:[[5,3],[4,5],[3,10],[2,15]] },
  { id:'n13', name:'にじゅうとび', kotsu:'高くとんで、1かいのジャンプでなわを2かい回す！30びょうで70かい回せたらできるはず！', lv:[[4,3],[3,5],[2,10],[1,20],[0.5,50],[0,100]] },

const INK='#1E3A5F', SKIN='#FFD9B0', SHIRT='#F43F5E', ARW='#F97316';
/* あたま(かみの毛つき)。rotでかみの向きを回せる(さかさま=180) */
function aHead(x,y,rot){
  return `<g transform="translate(${x},${y})${rot?` rotate(${rot})`:''}">
    <circle r="6.8" fill="${SKIN}" stroke="${INK}" stroke-width="2.2"/>
    <path d="M-6,-2.8 A6.8,6.8 0 0 1 6,-2.8" fill="none" stroke="${INK}" stroke-width="4.2" stroke-linecap="round"/>
  </g>`;
}
function aTorso(pts){ return `<polyline points="${pts}" fill="none" stroke="${SHIRT}" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>`; }
function aLimb(pts){ return `<polyline points="${pts}" fill="none" stroke="${INK}" stroke-width="3.8" stroke-linecap="round" stroke-linejoin="round"/>`; }
function aLn(pts,w){ return `<polyline points="${pts}" fill="none" stroke="${INK}" stroke-width="${w||4}" stroke-linecap="round" stroke-linejoin="round"/>`; }
function aArr(d){ return `<path d="${d}" fill="none" stroke="${ARW}" stroke-width="3.5" stroke-linecap="round"/>`; }
function aTip(x,y,ang){ return `<polygon points="0,-5.5 11,0 0,5.5" transform="translate(${x},${y}) rotate(${ang})" fill="${ARW}"/>`; }
function aSpin(cx,cy,r,back){
  return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${ARW}" stroke-width="3" stroke-dasharray="5 6" opacity=".9"/>`+aTip(cx+r,cy,back?-90:90);
}
function aBar(){

  <line x1="90" y1="87" x2="106" y2="87" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>

function aBall(x,y,type){
  const r = type==='base'?4.5 : type==='dodge'?7 : 6.5;
  let fill='#fff', line=INK;
  if(type==='basket'){ fill='#F59E0B'; line='#7C2D12'; }
  if(type==='dodge'){ fill='#F87171'; line='#B91C1C'; }
  if(type==='volley'){ fill='#FDE68A'; line='#B45309'; }
  let s = `<circle cx="${x}" cy="${y}" r="${r}" fill="${fill}" stroke="${line}" stroke-width="2.2"/>`;
  if(type==='soccer') s += `<circle cx="${x}" cy="${y}" r="2.4" fill="${INK}"/>`;
  if(type==='basket') s += `<path d="M${x-r},${y} h${2*r} M${x},${y-r} v${2*r}" stroke="${line}" stroke-width="1.5" fill="none"/>`;
  if(type==='volley') s += `<path d="M${x-r+1},${y-2} q${r-1},4 ${2*r-2},0" stroke="${line}" stroke-width="1.5" fill="none"/>`;
  if(type==='base') s += `<path d="M${x-2.4},${y-3} q2,3 0,6 M${x+2.4},${y-3} q-2,3 0,6" stroke="#DC2626" stroke-width="1.3" fill="none"/>`;
  return s;
}

  n5:{feet:'choki',label:'チョキ'}, n6:{feet:'pa',label:'パー'},

  n11:{back:1,cross:1,label:'ひらく⇄クロス'}, n12:{back:1,cross:1,label:'クロスのまま'},
  n13:{multi:2}, n14:{cross:1,multi:2}, n15:{cross:1,multi:2,label:'クロスのまま'},
  n16:{back:1,multi:2}, n17:{back:1,cross:1,multi:2}, n18:{back:1,cross:1,multi:2,label:'クロスのまま'},
  n19:{multi:3,label:'でんせつ!'},
};
function nawaArt(o){
  o = o||{};
  let s = `<ellipse cx="60" cy="71" rx="17" ry="3.2" fill="rgba(30,58,95,.12)"/>`;
  s += `<path d="M46,46 C30,86 90,86 74,46" fill="none" stroke="${ARW}" stroke-width="3"/>`;
  s += `<path d="M46,46 C30,6 90,6 74,46" fill="none" stroke="${ARW}" stroke-width="2.5" stroke-dasharray="4 5" opacity=".55"/>`;
  s += aTip(60,16,o.back?180:0);
  s += `<line x1="46" y1="42.5" x2="46" y2="49" stroke="${INK}" stroke-width="4" stroke-linecap="round"/>`;
  s += `<line x1="74" y1="42.5" x2="74" y2="49" stroke="${INK}" stroke-width="4" stroke-linecap="round"/>`;
  s += aTorso('60,33 60,48');
  if(o.cross){ s += aLimb('56,36 64,41 72,44')+aLimb('64,36 56,41 48,44'); }
  else { s += aLimb('60,37 52,42 47,45')+aLimb('60,37 68,42 73,45'); }
  const legs = {
    both:'60,48 55,57 54,66|60,48 65,57 66,66',
    run:'60,48 50,54 52,63|60,48 64,56 66,65',
    pa:'60,48 48,56 46,66|60,48 72,56 74,66',
    choki:'60,48 51,55 50,63|60,48 69,53 71,60',
    side:'60,48 67,56 69,64|60,48 73,52 76,58',
    swing:'60,48 69,54 77,52|60,48 63,57 64,66',
  }[o.feet||'both'];
  legs.split('|').forEach(l=>{ s += aLimb(l); });
  s += aHead(60,26);
  if(o.multi) s += `<circle cx="103" cy="16" r="13" fill="#FACC15"/><text x="103" y="21" text-anchor="middle" font-size="13" font-weight="800" fill="#7C2D12">×${o.multi}</text>`;
  if(o.label) s += aLabel(o.label);
  return s;
}

function skillArt(sport, id){
  let inner = '';
  if(sport==='nawatobi') inner = nawaArt(NAWA_ART[id]);
  else if(sport==='tetsubo') inner = aBar()+(TETSU_ART[id]?TETSU_ART[id]():'');
  else if(sport==='mat') inner = aMat()+(MAT_ART[id]?MAT_ART[id]():'');
  else if(sport==='tobibako') inner = (TOBI_ART[id]?TOBI_ART[id]():'');
  else if(sport==='suiei') inner = (SUIEI_ART[id]?SUIEI_ART[id]():'');
  else if(BALL_SPORTS[sport]){
    const sk = BALL_SPORTS[sport].skills.find(k=>k.id===id);
    inner = (sk && sk.art) ? sk.art() : '';
  }
  if(!inner) return '';
  return `<div class="skill-art"><svg viewBox="0 0 120 92" xmlns="http://www.w3.org/2000/svg">${inner}</svg></div>`;
}

function uniqueDays(s){ return new Set(s.records.map(r=>r.date)).size; }
function swimTotal(s){ return s.suiei.log.reduce((a,l)=>a+l.m,0); }
function lvl(s){ return levelInfo(s.profile.totalXp).level; }
function tridaySports(s){
  const m = {};
  for(const r of s.records){ (m[r.date]||(m[r.date]=new Set())).add(r.sport); }
  for(const k in m){ if(m[k].size>=3) return true; }
  return false;
}

/* ボールしゅもく: ぜんチャレンジたっせい判定 */
function ballAll(s, sport){
  return BALL_SPORTS[sport].skills.every(k=>
    k.type==='check' ? s[sport].done.includes(k.id) : (s[sport].best[k.id]||0)>0
  );
}

const LS_KEY = 'ugokiNoKiroku_v1';
function defaultState(){
  return {
    profile:{ name:'', grade:0, charName:'ぴよ', totalXp:0 },
    records:[],                                  // {id, sport, date, label, xp}
    nawatobi:{ best:{}, speed:[] },              // best: skillId->回数 / speed: {date,mae,ushiro}
    tetsubo:{ done:[] },

    marathon:{ log:[] },                         // {date, m, sec|null}
    soccer:{ best:{}, done:[] },                 // ボールしゅもく: best=カウント自己ベスト / done=できたチェック
    basket:{ best:{}, done:[] },
    volley:{ best:{}, done:[] },
    baseball:{ best:{}, done:[] },
    dodge:{ best:{}, done:[] },
    relay:{ best:{}, done:[] },
    badges:[],
    streak:{ last:'', count:0, best:0 },
  };
}
let S = load();
function load(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return defaultState();
    const d = defaultState(), s = JSON.parse(raw);
    // ふるいデータにあたらしいキーをおぎなう
    for(const k of Object.keys(d)) if(s[k]===undefined) s[k]=d[k];
    // 旧すいえい12だんかい(s10〜sS2)のごうかくを、22だんかい版(sw〜)へひきつぐ
    const mig = { s10:['sw14'], s9:['sw16','sw15'], s8:['sw11','sw10'], s7:['sw9'], s6:['sw8'],
                  s5:['sw7'], s4:['sw6'], s3:['sw5'], s2:['sw4'], s1:['sw3'], sS1:['sw1'], sS2:['swS2'] };
    const remap = a=>{ const out=[]; (a||[]).forEach(id=>{ if(mig[id]) out.push(...mig[id]); else out.push(id); }); return [...new Set(out)]; };
    if(s.suiei && s.suiei.kyu.some(id=>mig[id])) s.suiei.kyu = remap(s.suiei.kyu);
    if(s.ever_suiei && s.ever_suiei.some(id=>mig[id])) s.ever_suiei = remap(s.ever_suiei);
    return s;
  }catch(e){ return defaultState(); }
}
function save(){ localStorage.setItem(LS_KEY, JSON.stringify(S)); }

function todayStr(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function fmtDate(iso){
  const [y,m,d] = iso.split('-');
  return Number(m)+'月'+Number(d)+'日';
}

/* ---------------- レベル計算 ---------------- */
function levelInfo(xp){
  let level=1, acc=0, need=100;
  while(xp >= acc+need){ acc+=need; level++; need = 100+(level-1)*25; }
  return { level, cur:xp-acc, need };
}

/* ---------------- 級の計算 ---------------- */
function rankLabel(k){ return k===0?'とっきゅう':(k===0.5?'じゅんとっきゅう':k+'きゅう'); }
/* なわとび: 各わざのベスト回数から とうたつ級(いちばん良いもの) */
function nawaSkillKyu(skill, count){
  if(!count) return null;
  let best = null;
  for(const [kyu,need] of skill.lv){ if(count>=need && (best===null||kyu<best)) best=kyu; }
  return best;
}
function nawaKyu(s){
  let best = null;
  for(const sk of NAWATOBI_SKILLS){
    const k = nawaSkillKyu(sk, s.nawatobi.best[sk.id]||0);
    if(k!==null && (best===null||k<best)) best=k;
  }
  return best;
}
/* てつぼう: できたわざの数 → 級 (20=特級, 2きざみ) */
function tetsuKyu(s){
  const n = s.tetsubo.done.length;
  if(n>=20) return 'とっきゅう';
  if(n<2) return '10きゅう';
  return (10-Math.floor(n/2))+'きゅう';
}
function suieiKyuLabel(s){
  let label = null;
  for(const k of SUIEI_KYU){ if(s.suiei.kyu.includes(k.id)) label = k.label; }
  return label;
}
function marathonTotal(s){ return s.marathon.log.reduce((a,r)=>a+r.m,0); }

/* ---------------- XP・きろく・バッジ判定 ---------------- */
let celebrationQueue = [];
function gainXp(n){
  const before = levelInfo(S.profile.totalXp).level;
  S.profile.totalXp += n;
  const after = levelInfo(S.profile.totalXp).level;
  if(after>before) celebrationQueue.push({type:'levelup', level:after});
}
function touchStreak(date){
  if(date!==todayStr()) return;                 // きょうのきろくだけ連続にカウント
  if(S.streak.last===date) return;
  const y = new Date(); y.setDate(y.getDate()-1);
  const yStr = y.getFullYear()+'-'+String(y.getMonth()+1).padStart(2,'0')+'-'+String(y.getDate()).padStart(2,'0');
  S.streak.count = (S.streak.last===yStr) ? S.streak.count+1 : 1;
  S.streak.last = date;
  if(S.streak.count>S.streak.best) S.streak.best = S.streak.count;
  if(S.streak.count>0 && S.streak.count%7===0){
    gainXp(XP.streak7);
    celebrationQueue.push({type:'streak', days:S.streak.count});
  }
}
/* きろくのとりけし: 該当するさいしんの1件をけして、もらったXPをもどす(レベルも自動でもどる) */
function removeRecordXp(pred){
  for(let i=S.records.length-1; i>=0; i--){
    if(pred(S.records[i])){
      S.profile.totalXp = Math.max(0, S.profile.totalXp - S.records[i].xp);
      S.records.splice(i,1);
      return true;
    }
  }
  return false;
}
/* きろく1件ついか(+10XP)。extraXp: わざ初達成やベスト更新のボーナス */
function addRecord(sport, label, extraXp, date){
  const d = date || todayStr();
  const xp = XP.record + (extraXp||0);
  S.records.push({ id:uid(), sport, date:d, label, xp });
  gainXp(xp);
  touchStreak(d);
  checkBadges();
  save();
}
function checkBadges(){
  for(const b of BADGES){
    if(S.badges.includes(b.id)) continue;
    let ok=false;
    try{ ok = b.test(S); }catch(e){ ok=false; }
    if(ok){
      S.badges.push(b.id);
      gainXp(XP.badge);
      celebrationQueue.push({type:'badge', badge:b});
      checkBadges();                            // でんせつのうんどうか の連鎖チェック
      return;
    }
  }
}

/* かんたんコンフェッティ(CDNなし・オフラインOK) */
const confCanvas = document.getElementById('confetti');
const confCtx = confCanvas.getContext('2d');
let confParts = [], confRunning = false;
function confettiBurst(){
  confCanvas.width = innerWidth; confCanvas.height = innerHeight;
  const colors = ['#38BDF8','#FB923C','#4ADE80','#F472B6','#FACC15','#A78BFA'];
  for(let i=0;i<120;i++){
    confParts.push({
      x: innerWidth/2 + (Math.random()-.5)*160,
      y: innerHeight*0.35,
      vx: (Math.random()-.5)*11,
      vy: -Math.random()*11-4,
      w: 6+Math.random()*6, h: 8+Math.random()*8,
      rot: Math.random()*Math.PI*2, vr:(Math.random()-.5)*.3,
      color: colors[i%colors.length], life: 130+Math.random()*60,
    });
  }
  if(!confRunning){ confRunning=true; confettiTick(); }
}
function confettiTick(){
  confCtx.clearRect(0,0,confCanvas.width,confCanvas.height);
  confParts = confParts.filter(p=>p.life>0 && p.y<confCanvas.height+30);
  for(const p of confParts){
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.28; p.vx*=0.99; p.rot+=p.vr; p.life--;
    confCtx.save();
    confCtx.translate(p.x,p.y); confCtx.rotate(p.rot);
    confCtx.globalAlpha = Math.min(1, p.life/40);
    confCtx.fillStyle = p.color;
    confCtx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    confCtx.restore();
  }
  if(confParts.length>0){ requestAnimationFrame(confettiTick); }
  else { confRunning=false; confCtx.clearRect(0,0,confCanvas.width,confCanvas.height); }
}

/* ---------------- SVG折れ線グラフ ---------------- */
function lineChart(series, opts){
  // series: [{color, points:[数値...]}] 同じ長さ / labels: X軸ラベル
  const o = Object.assign({w:560,h:180,pad:30}, opts||{});
  const all = series.flatMap(s=>s.points).filter(v=>v!=null);
  if(all.length===0) return '';
  const maxV = Math.max(...all, o.minMax||10);
  const n = Math.max(...series.map(s=>s.points.length));
  const iw = o.w-o.pad*2, ih = o.h-o.pad*2;
  const x = i => o.pad + (n<=1 ? iw/2 : i*(iw/(n-1)));
  const y = v => o.pad + ih - (v/maxV)*ih;
  let g = `<svg viewBox="0 0 ${o.w} ${o.h}" style="width:100%;min-width:280px" xmlns="http://www.w3.org/2000/svg">`;
  // よこ線
  for(let i=0;i<=4;i++){
    const vy = o.pad + ih*i/4;
    const vv = Math.round(maxV*(4-i)/4);
    g += `<line x1="${o.pad}" y1="${vy}" x2="${o.w-o.pad}" y2="${vy}" stroke="#E3F1FA" stroke-width="1.5"/>
          <text x="${o.pad-6}" y="${vy+4}" font-size="10" fill="#8AA8BF" text-anchor="end">${vv}</text>`;
  }
  for(const s of series){
    const pts = s.points.map((v,i)=>v==null?null:[x(i),y(v)]).filter(Boolean);
    if(pts.length>1) g += `<polyline points="${pts.map(p=>p.join(',')).join(' ')}" fill="none" stroke="${s.color}" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>`;
    for(const p of pts) g += `<circle cx="${p[0]}" cy="${p[1]}" r="5" fill="${s.color}" stroke="#fff" stroke-width="2"/>`;
  }
  if(o.labels) o.labels.forEach((lb,i)=>{ if(i<n) g += `<text x="${x(i)}" y="${o.h-8}" font-size="10" fill="#8AA8BF" text-anchor="middle">${lb}</text>`; });
  return g+'</svg>';
}

      </div>

  }).join('');

function toggleSkill(sport, id){
  const arr = S[sport].done;
  const skills = sport==='tetsubo' ? TETSUBO_SKILLS
               : sport==='mat' ? MAT_SKILLS
               : BALL_SPORTS[sport].skills;
  const sk = skills.find(s=>s.id===id);
  const everKey = 'ever_'+sport;
  if(arr.includes(id)){
    if(!confirm('「'+sk.name+'」のチェックをはずす?\n(もらったXPももどるよ)')) return;
    S[sport].done = arr.filter(x=>x!==id);
    removeRecordXp(r=>r.sport===sport && r.label===sk.name+' できた!');
    S[everKey] = (S[everKey]||[]).filter(x=>x!==id);
    save(); render();
    showToast('チェックをはずして XPをもどしたよ');
    return;
  }
  arr.push(id);
  if(!S[everKey]) S[everKey]=[];
  let extra = 0;
  if(!S[everKey].includes(id)){ S[everKey].push(id); extra = XP.firstSkill; }
  addRecord(sport, sk.name+' できた!', extra);
  showToast('🎉 '+sk.name+' たっせい! +'+(XP.record+extra)+'XP');
  render(); playCelebrations();
}

function paceStr(m, sec){
  const spk = sec/(m/1000);
  return '1kmあたり'+Math.floor(spk/60)+'ふん'+Math.round(spk%60)+'びょう';
}
function saveRun(){
  const date = document.getElementById('mr-date').value || todayStr();
  const m = parseInt(document.getElementById('mr-m').value)||0;
  if(m<=0){ showToast('きょりを入れてね'); return; }
  const min = parseInt(document.getElementById('mr-min').value)||0;
  const s = parseInt(document.getElementById('mr-sec').value)||0;
  const sec = (min*60+s)||null;
  S.marathon.log.push({id:uid(), date, m, sec});
  S.marathon.log.sort((a,b)=>a.date<b.date?-1:1);
  addRecord('marathon', m+'m はしった'+(sec?(' ('+Math.floor(sec/60)+'ふん'+(sec%60)+'びょう)'):''), 0, date);
  showToast('きろくした! +'+XP.record+'XP');
  render(); playCelebrations();
}
function delRun(id){
  const run = S.marathon.log.find(r=>r.id===id);
  if(!run) return;
  if(!confirm('このきろくをけす?\n(もらったXPももどるよ)')) return;
  S.marathon.log = S.marathon.log.filter(r=>r.id!==id);
  removeRecordXp(r=>r.sport==='marathon' && r.date===run.date && r.label.indexOf(run.m+'m ')===0);
  save(); render();
  showToast('きろくをけして XPをもどしたよ');
}

      </div>
      <div class="skill-body">${skillArt(sportId,sk.id)}
        <div class="skill-kotsu"><b>コツ:</b> ${sk.kotsu}</div>
      </div>
      <div class="count-row">
        <button class="step-btn" onclick="stepCount('${sk.id}',-1)">−</button>
        <input type="number" id="cnt-${sk.id}" min="0" max="99999" step="${sk.low?'0.1':'1'}" inputmode="decimal" placeholder="${sk.unit}">
        <button class="step-btn" onclick="stepCount('${sk.id}',1)">＋</button>
        <button class="btn green smallbtn" onclick="saveBallCount('${sportId}','${sk.id}')">きろく!</button>
      </div>
    </div>`;
  }).join('')}`;
}
function saveBallCount(sportId, id){
  const sk = BALL_SPORTS[sportId].skills.find(k=>k.id===id);
  const el = document.getElementById('cnt-'+id);
  const n = Math.round((parseFloat(el.value)||0)*10)/10;
  if(n<=0){ showToast(sk.low?'タイムを入れてね':'かずを入れてね'); return; }
  const prev = S[sportId].best[id]||0;
  let extra = 0, msg = sk.name+' '+n+sk.unit+' きろく!';
  if(prev===0){
    extra = XP.firstSkill; msg = '🎉 '+sk.name+' はじめてのきろく!';
    S[sportId].best[id] = n;
  }else if(sk.low ? n<prev : n>prev){
    extra = XP.best; msg = '🏆 じこベストこうしん! '+prev+sk.unit+'→'+n+sk.unit;
    S[sportId].best[id] = n;
  }
  addRecord(sportId, sk.name+' '+n+sk.unit, extra);
  showToast(msg+' +'+(XP.record+extra)+'XP');
  render(); playCelebrations();
}

const SPORT_VIEWS = {
  nawatobi:viewNawatobi, tetsubo:viewTetsubo, mat:viewMat,
  tobibako:viewTobibako, suiei:viewSuiei, marathon:viewMarathon,
  soccer:()=>viewBallSport('soccer'), basket:()=>viewBallSport('basket'),
  volley:()=>viewBallSport('volley'), baseball:()=>viewBallSport('baseball'),
  dodge:()=>viewBallSport('dodge'), relay:()=>viewBallSport('relay'),
};
/* ---------------- せいちょうのあしあと ---------------- */
function viewProgress(){
  const days = [...new Set(S.records.map(r=>r.date))].sort().reverse();
  const li = levelInfo(S.profile.totalXp);
  const recent = days.slice(0,14);
  return headerHtml('せいちょうのあしあと','👣')+`
  <div class="stat-grid" style="margin-bottom:14px">
    <div class="stat-box"><div class="val">${S.records.length}</div><div class="lbl">きろくしたかいすう</div></div>
    <div class="stat-box"><div class="val">${days.length}</div><div class="lbl">うんどうした日</div></div>
    <div class="stat-box"><div class="val">Lv.${li.level}</div><div class="lbl">${esc(S.profile.charName)||'ぴよ'}のレベル</div></div>
    <div class="stat-box"><div class="val">${S.badges.length}<span style="font-size:13px;color:var(--ink-soft)">/${BADGES.length}</span></div><div class="lbl">あつめたバッジ</div></div>
    <div class="stat-box"><div class="val">🔥${S.streak.best}</div><div class="lbl">さいこうれんぞく日すう</div></div>
    <div class="stat-box"><div class="val">${(marathonTotal(S)/1000).toFixed(1)}<span style="font-size:13px;color:var(--ink-soft)">km</span></div><div class="lbl">はしったきょり</div></div>
  </div>
  ${recent.length===0?`<div class="card center">
      <div style="font-size:44px">🌱</div>
      <p class="muted">まだきろくがないよ。<br>きょうのうんどうをきろくして、あしあとをのこそう!</p>
      <button class="btn wide orange" onclick="go('sports')">きろくをはじめる!</button>
    </div>`
  : recent.map(d=>{
      const recs = S.records.filter(r=>r.date===d).slice().reverse();
      return `<div class="tl-date">📅 ${fmtDate(d)}${d===todayStr()?' (きょう)':''}</div>`+
        recs.map(r=>`<div class="tl-item">
          <span class="em">${SPORTS[r.sport]?SPORTS[r.sport].em:'🏅'}</span>
          <span>${esc(r.label)}</span>
          <span class="xp">+${r.xp}XP</span></div>`).join('');
    }).join('')}
  ${days.length>14?`<div class="center muted small" style="margin-top:10px">さいきん14日ぶんをひょうじしているよ</div>`:''}`;
}

/* ---------------- バッジずかん ---------------- */
function viewBadges(){
  const got = S.badges.filter(id=>BADGES.some(b=>b.id===id)).length;
  const cats = [...new Set(BADGES.map(b=>b.cat))];
  return headerHtml('バッジずかん','🏅')+`
  <div class="card center" style="background:linear-gradient(160deg,#FFFBEB,#fff)">
    <div style="font-size:26px;font-weight:800;color:var(--orange-dark)">${got} / ${BADGES.length} こ</div>
    <div class="goalbar" style="margin-top:6px"><div class="fill" style="width:${got/BADGES.length*100}%"></div></div>
    <div class="muted small" style="margin-top:6px">${BADGES.length}こぜんぶあつめたら…でんせつのうんどうか!</div>
  </div>
  ${cats.map(c=>{
    const list = BADGES.filter(b=>b.cat===c);
    const g = list.filter(b=>S.badges.includes(b.id)).length;
    return `<div class="tl-date">🏷️ ${c} <span class="muted small" style="font-weight:700">${g} / ${list.length}</span></div>
    <div class="badge-grid" style="margin-bottom:6px">
      ${list.map(b=>{
        const on = S.badges.includes(b.id);
        return `<div class="badge-cell ${on?'got':'locked'}">
          <span class="em">${b.em}</span>
          <span class="nm">${on?b.name:'？？？'}</span>
          <span class="cond">${b.cond}</span>
        </div>`;
      }).join('')}
    </div>`;
  }).join('')}`;
}

/* ---------------- せってい ---------------- */
function viewSettings(){
  return headerHtml('せってい','⚙️')+`
  <div class="card">
    <h3>👤 きみのこと</h3>
    <div class="form-row"><label>なまえ</label>
      <input type="text" id="set-name" maxlength="12" value="${esc(S.profile.name)}" placeholder="なまえ" style="flex:1"></div>
    <div class="form-row"><label>がくねん</label>
      <select id="set-grade">
        <option value="0" ${!S.profile.grade?'selected':''}>えらぶ</option>
        ${[1,2,3,4,5,6].map(g=>`<option value="${g}" ${S.profile.grade===g?'selected':''}>${g}年生</option>`).join('')}
      </select></div>
    <div class="form-row"><label>あいぼうのなまえ</label>
      <input type="text" id="set-char" maxlength="10" value="${esc(S.profile.charName)}" placeholder="ぴよ" style="flex:1"></div>
    <button class="btn wide" onclick="saveProfile()">ほぞんする</button>
  </div>
  <div class="card">
    <h3>💾 きろくを まもる</h3>
    <button class="btn wide" onclick="BackupKit.open()" style="margin-bottom:8px">バックアップ＆ひきつぎ</button>
    <div class="muted small" style="margin-bottom:12px">きろくをファイルにのこしたり、あたらしいたんまつにひきつげるよ。おうちの人といっしょにつかってね。</div>
    <button class="btn danger wide" onclick="resetData()">ぜんぶリセットする</button>
  </div>
  <div class="card muted small">
    うごきのきろく — インターネットがなくてもつかえるよ。<br>
    けんてい・きゅうのひょうは「みんなが使えるチャレンジカード集」(栃木県教育委員会)をさんこうにしています。
  </div>`;
}
function saveProfile(){
  S.profile.name = document.getElementById('set-name').value.trim();
  S.profile.grade = parseInt(document.getElementById('set-grade').value)||0;
  S.profile.charName = document.getElementById('set-char').value.trim()||'ぴよ';
  save();
  showToast('ほぞんしたよ!');
  render();
}
/* バックアップ＆ひきつぎ（backup-kit.js 共通部品）。
   旧「データをほぞん」の封筒なしJSONも looksLike 判定で読み込める */
BackupKit.init({
  appId: 'ugoki-no-kiroku',
  appName: 'うごきのきろく',
  storageKey: LS_KEY,
  looksLike: d => !!(d && typeof d==='object' && d.profile && Array.isArray(d.records)),
  summarize(d){
    const xp = (d.profile&&d.profile.totalXp)||0;
    const last = (d.records||[]).reduce((a,r)=>(r.date&&r.date>a)?r.date:a, '');
    return [
      {label:'なまえ', value:(d.profile&&d.profile.name)||'（なし）'},
      {label:'レベル', value:'Lv.'+levelInfo(xp).level},
      {label:'XP', value:String(xp)},
      {label:'きろくのかず', value:(d.records||[]).length+'こ'},
      {label:'バッジ', value:(d.badges||[]).length+'こ'},
      {label:'さいごのきろく', value:last?fmtDate(last):'—'},
    ];
  },
});
function resetData(){
  if(!confirm('ほんとうにぜんぶけす?\nきろく・バッジ・レベルがすべてきえます!')) return;
  if(!confirm('もういちどかくにん。ほんとうにリセットする?')) return;
  localStorage.removeItem(LS_KEY);
  S = defaultState();
  showToast('リセットしたよ');
  go('home'); render();
}

/* ---------------- はじめてのセットアップ ---------------- */
function firstRunModal(){
  const root = document.getElementById('modal-root');
  root.innerHTML = `<div class="modal-overlay"><div class="modal-box">
    ${charSvg(1,100)}
    <h2>うごきのきろくへようこそ!</h2>
    <p>うんどうをきろくすると、たまごのあいぼうがそだつよ。<br>きみのなまえをおしえて!</p>
    <input type="text" id="fr-name" maxlength="12" placeholder="なまえ(あとでもOK)" style="width:100%;margin-bottom:8px">
    <input type="text" id="fr-char" maxlength="10" placeholder="あいぼうのなまえ(れい: ぴよ)" style="width:100%;margin-bottom:14px">
    <button class="btn orange wide" id="fr-go">ぼうけんスタート!</button>
  </div></div>`;
  document.getElementById('fr-go').onclick = ()=>{
    S.profile.name = document.getElementById('fr-name').value.trim();
    S.profile.charName = document.getElementById('fr-char').value.trim()||'ぴよ';
    S.profile.createdAt = todayStr();
    save();
    root.innerHTML='';
    confettiBurst();
    render();
  };
}

/* ---------------- 起動 ---------------- */
window.addEventListener('resize', ()=>{ confCanvas.width=innerWidth; confCanvas.height=innerHeight; });
render();
if(!S.profile.createdAt){
  firstRunModal();
}else{
  // アップデートであたらしいバッジがふえたとき、これまでのがんばりぶんをさかのぼってプレゼント
  checkBadges();
  save();
  render();
  playCelebrations();
}
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{ navigator.serviceWorker.register('./sw.js').catch(()=>{}); });
}
</script>
