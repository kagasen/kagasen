    <style>
        body {
            font-family: 'Zen Maru Gothic', sans-serif;
            margin: 0;
            overflow: hidden;
            /* 画面外のスクロールを防ぐ */
        }

        .font-pop {
            font-family: 'Mochiy Pop One', sans-serif;
        }

        /* 画面フラッシュ演出用 */
        .flash-error {
            background-color: rgba(248, 113, 113, 0.2) !important;
        }

        @keyframes bounce-short {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .animate-bounce-short {
            animation: bounce-short 1s ease-in-out;
        }

        /* 絵文字のアニメーション用ラッパー */
        .emoji-wrapper {
            position: absolute;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition-property: transform;
            /* width/heightを明示して当たり判定を確保 */
            width: 80px;
            height: 80px;
        }

        .emoji-wrapper:hover {
            z-index: 10;
        }

        .emoji-inner {
            text-shadow: 0 4px 6px rgba(0, 0, 0, 0.08);
            transition-property: transform;
            pointer-events: none;
            /* 内側の要素はクリックイベントをスルーし、ラッパーで受け取る */
        }
    </style>
</head>

    <!-- アプリケーションロジック -->

        let animationFrames = []; // アニメーションループ管理用

        const playingScreen = document.getElementById('playingScreen');
        const resultScreen = document.getElementById('resultScreen');
        const timerDisplay = document.getElementById('timerDisplay');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const leftCard = document.getElementById('leftCard');
        const rightCard = document.getElementById('rightCard');
        const flashOverlay = document.getElementById('flashOverlay');

            { id: 'bulb', emoji: '💡' }, { id: 'timer', emoji: '⏱️' }, { id: 'watermelon', emoji: '🍉' },

            { id: 'candy', emoji: '🍬' }, { id: 'chocolate', emoji: '🍫' }, { id: 'banana', emoji: '🍌' },
            { id: 'grapes', emoji: '🍇' }, { id: 'cherry', emoji: '🍒' }, { id: 'peach', emoji: '🍑' },
            { id: 'pineapple', emoji: '🍍' }, { id: 'tree', emoji: '🌲' }, { id: 'cactus', emoji: '🌵' },
            { id: 'tulip', emoji: '🌷' }, { id: 'mushroom', emoji: '🍄' }, { id: 'earth', emoji: '🌍' },
            { id: 'train', emoji: '🚂' }, { id: 'helicopter', emoji: '🚁' }, { id: 'sailboat', emoji: '⛵' },
            { id: 'alien', emoji: '👽' }, { id: 'robot', emoji: '🤖' }, { id: 'magnet', emoji: '🧲' },
            { id: 'ribbon', emoji: '🎀' }, { id: 'crystalball', emoji: '🔮' }

        // 難易度別の基本配置位置
        const POSITIONS = {
            4: [
                { x: 25, y: 25 }, { x: 75, y: 25 },
                { x: 25, y: 75 }, { x: 75, y: 75 }
            ],
            6: [

                { x: 25, y: 85 }, { x: 50, y: 85 }, { x: 75, y: 85 }
            ]
        };

        const ANIMATION_TYPES = [
            { name: 'float', intervalBase: 2500, intervalRand: 1000, moveRange: 30, rotRange: 45, duration: '3500ms', easing: 'ease-in-out' },
            { name: 'glide', intervalBase: 1500, intervalRand: 500, moveRange: 40, rotRange: 20, duration: '2000ms', easing: 'ease-out' },
            { name: 'spin', intervalBase: 2000, intervalRand: 1000, moveRange: 15, rotRange: 180, duration: '2500ms', easing: 'linear' },
            { name: 'dart', intervalBase: 1000, intervalRand: 500, moveRange: 50, rotRange: 40, duration: '1000ms', easing: 'ease-in-out' }
        ];

        // ユーティリティ関数
        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        function getScoreMessage(score) {
            if (score >= 5000) return "かみさまレベル！<br>きみはでんせつだ！";
            if (score >= 4000) return "でんせつレベル！<br>あともうすこし！";
            if (score >= 3000) return "せんにんレベル！<br>すばらしすぎる！";
            if (score >= 2500) return "たつじんレベル！<br>めがとってもいいね！";
            if (score >= 2000) return "めいじんレベル！<br>そのちょうしだ！";
            if (score >= 1500) return "プロレベル！<br>すごいスピード！";
            if (score >= 1000) return "エースレベル！<br>かなりはやいぞ！";
            if (score >= 700) return "ベテランレベル！<br>いいかんじ！";
            if (score >= 400) return "ちゅうきゅうしゃ！<br>もっといけるよ！";
            if (score >= 100) return "しょきゅうしゃ！<br>よくみてタッチ！";
            return "みならい！<br>つぎはがんばろう！";
        }

        function handleBackClick() {
            if (!playingScreen.classList.contains('hidden') || !resultScreen.classList.contains('hidden')) {
                clearInterval(timerInterval);
                showMenu();
            } else {
                window.location.href = '../index.html';
            }
        }

        function updatePyramid(finalScore) {
            const ranks = [
                { id: 'rank-10', min: 5000, color: 'bg-yellow-400', name: '神 (5000〜)' },
                { id: 'rank-9', min: 4000, color: 'bg-yellow-300', name: '伝説 (4000〜)' },
                { id: 'rank-8', min: 3000, color: 'bg-pink-500', name: '仙人 (3000〜)' },
                { id: 'rank-7', min: 2500, color: 'bg-pink-400', name: '達人 (2500〜)' },
                { id: 'rank-6', min: 2000, color: 'bg-red-400', name: '名人 (2000〜)' },
                { id: 'rank-5', min: 1500, color: 'bg-orange-500', name: 'プロ (1500〜)' },
                { id: 'rank-4', min: 1000, color: 'bg-orange-400', name: 'エース (1000〜)' },
                { id: 'rank-3', min: 700, color: 'bg-orange-300', name: 'ベテラン (700〜)' },
                { id: 'rank-2', min: 400, color: 'bg-green-400', name: '中級者 (400〜)' },
                { id: 'rank-1', min: 100, color: 'bg-teal-400', name: '初級者 (100〜)' },
                { id: 'rank-0', min: 0, color: 'bg-blue-400', name: '見習い (0〜)' }
            ];

            let achievedRankId = 'rank-0';
            for (let rank of ranks) {
                if (finalScore >= rank.min) {
                    achievedRankId = rank.id;
                    break;
                }
            }

            ranks.forEach(rank => {
                const el = document.getElementById(rank.id);
                el.className = el.className.replace(/bg-[a-z]+-[0-9]+|text-white|text-gray-[0-9]+|font-bold|scale-110|z-10|shadow-md/g, '').trim();

                if (rank.id === achievedRankId) {
                    el.classList.add(rank.color, 'text-white', 'font-bold', 'scale-110', 'z-10', 'shadow-md');
                    el.innerHTML = `${rank.name} 🐶`;
                } else {
                    el.classList.add('bg-gray-200', 'text-gray-500');
                    el.innerHTML = rank.name;
                }
            });
        }

        // 画面遷移
        function showMenu() {
            secretCount = 0;
            menuScreen.classList.remove('hidden');
            playingScreen.classList.add('hidden');
            playingScreen.classList.remove('flex');
            resultScreen.classList.add('hidden');
            resultScreen.classList.remove('flex');
            clearAllAnimations();
        }

        function handleSecretClick() {
            secretCount++;
            if (secretCount >= 10) {
                startGame(12); // 超むずかしいモード
            }
        }

        function showResult() {
            playingScreen.classList.add('hidden');
            playingScreen.classList.remove('flex');
            menuScreen.classList.add('hidden');
            resultScreen.classList.remove('hidden');
            resultScreen.classList.add('flex');

            document.getElementById('finalScore').textContent = currentScore;
            document.getElementById('resultMessage').innerHTML = getScoreMessage(currentScore);

            updatePyramid(currentScore);

            clearAllAnimations();
        }

        // ゲーム制御
        function startGame(level) {
            currentDifficulty = level;
            currentScore = 0;
            timeLeft = 30;
            secretCount = 0;

            updateScoreDisplay();
            updateTimerDisplay();

            menuScreen.classList.add('hidden');
            playingScreen.classList.remove('hidden');
            playingScreen.classList.add('flex');

            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    showResult();
                }
            }, 1000);

            generateRound();
        }

        function generateRound() {
            clearAllAnimations();

            const emojiCount = currentDifficulty;
            const requiredEmojis = emojiCount * 2 - 1;

            const selectedEmojis = shuffleArray(EMOJI_DATA).slice(0, requiredEmojis);
            const matchEmoji = selectedEmojis[0];
            currentMatchId = matchEmoji.id;

            const leftUniqueEmojis = selectedEmojis.slice(1, emojiCount);
            const rightUniqueEmojis = selectedEmojis.slice(emojiCount, requiredEmojis);

            const leftCardEmojis = shuffleArray([matchEmoji, ...leftUniqueEmojis]);
            const rightCardEmojis = shuffleArray([matchEmoji, ...rightUniqueEmojis]);

            renderCard(leftCard, leftCardEmojis, emojiCount);
            renderCard(rightCard, rightCardEmojis, emojiCount);
        }

        function updateScoreDisplay() {
            scoreDisplay.textContent = currentScore;
        }

        function updateTimerDisplay() {
            timerDisplay.textContent = timeLeft;
            if (timeLeft <= 5 && timeLeft > 0) {
                timerDisplay.classList.add('text-rose-500', 'animate-pulse');
                timerDisplay.classList.remove('text-slate-700');
            } else {
                timerDisplay.classList.remove('text-rose-500', 'animate-pulse');
                timerDisplay.classList.add('text-slate-700');
            }
            if (timeLeft === 0) {
                timerDisplay.classList.remove('animate-pulse');
            }
        }

        // 絵文字描画とアニメーション
        function renderCard(cardContainer, emojisArray, count) {
            cardContainer.innerHTML = '';
            const positions = shuffleArray(POSITIONS[count]);

            emojisArray.forEach((data, index) => {
                const jitterX = (Math.random() - 0.5) * 10;
                const jitterY = (Math.random() - 0.5) * 10;
                const animType = ANIMATION_TYPES[Math.floor(Math.random() * ANIMATION_TYPES.length)];

                const baseX = positions[index].x + jitterX;
                const baseY = positions[index].y + jitterY;
                const scale = 0.5 + Math.random() * 1.0;
                const baseRotation = Math.random() * 360;

                // ラッパー要素（位置固定、イベント受け取り用）
                const wrapper = document.createElement('div');
                wrapper.className = 'emoji-wrapper';
                wrapper.style.left = `calc(${baseX}% - 40px)`; // width 80px の半分を引く
                wrapper.style.top = `calc(${baseY}% - 40px)`;

                // クリック判定
                wrapper.onclick = () => handleEmojiClick(data.id);

                // 内側の動く要素
                const inner = document.createElement('div');
                inner.className = 'emoji-inner';
                inner.textContent = data.emoji;
                inner.style.fontSize = `${scale * 3.5}rem`;
                inner.style.transitionDuration = animType.duration;
                inner.style.transitionTimingFunction = animType.easing;

                wrapper.appendChild(inner);
                cardContainer.appendChild(wrapper);

                // アニメーションのセットアップ
                setupAnimation(inner, baseRotation, animType);
            });
        }

        function setupAnimation(element, baseRot, animType) {
            const move = () => {
                // DOMツリーに存在しない場合は停止
                if (!document.body.contains(element)) return;

                const dx = (Math.random() - 0.5) * animType.moveRange;
                const dy = (Math.random() - 0.5) * animType.moveRange;
                const dr = baseRot + (Math.random() - 0.5) * animType.rotRange;

                element.style.transform = `translate(${dx}px, ${dy}px) rotate(${dr}deg)`;

                const nextTime = animType.intervalBase + Math.random() * animType.intervalRand;
                const timeoutId = setTimeout(move, nextTime);
                animationFrames.push(timeoutId);
            };

            // 初回の即時実行とループ開始
            requestAnimationFrame(() => {
                element.style.transform = `translate(0px, 0px) rotate(${baseRot}deg)`;
                setTimeout(move, 100); // 初期配置から少し待ってから動き出す
            });
        }

        function clearAllAnimations() {
            animationFrames.forEach(id => clearTimeout(id));
            animationFrames = [];
        }

        function handleEmojiClick(id) {
            if (playingScreen.classList.contains('hidden')) return;

            if (id === currentMatchId) {
                // 正解
                currentScore += 100;
                updateScoreDisplay();
                generateRound();
            } else {
                // 不正解
                currentScore = Math.max(0, currentScore - 100);
                updateScoreDisplay();

                // フラッシュ赤
                flashOverlay.classList.add('flash-error');
                setTimeout(() => {
                    flashOverlay.classList.remove('flash-error');
                }, 300);
            }
        }

        // 初期表示
        showMenu();

    </script>
</body>
