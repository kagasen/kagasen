<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作家の時間 - ひみつの物語づくり</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Noto+Serif+JP:wght@400;700&family=Zen+Maru+Gothic:wght@400;700;900&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'pop': ['"Mochiy Pop One"', 'sans-serif'],
                        'maru': ['"Zen Maru Gothic"', 'sans-serif'],
                        'serif-jp': ['"Noto Serif JP"', 'serif'],
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic ProN', sans-serif;
            background-color: #fef3c7;
            /* Tailwind amber-50 */
            margin: 0;
            padding: 0;
        }

        /* 印刷時用スタイル */
        @media print {
            body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                background-color: white;
            }

            .no-print {
                display: none !important;
            }

            .print-page {
                page-break-after: always;
                padding: 2cm;
            }

            .print-area {
                box-shadow: none !important;
            }
        }

        /* 縦書き・横書き・白紙の用紙スタイル */
        .writing-vertical-rl {
            writing-mode: vertical-rl;
            text-orientation: upright;
        }

        .paper-horizontal {
            line-height: 2.2rem;
            background-image: linear-gradient(transparent calc(2.2rem - 1px), #cbd5e1 calc(2.2rem - 1px), #cbd5e1 2.2rem);
            background-size: 100% 2.2rem;
            padding-top: 0.2rem;
            font-size: 1.1rem;
        }

        .paper-vertical {
            writing-mode: vertical-rl;
            line-height: 2.5rem;
            background-image: linear-gradient(90deg, transparent calc(2.5rem - 1px), #cbd5e1 calc(2.5rem - 1px), #cbd5e1 2.5rem);
            background-size: 2.5rem 100%;
            padding-right: 0.5rem;
            font-family: 'Noto Serif JP', serif;
            font-size: 1.2rem;
        }

        .paper-blank {
            background-color: white;
            padding: 1.5rem;
            font-size: 1.1rem;
            line-height: 1.8;
        }
    </style>
</head>

<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Lucideアイコンを安全に描画するためのヘルパーコンポーネント
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);

            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = '';
                    const iconNode = window.lucide.createIcons({
                        icons: { [name]: window.lucide.icons[name] },
                        attrs: {
                            class: className,
                            width: size,
                            height: size,
                        },
                        nameAttr: 'data-lucide',
                    });
                    if (window.lucide.icons[name]) {
                        const svgString = `<i data-lucide="${name}" class="${className}" style="width:${size}px; height:${size}px;"></i>`;
                        iconRef.current.innerHTML = svgString;
                        lucide.createIcons();
                    }
                }
            }, [name, size, className]);

            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        // --- Constants & Data ---
        const DAILY_TIPS = [
            "【五感をつかおう】 目で見えたもの、聞こえた音、においなどを書いてみよう！",
            "【さいしょの1行】 読者が「えっ！」とおどろくような、はじまり方を考えてみよう。",
            "【キャラクターのひみつ】 主人公の一番の「弱点」はなんだろう？",
            "【タイトルのコツ】 なかみが気になって、つい読みたくなる題名をつけよう。",
            "【おとぎ話のルール】 「昔々あるところに…」ちがう言葉ではじめてみるとどうなる？"
        ];

        const PAPER_TYPES = [
            { id: 'horizontal', name: '横罫（よこ）ノート', styleClass: 'paper-horizontal' },
            { id: 'vertical', name: '縦罫（たて）ノート', styleClass: 'paper-vertical' },
            { id: 'blank', name: '白紙（はくし）', styleClass: 'paper-blank' },
        ];

        const COVER_COLORS = [
            { id: 'amber', class: 'bg-amber-600', name: 'オレンジ' },
            { id: 'blue', class: 'bg-blue-600', name: 'ブルー' },
            { id: 'green', class: 'bg-emerald-600', name: 'グリーン' },
            { id: 'red', class: 'bg-rose-600', name: 'レッド' },
            { id: 'purple', class: 'bg-purple-600', name: 'パープル' },
        ];

        // 小学1・2年生でも書けるヒント付きガイド
        const GUIDE_QUESTIONS = [
            {
                id: 'who',
                part: 'はじめ',
                title: '【はじめ】お話の主役（しゅじんこう）はだれ？',
                hint: 'どんな子？ ボタンをおしてヒントをもらおう！',
                choices: ['元気いっぱいの子', 'こわがりで泣き虫な子', 'ふしぎなまほう使い', 'しゃべるどうぶつ'],
                placeholder: '例：空をとべるペンギンの「ペンタ」。',
                icon: 'users',
                color: 'bg-blue-100 text-blue-800 border-blue-200',
                btnColor: 'bg-blue-200 hover:bg-blue-300 text-blue-800'
            },
            {
                id: 'where',
                part: 'はじめ',
                title: '【はじめ】どこで、なにをしているところ？',
                hint: 'どこから お話がスタートするかな？',
                choices: ['未来のまちで遊んでいる', 'おばけの森で迷子になっている', '雲のうえでお昼寝している', '学校で勉強している'],
                placeholder: '例：雲の上にあるフワフワ島で、お昼寝している。',
                icon: 'map',
                color: 'bg-emerald-100 text-emerald-800 border-emerald-200',
                btnColor: 'bg-emerald-200 hover:bg-emerald-300 text-emerald-800'
            },
            {
                id: 'what',
                part: '中',
                title: '【中】どんな びっくりすること（大事件）がおきる？',
                hint: '主役が こまってしまうことはなんだろう？',
                choices: ['大切な宝物がぬすまれた！', 'ともだちが迷子になった！', 'まちが魔法でこおってしまった！', 'UFOが落ちてきた！'],
                placeholder: '例：大切な「魔法の石」が、カラスにぬすまれてしまった！',
                icon: 'alert-circle',
                color: 'bg-red-100 text-red-800 border-red-200',
                btnColor: 'bg-red-200 hover:bg-red-300 text-red-800'
            },
            {
                id: 'how',
                part: '中',
                title: '【中】どうやって がんばる？（かいけつ）',
                hint: 'だれかが助けてくれる？ 勇気をだす？',
                choices: ['なかまと協力してたちむかう', 'ひみつのアイテムを使う', 'ニガテなことにちょうせんする', 'とんちをきかせてやっつける'],
                placeholder: '例：ニガテな空をとんで追いかけ、友だちと協力して取りかえす。',
                icon: 'target',
                color: 'bg-amber-100 text-amber-800 border-amber-200',
                btnColor: 'bg-amber-200 hover:bg-amber-300 text-amber-800'
            },
            {
                id: 'end',
                part: '終わり',
                title: '【終わり】さいごは どうなった？',
                hint: '事件がおわって、どんな気持ちになったかな？',
                placeholder: '例：石を取りもどして、空をとぶのが少し好きになった。',
                choices: ['みんなで笑いあっておわる', '次のぼうけんへ旅立つ', '少しだけ大人に成長する', '安心してお家へ帰る'],
                icon: 'flag',
                color: 'bg-purple-100 text-purple-800 border-purple-200',
                btnColor: 'bg-purple-200 hover:bg-purple-300 text-purple-800'
            }
        ];

        // ふりかえり（推敲）チェックリスト
        const REVISION_CHECKS = [
            { id: 'check0', text: '名前（作者名）は書いた？' },
            { id: 'check1', text: '題名（タイトル）はつけた？' },
            { id: 'check2', text: '「。」や「、」は正しく使えている？' },
            { id: 'check3', text: 'カギカッコ「　」で、会話を入れてみた？' },
            { id: 'check4', text: '様子がわかる言葉（トコトコ、ピカピカなど）はある？' },
            { id: 'check5', text: '段落（だんらく）のはじめは、一文字あけている？' },
        ];

        const MAX_CHARS_PER_PAGE = 400;

        // --- Custom Hooks ---
        function useLocalStorage(key, initialValue) {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) {
                    console.error(error);
                    return initialValue;
                }
            });

            const setValue = (value) => {
                try {
                    const valueToStore = value instanceof Function ? value(storedValue) : value;
                    setStoredValue(valueToStore);
                    window.localStorage.setItem(key, JSON.stringify(valueToStore));
                } catch (error) {
                    console.error(error);
                }
            };
            return [storedValue, setValue];
        }

        // --- Components ---

        // ★ ホーム画面
        const HomeView = ({ setView, projects, createNewProject, setCurrentProjectId }) => (
            <div className="min-h-screen bg-amber-50 flex flex-col items-center p-6 relative overflow-hidden no-print">
                <div className="absolute top-10 left-10 text-amber-200/50"><Icon name="book" size={120} /></div>
                <div className="absolute bottom-10 right-10 text-amber-200/50"><Icon name="pen-tool" size={120} /></div>

                <div className="text-center mt-12 mb-12 z-10 w-full flex justify-between items-start px-8">
                    <a href="../index.html" className="flex items-center gap-2 text-amber-700 bg-white/60 px-4 py-2 rounded-full hover:bg-white transition font-bold shadow-sm">
                        <Icon name="arrow-left" size={20} /> ホームへもどる
                    </a>
                    <div className="flex-1 right-20 relative">
                        <h1 className="text-4xl md:text-5xl font-extrabold text-amber-900 mb-4 tracking-tight drop-shadow-sm font-pop">作家の時間</h1>
                        <p className="text-lg md:text-xl text-amber-800 font-bold bg-white/80 backdrop-blur-sm inline-block px-8 py-2 rounded-full border-2 border-amber-300 shadow-sm font-maru">
                            〜 しつもんに答えるだけで、お話ができるよ！ 〜
                        </p>
                    </div>
                </div>

                <div className="max-w-4xl w-full z-10 flex flex-col items-center font-maru">
                    {/* 新しく書く */}
                    <button
                        onClick={createNewProject}
                        className="w-full max-w-2xl bg-gradient-to-br from-amber-400 to-orange-500 text-white rounded-[2rem] p-8 shadow-xl hover:shadow-2xl transform hover:-translate-y-2 transition-all relative overflow-hidden group"
                    >
                        <div className="absolute top-0 right-0 w-32 h-32 bg-white/20 rounded-full -mr-10 -mt-10 group-hover:scale-150 transition-transform duration-500"></div>
                        <div className="relative z-10 flex flex-col items-center">
                            <div className="bg-white text-amber-500 p-4 rounded-full mb-4 shadow-inner">
                                <Icon name="sparkles" size={40} />
                            </div>
                            <h2 className="text-3xl font-black mb-3 font-pop">あたらしい物語をつくる</h2>
                            <p className="text-lg font-bold text-white/90">
                                ガイドにそって進めるだけで、キミだけの本が完成するよ！
                            </p>
                        </div>
                    </button>

                    {/* 続きから書く */}
                    {projects.length > 0 && (
                        <div className="mt-12 w-full max-w-3xl bg-white/80 backdrop-blur rounded-[2rem] p-8 shadow-lg border-2 border-amber-100">
                            <h2 className="text-2xl font-bold text-amber-900 mb-6 flex items-center font-pop">
                                <Icon name="edit-3" className="mr-3 text-amber-600" size={28} /> かいている途中のノート
                            </h2>
                            <div className="flex flex-col space-y-4">
                                {projects.slice(0, 4).map(p => (
                                    <div key={p.id} className="bg-white border-2 border-amber-100 rounded-xl p-5 hover:border-amber-400 transition-colors flex items-center justify-between group shadow-sm">
                                        <div className="flex-1 cursor-pointer overflow-hidden" onClick={() => { setCurrentProjectId(p.id); setView('editor'); }}>
                                            <h3 className="text-xl font-bold text-gray-800 truncate mb-1 group-hover:text-amber-600 transition-colors">{p.title}</h3>
                                            <p className="text-sm text-gray-500 font-bold">
                                                さいごに書いた日: {new Date(p.updatedAt).toLocaleDateString()}
                                                <span className="mx-2">|</span>
                                                {p.pages ? p.pages.length : 1} ページ
                                            </p>
                                        </div>
                                        <button
                                            onClick={() => { setCurrentProjectId(p.id); setView('editor'); }}
                                            className="ml-4 px-6 py-3 bg-amber-50 text-amber-700 font-bold rounded-xl border-2 border-amber-200 hover:bg-amber-400 hover:text-white transition-colors shrink-0 shadow-sm"
                                        >
                                            つづきを書く <Icon name="chevron-right" size={18} className="inline ml-1 -mt-1" />
                                        </button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            </div>
        );

        // ★ お話づくりガイド画面
        const GuideView = ({ project, updateProject, setView }) => {
            const [currentStep, setCurrentStep] = useState(0);

            if (!project || !project.guideAnswers) return null;

            const currentQuestion = GUIDE_QUESTIONS[currentStep];
            const currentAnswer = project.guideAnswers[currentQuestion.id] || '';

            const handleNext = () => {
                if (currentStep < GUIDE_QUESTIONS.length - 1) {
                    setCurrentStep(currentStep + 1);
                } else {
                    setView('editor'); // 最後まで答えたら執筆画面へ
                }
            };

            const handlePrev = () => {
                if (currentStep > 0) {
                    setCurrentStep(currentStep - 1);
                }
            };

            const handleAnswerChange = (e) => {
                updateProject({
                    guideAnswers: {
                        ...project.guideAnswers,
                        [currentQuestion.id]: e.target.value
                    }
                });
            };

            const appendHint = (hintText) => {
                const newText = currentAnswer ? currentAnswer + '。' + hintText : hintText;
                updateProject({
                    guideAnswers: {
                        ...project.guideAnswers,
                        [currentQuestion.id]: newText
                    }
                });
            };

            return (
                <div className="min-h-screen bg-amber-50 flex flex-col items-center justify-center p-6 no-print font-maru">

                    {/* プログレスバー */}
                    <div className="w-full max-w-3xl mb-8">
                        <div className="flex justify-between items-end mb-2">
                            <button onClick={() => setView('home')} className="text-amber-700 hover:text-amber-900 bg-amber-100 px-4 py-2 rounded-full flex items-center font-bold text-sm border-2 border-amber-200">
                                <Icon name="x" size={16} className="mr-1" /> やめる
                            </button>
                            <div className="text-amber-800 font-bold text-lg">
                                ステップ {currentStep + 1} / {GUIDE_QUESTIONS.length}
                            </div>
                        </div>
                        <div className="w-full bg-amber-200 rounded-full h-4 shadow-inner overflow-hidden border-2 border-white">
                            <div
                                className="bg-gradient-to-r from-orange-400 to-amber-400 h-full rounded-full transition-all duration-500"
                                style={{ width: `${((currentStep + 1) / GUIDE_QUESTIONS.length) * 100}%` }}
                            ></div>
                        </div>
                    </div>

                    <div className="w-full max-w-3xl">
                        {/* 質問カード */}
                        <div className="bg-white rounded-3xl shadow-xl overflow-hidden border-4 border-white transition-all">
                            <div className={`${currentQuestion.color} p-6 pb-8 text-center flex flex-col items-center justify-center relative`}>
                                <div className="w-16 h-16 bg-white rounded-full shadow-md flex items-center justify-center mb-3 text-current">
                                    <Icon name={currentQuestion.icon} size={32} />
                                </div>
                                <span className="bg-white/60 px-4 py-1 rounded-full text-sm font-bold mb-2 shadow-sm border border-black/10">構成：{currentQuestion.part}</span>
                                <h2 className="text-2xl md:text-3xl font-black mb-1 font-pop">{currentQuestion.title}</h2>
                            </div>

                            <div className="p-6 bg-white -mt-4 rounded-t-3xl relative">

                                {/* 選択肢ボタン（ヒント） */}
                                <div className="mb-6">
                                    <p className="text-sm font-bold text-gray-500 mb-2 flex items-center"><Icon name="lightbulb" size={16} className="mr-1 text-amber-500" />ヒントボタンをおすと筆が進むよ！</p>
                                    <div className="flex flex-wrap gap-2">
                                        {currentQuestion.choices.map((choice, i) => (
                                            <button
                                                key={i}
                                                onClick={() => appendHint(choice)}
                                                className={`px-3 py-2 rounded-xl text-sm font-bold border-2 border-transparent transition-all active:scale-95 shadow-sm ${currentQuestion.btnColor}`}
                                            >
                                                + {choice}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <textarea
                                    className="w-full h-40 border-4 border-gray-100 rounded-2xl p-4 text-xl focus:outline-none focus:border-amber-300 focus:ring-0 transition-all resize-none bg-gray-50 font-bold"
                                    placeholder={currentQuestion.placeholder}
                                    value={currentAnswer}
                                    onChange={handleAnswerChange}
                                />
                            </div>
                        </div>

                        {/* ナビゲーションボタン */}
                        <div className="flex justify-between items-center mt-6">
                            <button
                                onClick={handlePrev}
                                disabled={currentStep === 0}
                                className={`flex items-center px-6 py-3 rounded-2xl font-bold text-lg transition-all border-2 border-amber-200 ${currentStep === 0 ? 'opacity-0 cursor-default' : 'bg-white text-amber-700 hover:bg-amber-100 shadow-sm'}`}
                            >
                                <Icon name="chevron-left" size={20} className="mr-2" /> まえへ
                            </button>

                            <button
                                onClick={handleNext}
                                className="flex items-center px-8 py-4 bg-gradient-to-r from-amber-500 to-orange-500 text-white rounded-full font-black text-xl shadow-lg border-2 border-white hover:scale-105 active:scale-95 transition-all font-pop"
                            >
                                {currentStep === GUIDE_QUESTIONS.length - 1 ? (
                                    <>よし、お話を書くぞ！ <Icon name="pen-tool" size={24} className="ml-2" /></>
                                ) : (
                                    <>つぎへ <Icon name="chevron-right" size={24} className="ml-2" /></>
                                )}
                            </button>
                        </div>
                    </div>
                </div>
            );
        };


        // ★ 執筆画面
        const EditorView = ({ project, updateProject, setView }) => {
            const [showRevisions, setShowRevisions] = useState(false);
            const [currentPageIndex, setCurrentPageIndex] = useState(0);

            if (!project) return null;

            const pages = project.pages || [project.content || ''];
            const guideAnswers = project.guideAnswers || { who: '', where: '', what: '', how: '', end: '' };
            const checklist = project.checklist || [];

            const handlePageContentChange = (e) => {
                const newPages = [...pages];
                newPages[currentPageIndex] = e.target.value;
                updateProject({ pages: newPages });
            };

            const handleGuideAnswerChange = (id, value) => {
                updateProject({
                    guideAnswers: {
                        ...guideAnswers,
                        [id]: value
                    }
                });
            };

            const toggleChecklist = (checkId) => {
                let newList;
                if (checklist.includes(checkId)) {
                    newList = checklist.filter(id => id !== checkId);
                } else {
                    newList = [...checklist, checkId];
                }
                updateProject({ checklist: newList });
            };

            const addNewPage = () => {
                updateProject({ pages: [...pages, ''] });
                setCurrentPageIndex(pages.length);
            };

            const generateDraft = () => {
                const currentTextStr = pages[currentPageIndex] || '';
                if (currentTextStr.trim() !== '' && !window.confirm('今書いているお話が消えてしまいますが、メモから文章を作り直してもいいですか？')) {
                    return;
                }
                const draft = `　${guideAnswers.where || 'あるところに'}、${guideAnswers.who || 'だれかが'}いました。
（主人公はどんな性格？ 何をするのが好きか、どんな見た目かをくわしく書いてみよう）

　ある日、${guideAnswers.what || 'たいへんなことがおきました'}。
（そのとき、まわりの様子はどうなった？ 主人公はどんな気持ちになったか、どんなことをつぶやいたか「　」を使って書いてみよう）

　そこで、${guideAnswers.how || 'がんばりました'}。
（どんなふうにがんばった？ 友だちや、まわりの人たちとどうやって協力したか、くわしく書いてみよう）

　${guideAnswers.end || 'そして、おわりました'}。
（さいごに、主人公はどんなことを思った？ 「また新しい冒険にいきたいな」など、最後の一文をかっこよくきめよう！）

※（）の言葉をヒントにして、どんどんお話をふくらませていこう！`;

                handlePageContentChange({ target: { value: draft } });
            };

            const removeCurrentPage = () => {
                if (pages.length <= 1) return;
                if (window.confirm('このページを消してもいいですか？')) {
                    const newPages = pages.filter((_, index) => index !== currentPageIndex);
                    updateProject({ pages: newPages });
                    setCurrentPageIndex(Math.max(0, currentPageIndex - 1));
                }
            };

            const selectedPaper = PAPER_TYPES.find(p => p.id === project.paperType) || PAPER_TYPES[0];
            const currentText = pages[currentPageIndex] || '';
            const charCount = currentText.length;
            const isOverLimit = charCount > MAX_CHARS_PER_PAGE;

            return (
                <div className="flex flex-col h-screen bg-gray-100 no-print font-maru">
                    {/* Header */}
                    <header className="bg-white border-b-4 border-amber-200 p-3 flex justify-between items-center shadow-sm z-10 shrink-0">
                        <div className="flex items-center space-x-3">
                            <button onClick={() => setView('home')} className="text-amber-700 bg-amber-100 hover:bg-amber-200 p-2 rounded-full transition-colors" title="ホームにもどる">
                                <Icon name="home" size={20} />
                            </button>
                            <input
                                type="text"
                                value={project.title}
                                onChange={(e) => updateProject({ title: e.target.value })}
                                className="text-xl md:text-2xl font-black bg-amber-50 border-2 border-amber-200 focus:outline-none focus:border-amber-400 focus:bg-white rounded-xl px-4 py-1 w-48 md:w-80 text-gray-800 font-pop transition-all"
                                placeholder="タイトルをきめる"
                            />
                        </div>

                        <div className="flex items-center space-x-2 md:space-x-4">
                            <select
                                value={project.paperType}
                                onChange={(e) => updateProject({ paperType: e.target.value })}
                                className="bg-white border-2 border-gray-200 text-gray-700 rounded-xl px-3 py-2 focus:outline-none focus:border-amber-400 font-bold shadow-sm"
                            >
                                {PAPER_TYPES.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                            </select>

                            <button
                                onClick={() => setShowRevisions(!showRevisions)}
                                className={`flex items-center space-x-1 px-4 py-2 rounded-xl font-bold transition-all shadow-sm ${showRevisions ? 'bg-blue-100 border-2 border-blue-400 text-blue-800' : 'bg-white border-2 border-gray-200 text-gray-700 hover:bg-blue-50 hover:border-blue-200'}`}
                            >
                                <Icon name="check-circle" size={18} />
                                <span className="hidden md:inline">ふりかえり</span>
                            </button>

                            <button
                                onClick={() => setView('printPreview')}
                                className="flex items-center space-x-1 bg-amber-500 text-white border-2 border-amber-600 px-4 py-2 rounded-xl font-bold shadow-sm hover:bg-amber-600 active:scale-95 transition-all text-sm md:text-base font-pop"
                            >
                                <Icon name="book" size={18} />
                                <span className="hidden md:inline">本にする！</span>
                            </button>
                        </div>
                    </header>

                    {/* Main Workspace */}
                    <div className="flex-1 flex overflow-hidden relative">

                        {/* Left Panel: ガイドの回答（お話の設計図付箋） */}
                        <div className="hidden lg:flex flex-col w-80 bg-[#f8f5ee] border-r-2 border-amber-200 shadow-inner overflow-hidden">
                            <div className="p-4 bg-amber-100 border-b border-amber-200 font-black text-amber-900 flex items-center shrink-0">
                                <Icon name="layout" size={20} className="mr-2" /> お話の設計図
                            </div>

                            <div className="flex-1 overflow-y-auto p-4 space-y-4">
                                <p className="text-sm text-gray-600 font-bold bg-white p-3 rounded-lg shadow-sm border border-gray-100 flex items-start">
                                    <Icon name="info" size={16} className="text-amber-500 mr-1 shrink-0 mt-0.5" />
                                    ここを見ながらお話を広げよう。メモはここで書き直せるよ。
                                </p>

                                <button
                                    onClick={generateDraft}
                                    className="w-full bg-gradient-to-r from-amber-400 to-amber-500 hover:from-amber-500 hover:to-orange-500 text-white font-bold p-3 rounded-xl shadow-md border-2 border-amber-600 flex items-center justify-center group transition-all"
                                    title="メモから短いお話を作ります"
                                >
                                    <Icon name="wand-2" size={20} className="mr-2 group-hover:rotate-12 transition-transform" />
                                    魔法のステッキで文章にする！
                                </button>

                                {GUIDE_QUESTIONS.map((q, index) => (
                                    <div key={q.id} className={`p-4 rounded-xl shadow-sm border-l-8 relative text-sm font-bold ${q.color} bg-white opacity-90 hover:opacity-100 transition-opacity`}>
                                        <div className="flex flex-col gap-1 mb-2 text-black/80 border-b border-black/10 pb-2">
                                            <span className="text-xs opacity-70">ステップ {index + 1} ({q.part})</span>
                                            <span className="">{q.title}</span>
                                        </div>
                                        <textarea
                                            className="w-full resize-none focus:outline-none bg-transparent min-h-[60px] text-gray-700"
                                            value={guideAnswers[q.id]}
                                            onChange={(e) => handleGuideAnswerChange(q.id, e.target.value)}
                                            placeholder="まだメモがありません。"
                                        />
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Right Panel: Writing Area */}
                        <div className="flex-1 relative flex flex-col items-center pt-8 bg-[#e5e7eb]">

                            {/* 原稿用紙エリア */}
                            <div className="flex-1 w-full max-w-3xl overflow-y-auto px-4 pb-20 flex justify-center">
                                <div className={`w-full bg-white shadow-xl min-h-[65vh] ${project.paperType === 'vertical' ? 'rtl flex justify-end' : ''}`}>
                                    <textarea
                                        className={`w-full h-full resize-none focus:outline-none text-gray-800 ${selectedPaper.styleClass} border-none font-bold`}
                                        placeholder="ここに本文を書きます..."
                                        value={currentText}
                                        onChange={handlePageContentChange}
                                        dir={project.paperType === 'vertical' ? 'rtl' : 'ltr'}
                                    />
                                </div>
                            </div>

                            {/* ページネーションコントロール */}
                            <div className="absolute bottom-4 left-1/2 -translate-x-1/2 bg-white/90 backdrop-blur border-2 border-gray-200 rounded-full px-6 py-2 shadow-lg flex items-center justify-between min-w-[320px]">
                                <button
                                    onClick={() => setCurrentPageIndex(Math.max(0, currentPageIndex - 1))}
                                    disabled={currentPageIndex === 0}
                                    className="p-2 rounded-full bg-amber-100 text-amber-700 hover:bg-amber-200 disabled:opacity-30 transition-colors"
                                >
                                    <Icon name="chevron-left" size={20} />
                                </button>
                                <span className="font-bold text-gray-700 text-sm md:text-base px-4">
                                    {currentPageIndex + 1} / {pages.length} ページ
                                </span>
                                <button
                                    onClick={() => setCurrentPageIndex(Math.min(pages.length - 1, currentPageIndex + 1))}
                                    disabled={currentPageIndex === pages.length - 1}
                                    className="p-2 rounded-full bg-amber-100 text-amber-700 hover:bg-amber-200 disabled:opacity-30 transition-colors"
                                >
                                    <Icon name="chevron-right" size={20} />
                                </button>
                            </div>

                            {/* 追加・削除フローティングボタン群 */}
                            <div className="absolute bottom-4 right-4 flex flex-col gap-2">
                                <div className={`flex items-center justify-center font-bold px-3 py-1.5 rounded-xl border-2 shadow-sm bg-white text-xs md:text-sm ${isOverLimit ? 'border-red-400 text-red-600 bg-red-50' : 'border-gray-200 text-gray-500'}`}>
                                    {charCount} / {MAX_CHARS_PER_PAGE} 文字
                                </div>
                                {pages.length > 1 && (
                                    <button onClick={removeCurrentPage} className="flex items-center justify-center p-3 bg-white border-2 border-red-200 text-red-500 hover:bg-red-50 rounded-xl font-bold shadow-sm transition-colors">
                                        <Icon name="trash-2" size={20} />
                                    </button>
                                )}
                                <button
                                    onClick={addNewPage}
                                    className="flex items-center justify-center p-3 bg-amber-500 border-2 border-amber-600 text-white rounded-xl shadow-lg hover:bg-amber-600 transition-transform hover:scale-105 group"
                                    title="新しいページ"
                                >
                                    <Icon name="plus" size={24} />
                                </button>
                            </div>

                            {/* ふりかえりチェックリスト (Right Sidebar) */}
                            {showRevisions && (
                                <div className="absolute right-0 top-0 bottom-0 w-80 bg-white border-l-4 border-blue-200 shadow-[-10px_0_20px_rgba(0,0,0,0.1)] flex flex-col z-20 animate-fade-in">
                                    <div className="p-4 bg-blue-100 border-b border-blue-200 flex justify-between items-center">
                                        <div className="font-black text-blue-900 flex items-center text-lg">
                                            <Icon name="check-circle" size={20} className="mr-2" /> ふりかえりリスト
                                        </div>
                                        <button onClick={() => setShowRevisions(false)} className="text-blue-500 hover:text-blue-800 bg-white rounded-full p-1"><Icon name="x" size={18} /></button>
                                    </div>

                                    <div className="p-4 bg-blue-50 font-bold text-sm text-blue-800 border-b border-blue-100 flex items-center">
                                        <Icon name="smile" size={18} className="mr-2" /> チェックをつけてお話を完成させよう！
                                    </div>

                                    <div className="flex-1 overflow-y-auto p-4 space-y-3 bg-white">
                                        {REVISION_CHECKS.map(check => (
                                            <label key={check.id} className={`flex items-start p-3 rounded-xl border-2 cursor-pointer transition-all ${checklist.includes(check.id) ? 'bg-blue-50 border-blue-400 opacity-70' : 'bg-white border-gray-200 hover:border-blue-300 shadow-sm'}`}>
                                                <input
                                                    type="checkbox"
                                                    className="mt-1 w-5 h-5 text-blue-600 rounded focus:ring-blue-500 accent-blue-500"
                                                    checked={checklist.includes(check.id)}
                                                    onChange={() => toggleChecklist(check.id)}
                                                />
                                                <span className={`ml-3 font-bold ${checklist.includes(check.id) ? 'text-gray-500 line-through' : 'text-gray-800'}`}>{check.text}</span>
                                            </label>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // ★ 印刷（出版）プレビュー画面
        const PrintPreviewView = ({ project, updateProject, setView }) => {
            if (!project) return null;
            const pages = project.pages || [project.content || ''];

            const handlePrint = () => {
                window.print();
            };

            return (
                <div className="min-h-screen bg-amber-50 flex flex-col p-6 print:p-0 print:bg-white overflow-auto font-maru">
                    {/* 画面用UI（印刷時は非表示） */}
                    <div className="bg-white rounded-3xl shadow-xl w-full max-w-4xl mx-auto flex flex-col md:flex-row overflow-hidden no-print mb-8 shrink-0 border-4 border-amber-200">

                        {/* Left: Book Preview */}
                        <div className="w-full md:w-1/2 p-10 flex items-center justify-center border-r-2 border-gray-100" style={{ backgroundImage: 'radial-gradient(#cbd5e1 1px, transparent 1px)', backgroundSize: '20px 20px' }}>
                            <div className={`w-64 h-84 ${COVER_COLORS.find(c => c.id === project.coverColor)?.class || 'bg-amber-600'} rounded-r-2xl shadow-[10px_10px_15px_rgba(0,0,0,0.3)] border-l-8 border-black/20 flex flex-col items-center justify-center p-6 text-center transform transition-transform duration-500 hover:rotate-2 relative`}>
                                {/* 帯 */}
                                <div className="absolute bottom-10 left-0 right-0 py-2 bg-yellow-300 border-y-2 border-yellow-400 rotate-2 shadow-sm font-bold text-amber-900 text-sm">
                                    好評発売中！
                                </div>

                                <div className="w-full h-full border-4 border-white/40 p-4 flex flex-col justify-center items-center rounded bg-white/5 backdrop-blur-sm z-10">
                                    <h3 className="text-white text-3xl font-bold font-serif-jp mb-8 leading-tight drop-shadow-lg" style={{ writingMode: 'vertical-rl' }}>
                                        {project.title}
                                    </h3>
                                    <div className="w-full h-px bg-white/50 mb-4 mt-auto"></div>
                                    <p className="text-white font-bold font-serif-jp">作： {project.authorName || 'あなた'}</p>
                                </div>
                            </div>
                        </div>

                        {/* Right: Settings */}
                        <div className="w-full md:w-1/2 p-10 flex flex-col bg-white">
                            <h2 className="text-3xl font-black text-amber-900 mb-2 flex items-center font-pop">
                                <Icon name="printer" className="mr-3 text-amber-500" size={32} /> 出版（印刷）する
                            </h2>
                            <p className="text-gray-600 font-bold mb-8">表紙の色を選んで、印刷して本にしよう！</p>

                            <div className="mb-6">
                                <label className="block text-gray-700 font-black mb-3 text-lg">タイトル</label>
                                <input
                                    type="text"
                                    value={project.title}
                                    onChange={(e) => updateProject({ title: e.target.value })}
                                    className="w-full border-4 border-amber-100 rounded-xl p-4 text-xl font-bold focus:outline-none focus:border-amber-400 focus:bg-amber-50 transition-all text-gray-800"
                                />
                            </div>

                            <div className="mb-8">
                                <label className="block text-gray-700 font-black mb-3 text-lg">作者名（なまえ）</label>
                                <input
                                    type="text"
                                    value={project.authorName || ''}
                                    onChange={(e) => updateProject({ authorName: e.target.value })}
                                    className="w-full border-4 border-amber-100 rounded-xl p-4 text-xl font-bold focus:outline-none focus:border-amber-400 focus:bg-amber-50 transition-all text-gray-800"
                                    placeholder="例：かがせん"
                                />
                            </div>

                            <div className="mb-10">
                                <label className="block text-gray-700 font-black mb-3 text-lg">表紙の色</label>
                                <div className="flex space-x-4">
                                    {COVER_COLORS.map(color => (
                                        <button
                                            key={color.id}
                                            onClick={() => updateProject({ coverColor: color.id })}
                                            className={`w-14 h-14 rounded-full cursor-pointer transition-transform ${color.class} ${project.coverColor === color.id ? 'ring-4 ring-offset-4 ring-amber-500 scale-110' : 'hover:scale-110 shadow-md border-4 border-white'}`}
                                            title={color.name}
                                        />
                                    ))}
                                </div>
                            </div>

                            <div className="mt-auto flex space-x-4">
                                <button
                                    onClick={() => setView('editor')}
                                    className="flex-1 py-4 bg-gray-100 text-gray-700 border-2 border-gray-200 font-bold rounded-2xl hover:bg-gray-200 transition-colors text-lg flex justify-center items-center"
                                >
                                    <Icon name="arrow-left" className="mr-2" size={20} /> もどる
                                </button>
                                <button
                                    onClick={handlePrint}
                                    className="flex-1 py-4 bg-gradient-to-r from-amber-500 to-orange-500 border-2 border-amber-600 text-white font-black rounded-2xl shadow-lg hover:shadow-xl transform hover:-translate-y-1 transition-all text-lg flex justify-center items-center font-pop"
                                >
                                    <Icon name="printer" className="mr-2" size={24} /> 印刷！
                                </button>
                            </div>
                        </div>
                    </div>

                    <div className="text-center text-amber-700 font-bold text-lg mb-4 no-print flex items-center justify-center">
                        <Icon name="arrow-down" className="mr-2" /> 印刷プレビュー（紙ではこういうふうに出るよ）
                    </div>

                    {/* 印刷用レイアウト */}
                    <div className="w-full text-black print-area mx-auto max-w-[21cm] bg-white shadow-2xl no-print print:shadow-none font-serif-jp">
                        {/* 表紙ページ */}
                        <div className="print-page flex flex-col items-center justify-center h-[29.7cm] break-after-page border-b-8 border-gray-100 print:border-none">
                            <div className="border-[16px] border-double border-gray-800 p-24 text-center flex flex-col justify-center items-center w-4/5 h-4/5 relative">
                                <h1 className="text-6xl font-black mb-16 tracking-[1em] leading-relaxed" style={{ writingMode: 'vertical-rl', height: '60%' }}>{project.title}</h1>
                                <div className="w-full h-1 bg-gray-800 mb-8 mt-auto"></div>
                                <p className="text-3xl font-bold tracking-widest">作： {project.authorName || 'あなた'}</p>
                            </div>
                        </div>

                        {/* 本文ページ (ページごとにループ) */}
                        {pages.map((pageText, index) => (
                            <div key={index} className="print-page p-16 h-[29.7cm] break-after-page relative border-b-8 border-gray-100 print:border-none">
                                <div className="flex justify-between items-center mb-6 pb-2 border-b-2 border-gray-300">
                                    <span className="text-lg text-gray-500 font-bold tracking-widest">{project.title}</span>
                                    <span className="text-lg text-gray-500 font-bold">- {index + 1} -</span>
                                </div>
                                <div className={`whitespace-pre-wrap ${project.paperType === 'vertical' ? 'writing-vertical-rl float-right' : ''} leading-[2.8] text-[22px] min-h-[22cm] font-medium`}>
                                    {pageText}
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };


        // --- Main Application ---
        const App = () => {
            const [view, setView] = useState('home');
            const [projects, setProjects] = useLocalStorage('writer_projects', []);
            const [currentProjectId, setCurrentProjectId] = useState(null);
            const [dailyTip, setDailyTip] = useState('');
            const [showTipModal, setShowTipModal] = useState(true);

            useEffect(() => {
                const randomTip = DAILY_TIPS[Math.floor(Math.random() * DAILY_TIPS.length)];
                setDailyTip(randomTip);
            }, []);

            const createNewProject = () => {
                const newProject = {
                    id: Date.now().toString(),
                    title: 'むだいのさくひん',
                    guideAnswers: {
                        who: '',
                        where: '',
                        what: '',
                        how: '',
                        end: ''
                    },
                    pages: [''],
                    paperType: 'horizontal',
                    coverColor: 'amber',
                    checklist: [],
                    authorName: '',
                    updatedAt: new Date().toISOString()
                };
                setProjects([newProject, ...projects]);
                setCurrentProjectId(newProject.id);
                setView('guide');
            };

            const currentProject = projects.find(p => p.id === currentProjectId);

            const updateCurrentProject = (updates) => {
                setProjects(projects.map(p => p.id === currentProjectId ? { ...p, ...updates, updatedAt: new Date().toISOString() } : p));
            };

            const TipModal = () => {
                if (!showTipModal) return null;
                return (
                    <div className="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 no-print font-maru">
                        <div className="bg-white rounded-3xl p-10 max-w-lg w-full text-center shadow-2xl transform transition-all border-4 border-amber-300 relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-3 bg-gradient-to-r from-amber-300 via-orange-400 to-amber-300"></div>
                            <div className="w-24 h-24 bg-amber-100 text-amber-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner border-4 border-white">
                                <Icon name="lightbulb" size={48} />
                            </div>
                            <h2 className="text-3xl font-black text-amber-900 mb-6 font-pop">今日の「作家の技」</h2>
                            <p className="text-xl text-amber-800 mb-10 bg-amber-50 p-6 rounded-2xl leading-relaxed font-bold border-2 border-amber-200 shadow-sm relative">
                                <span className="absolute -top-3 -left-3 text-4xl">✨</span>
                                {dailyTip}
                            </p>
                            <button
                                onClick={() => setShowTipModal(false)}
                                className="w-full bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-600 hover:to-orange-600 border-2 border-amber-600 text-white font-black py-4 px-6 rounded-2xl transition-all shadow-lg hover:shadow-xl hover:-translate-y-1 text-xl font-pop"
                            >
                                よし、やってみよう！
                            </button>
                        </div>
                    </div>
                );
            };

            return (
                <>
                    <TipModal />
                    {view === 'home' && (
                        <HomeView
                            setView={setView}
                            projects={projects}
                            createNewProject={createNewProject}
                            setCurrentProjectId={setCurrentProjectId}
                        />
                    )}
                    {view === 'guide' && (
                        <GuideView
                            project={currentProject}
                            updateProject={updateCurrentProject}
                            setView={setView}
                        />
                    )}
                    {view === 'editor' && (
                        <EditorView
                            project={currentProject}
                            updateProject={updateCurrentProject}
                            setView={setView}
                        />
                    )}
                    {view === 'printPreview' && (
                        <PrintPreviewView
                            project={currentProject}
                            updateProject={updateCurrentProject}
                            setView={setView}
                        />
                    )}
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
